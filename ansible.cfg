[defaults]
inventory = inventories/hrlv-dev
roles_path = roles
vault_password_file = .vault_pass
host_key_checking = False
stdout_callback = default
result_format = yaml
display_failed_stderr = true
forks = 16
verbosity = 0
callbacks_enabled = profile_tasks

[inventory]
enable_plugins = cloud.terraform.terraform_provider, yaml, ini
