---
# unreal_engine — Layer 3: UE installation (if missing) and validation
#
# Requires (group_vars):
#   unreal_engine_dir: Install location (e.g. C:/Epic Games/UE_5.7)
#   unreal_exe: Path to UnrealEditor.exe (derived from unreal_engine_dir)
#   ue_installer_source: UNC path to directory containing MSI + Components/ on NAS
#   unreal_project: Path to .uproject file (can be empty string)
#
# Epic offline installer docs:
#   https://dev.epicgames.com/documentation/en-us/unreal-engine/offline-installer-of-unreal-engine

- name: Check if Unreal Engine installed
  ansible.windows.win_stat:
    path: "{{ unreal_exe }}"
  register: ue_check

- name: Start UE installer copy from NAS
  ansible.windows.win_command: >-
    robocopy "{{ ue_installer_source }}" "C:\Windows\Temp\ue-installer" /MIR /NDL /R:5 /W:10 /LOG:C:\Windows\Temp\robocopy-ue-installer.log
  async: 1800
  poll: 0
  register: ue_copy_job
  when: not ue_check.stat.exists

- name: "Monitor UE copy progress"
  ansible.windows.win_shell: |
    $log = "C:\Windows\Temp\robocopy-ue-installer.log"
    if (Test-Path $log) {
      $line = (Get-Content $log -Tail 1).Trim()
      if ($line) { [Console]::Error.WriteLine($line) }
    }
    $procs = Get-Process -Name Robocopy -ErrorAction SilentlyContinue |
      Where-Object { $_.StartTime -gt (Get-Date).AddMinutes(-35) }
    if ($procs) { exit 1 } else { exit 0 }
  register: ue_copy_progress
  until: ue_copy_progress.rc == 0
  retries: 120
  delay: 15
  changed_when: false
  when: ue_copy_job is not skipped

- name: Collect UE copy result
  ansible.builtin.async_status:
    jid: "{{ ue_copy_job.ansible_job_id }}"
  register: ue_copy_result
  failed_when: ue_copy_result.rc >= 8
  changed_when: ue_copy_result.rc in [1, 3, 5, 7]
  when: ue_copy_job is not skipped

- name: Check for pending reboot before MSI install
  ansible.windows.win_shell: |
    $pending = @()
    $wu = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired"
    $cbs = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending"
    $sm = "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager"
    if (Test-Path $wu) { $pending += "WindowsUpdate" }
    if (Test-Path $cbs) { $pending += "CBS" }
    if (Get-ItemProperty $sm -Name PendingFileRenameOperations -ErrorAction SilentlyContinue) { $pending += "PendingFileRename" }
    if ($pending) { throw "Reboot required before MSI install: $($pending -join ', ')" }
  when: not ue_check.stat.exists
  changed_when: false

- name: Install Unreal Engine (silent)
  ansible.windows.win_shell: |
    $p = Start-Process -FilePath msiexec.exe -ArgumentList @(
      "/i", "C:\Windows\Temp\ue-installer\UnrealEngineInstaller.msi",
      "/qn", "/norestart",
      "/l*v", "C:\Windows\Temp\ue_install.log",
      "ENGINE_SYMBOLS_CHECKED=0",
      "ENGINE_IOS_CHECKED=0",
      "ENGINE_TVOS_CHECKED=0",
      "ENGINE_ANDROID_CHECKED=0",
      "ENGINE_LUMIN_CHECKED=0",
      "ENGINE_HOLOLENS_CHECKED=0",
      "ENGINE_LINUX_CHECKED=0"
    ) -Wait -PassThru
    if ($p.ExitCode -ne 0) { throw "msiexec failed with exit code $($p.ExitCode)" }
  when: not ue_check.stat.exists
  async: 3600
  poll: 0
  register: ue_install_job

- name: Monitor UE install progress
  ansible.windows.win_shell: |
    $log = "C:\Windows\Temp\ue_install.log"
    if (Test-Path $log) {
      $line = (Get-Content $log -Tail 1).Trim()
      if ($line) { [Console]::Error.WriteLine($line) }
    } else {
      # No log yet — check if msiexec is actually working
      $proc = Get-Process -Name msiexec -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($proc -and $proc.TotalProcessorTime.TotalSeconds -lt 1) {
        [Console]::Error.WriteLine("msiexec stalled — CPU: $([math]::Round($proc.TotalProcessorTime.TotalSeconds, 1))s, no log file")
      }
    }
    $procs = Get-Process -Name msiexec -ErrorAction SilentlyContinue
    if ($procs) { exit 1 } else { exit 0 }
  register: ue_install_progress
  until: ue_install_progress.rc == 0
  retries: 240
  delay: 15
  changed_when: false
  when: ue_install_job is not skipped

- name: Collect UE install result
  ansible.builtin.async_status:
    jid: "{{ ue_install_job.ansible_job_id }}"
  register: ue_install_result
  failed_when: ue_install_result.rc != 0
  when: ue_install_job is not skipped

- name: Verify Unreal Engine installed
  ansible.windows.win_stat:
    path: "{{ unreal_exe }}"
  register: ue_post_check
  failed_when: not ue_post_check.stat.exists

- name: Check project file exists
  ansible.windows.win_stat:
    path: "{{ unreal_project }}"
  register: project_check
  when: unreal_project | length > 0

- name: Warn if project file missing
  ansible.builtin.debug:
    msg: "WARNING: Project file not found at {{ unreal_project }}. Run Plastic sync first."
  when:
    - unreal_project | length > 0
    - project_check is defined
    - not project_check.stat.exists
