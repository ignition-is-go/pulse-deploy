---
# rivermax — Rivermax SDK + license on top of WinOF-2
# Only applied when host var `rivermax: true` is set.
#
# WinOF-2 driver is installed separately via the winof2 role (in site.yml VF
# network play). This role reinstalls WinOF-2 with Rivermax support enabled
# if needed, then adds the SDK and license.

# --- WinOF-2 with Rivermax support ---

- name: Check if WinOF-2 was installed with Rivermax support
  ansible.windows.win_shell: |
    $reg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' |
      Where-Object { $_.DisplayName -like '*WinOF*' -and $_.DisplayName -like '*Rivermax*' }
    if ($reg) { $reg.DisplayVersion } else { "not_installed" }
  register: winof2_rmax_check
  changed_when: false

- name: Copy WinOF-2 installer for Rivermax reinstall
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ winof2_installer_dir }}"
    win_robocopy_from_nas_file: "{{ winof2_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: winof2_rmax_check.stdout | trim == "not_installed"

- name: Reinstall WinOF-2 with Rivermax support
  ansible.windows.win_shell: |
    $p = Start-Process -FilePath "C:\Windows\Temp\{{ winof2_installer_file }}" `
      -ArgumentList '/v"MT_RIVERMAX=1" /S /v/qn /v"/log C:\Windows\Temp\winof2_rmax_install.log"' `
      -Wait -PassThru
    $p.ExitCode
  register: winof2_rmax_install
  when: winof2_rmax_check.stdout | trim == "not_installed"

- name: Reboot after WinOF-2 Rivermax reinstall
  ansible.builtin.include_role:
    name: win_reboot
  when:
    - winof2_rmax_check.stdout | trim == "not_installed"
    - winof2_rmax_install is changed

- name: Cleanup WinOF-2 installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ winof2_installer_file }}"
    state: absent

# --- Rivermax SDK ---

- name: Get Rivermax SDK version
  ansible.windows.win_shell: |
    $reg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' |
      Where-Object { $_.DisplayName -like '*Rivermax*' }
    if ($reg) { $reg.DisplayVersion } else { "not_installed" }
  register: rivermax_sdk_check
  changed_when: false

- name: Report Rivermax SDK version
  ansible.builtin.debug:
    msg: "Rivermax SDK: {{ rivermax_sdk_check.stdout | trim }} (expected {{ rivermax_sdk_version_dotted }})"

- name: Copy Rivermax SDK archive to node
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ rivermax_installer_dir }}"
    win_robocopy_from_nas_file: "{{ rivermax_sdk_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: rivermax_sdk_check.stdout | trim != rivermax_sdk_version_dotted

- name: Extract Rivermax SDK archive
  community.windows.win_unzip:
    src: "C:\\Windows\\Temp\\{{ rivermax_sdk_file }}"
    dest: "C:\\Windows\\Temp\\rivermax_sdk"
  when: rivermax_sdk_check.stdout | trim != rivermax_sdk_version_dotted

- name: Install Rivermax SDK via MSI
  ansible.windows.win_package:
    path: "C:\\Windows\\Temp\\rivermax_sdk\\Rivermax_Windows_{{ rivermax_sdk_version_dotted }}\\Rivermax-{{ rivermax_sdk_version_dotted }}-win64.msi"
    state: present
  register: rivermax_sdk_install
  when: rivermax_sdk_check.stdout | trim != rivermax_sdk_version_dotted

# --- License ---

- name: Ensure license directory exists
  ansible.windows.win_file:
    path: "{{ rivermax_install_dir }}\\lib"
    state: directory

- name: Copy Rivermax license
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ rivermax_installer_dir }}"
    win_robocopy_from_nas_file: "{{ rivermax_license_file }}"
    win_robocopy_from_nas_dest: "{{ rivermax_install_dir }}\\lib"

- name: Set RIVERMAX_LICENSE_PATH system environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_LICENSE_PATH
    value: "{{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
    level: machine
    state: present

- name: "Set RIVERMAX_PATH system environment variable — {{ rivermax_sdk_version }}"
  ansible.windows.win_environment:
    name: "RIVERMAX_PATH_{{ rivermax_sdk_version }}"
    value: "{{ rivermax_install_dir }}"
    level: machine
    state: present

- name: Set RIVERMAX_ENABLE_CUDA system environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_ENABLE_CUDA
    value: "{{ '1' if rivermax_gpudirect else '0' }}"
    level: machine
    state: present

# --- Validation ---

- name: Verify Rivermax SDK version
  ansible.windows.win_shell: |
    $reg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' |
      Where-Object { $_.DisplayName -like '*Rivermax*' }
    if ($reg) { $reg.DisplayVersion } else { "not_installed" }
  register: final_sdk_check
  changed_when: false

- name: Fail if Rivermax SDK version mismatch
  ansible.builtin.fail:
    msg: "Rivermax SDK version {{ final_sdk_check.stdout | trim }} does not match expected {{ rivermax_sdk_version_dotted }}"
  when: final_sdk_check.stdout | trim != rivermax_sdk_version_dotted

- name: Verify Rivermax DLL exists
  ansible.windows.win_stat:
    path: "{{ rivermax_install_dir }}\\lib\\rivermax.dll"
  register: final_dll_check

- name: Fail if Rivermax DLL missing
  ansible.builtin.fail:
    msg: "Rivermax DLL not found at {{ rivermax_install_dir }}\\lib\\rivermax.dll"
  when: not final_dll_check.stat.exists

- name: Verify license file exists
  ansible.windows.win_stat:
    path: "{{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
  register: final_lic_check

- name: Fail if license file missing
  ansible.builtin.fail:
    msg: "Rivermax license not found at {{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
  when: not final_lic_check.stat.exists

- name: Check Mellanox adapter is visible
  ansible.windows.win_shell: |
    Get-NetAdapter |
      Where-Object { $_.InterfaceDescription -like '*Mellanox*' -or
                     $_.InterfaceDescription -like '*ConnectX*' } |
      Format-Table Name, InterfaceDescription, Status -AutoSize
  register: adapter_check
  changed_when: false

- name: Display Rivermax status
  ansible.builtin.debug:
    msg: |
      Rivermax SDK: {{ final_sdk_check.stdout | trim }} (expected {{ rivermax_sdk_version_dotted }})
      Rivermax DLL: OK
      License file: OK
      Adapters:
      {{ adapter_check.stdout }}

- name: Cleanup temp installers
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ item }}"
    state: absent
  loop:
    - "{{ rivermax_sdk_file }}"
    - rivermax_sdk
