---
# rivermax — Rivermax SDK + license on top of WinOF-2
# Only applied when host var `rivermax: true` is set.
#
# WinOF-2 driver with Rivermax support (MT_RIVERMAX=1) is handled by the
# winof2 role via winof2_rivermax variable. This role installs the SDK and license.

# --- Preflight: verify WinOF-2 has Rivermax support ---

- name: Verify WinOF-2 has Rivermax support enabled
  ansible.windows.win_shell: |
    $val = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Services\mlx5\Parameters' -Name RiverMaxSetup -ErrorAction SilentlyContinue
    if ($val -and $val.RiverMaxSetup -eq 1) { "enabled" } else { "disabled" }
  register: winof2_rmax_preflight
  changed_when: false
  failed_when: winof2_rmax_preflight.stdout | trim != "enabled"

# --- Rivermax SDK ---

- name: Get installed Rivermax SDK version and product ID
  ansible.windows.win_shell: |
    $reg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' |
      Where-Object { $_.DisplayName -like '*Rivermax*' }
    if ($reg) { "$($reg.DisplayVersion)|$($reg.PSChildName)" } else { "not_installed|" }
  register: rivermax_sdk_check_raw
  changed_when: false

- name: Parse Rivermax SDK check result
  ansible.builtin.set_fact:
    rivermax_installed_version: "{{ rivermax_sdk_check_raw.stdout | trim | split('|') | first }}"
    rivermax_installed_product_id: "{{ rivermax_sdk_check_raw.stdout | trim | split('|') | last }}"

- name: Show current SDK version
  ansible.builtin.debug:
    msg: "Rivermax SDK: {{ rivermax_installed_version }} (expected {{ rivermax_version }})"

- name: Copy Rivermax SDK archive to node
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ rivermax_installer_dir }}"
    win_robocopy_from_nas_file: "{{ rivermax_sdk_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: rivermax_installed_version != rivermax_version

- name: Extract Rivermax SDK archive
  community.windows.win_unzip:
    src: "C:\\Windows\\Temp\\{{ rivermax_sdk_file }}"
    dest: "C:\\Windows\\Temp\\rivermax_sdk"
  when: rivermax_installed_version != rivermax_version

- name: Uninstall previous Rivermax SDK
  ansible.windows.win_package:
    product_id: "{{ rivermax_installed_product_id }}"
    state: absent
  when:
    - rivermax_installed_version != rivermax_version
    - rivermax_installed_version != "not_installed"

- name: Install Rivermax SDK via MSI
  ansible.windows.win_package:
    path: "C:\\Windows\\Temp\\rivermax_sdk\\Rivermax_Windows_{{ rivermax_version }}\\Rivermax-{{ rivermax_version }}-win64.msi"
    state: present
  register: rivermax_sdk_install
  when: rivermax_installed_version != rivermax_version

# --- License ---

- name: Ensure license directory exists
  ansible.windows.win_file:
    path: "{{ rivermax_install_dir }}\\lib"
    state: directory

- name: Copy Rivermax license
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ rivermax_license_dir }}"
    win_robocopy_from_nas_file: "{{ rivermax_license_file }}"
    win_robocopy_from_nas_dest: "{{ rivermax_install_dir }}\\lib"

- name: Set RIVERMAX_LICENSE_PATH system environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_LICENSE_PATH
    value: "{{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
    level: machine
    state: present

- name: Set RIVERMAX_PATH system environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_PATH
    value: "{{ rivermax_install_dir }}"
    level: machine
    state: present

# TODO: Remove after all nodes upgraded from 1.71.30
- name: Clean up legacy RIVERMAX_PATH_1_71_30 environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_PATH_1_71_30
    state: absent
    level: machine

- name: Set RIVERMAX_ENABLE_CUDA system environment variable
  ansible.windows.win_environment:
    name: RIVERMAX_ENABLE_CUDA
    value: "{{ '1' if rivermax_gpudirect else '0' }}"
    level: machine
    state: present

# --- Validation ---

- name: Verify Rivermax SDK version
  ansible.windows.win_shell: |
    $reg = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' |
      Where-Object { $_.DisplayName -like '*Rivermax*' }
    if ($reg) { $reg.DisplayVersion } else { "not_installed" }
  register: final_sdk_check
  changed_when: false

- name: Fail if Rivermax SDK version mismatch
  ansible.builtin.fail:
    msg: "Rivermax SDK version {{ final_sdk_check.stdout | trim }} does not match expected {{ rivermax_version }}"
  when: final_sdk_check.stdout | trim != rivermax_version

- name: Verify Rivermax DLL exists
  ansible.windows.win_stat:
    path: "{{ rivermax_install_dir }}\\lib\\rivermax.dll"
  register: final_dll_check

- name: Fail if Rivermax DLL missing
  ansible.builtin.fail:
    msg: "Rivermax DLL not found at {{ rivermax_install_dir }}\\lib\\rivermax.dll"
  when: not final_dll_check.stat.exists

- name: Verify license file exists
  ansible.windows.win_stat:
    path: "{{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
  register: final_lic_check

- name: Fail if license file missing
  ansible.builtin.fail:
    msg: "Rivermax license not found at {{ rivermax_install_dir }}\\lib\\{{ rivermax_license_file }}"
  when: not final_lic_check.stat.exists

- name: Check Mellanox adapter is visible
  ansible.windows.win_shell: |
    Get-NetAdapter |
      Where-Object { $_.InterfaceDescription -like '*Mellanox*' -or
                     $_.InterfaceDescription -like '*ConnectX*' } |
      Format-Table Name, InterfaceDescription, Status -AutoSize
  register: adapter_check
  changed_when: false

- name: Show final status
  ansible.builtin.debug:
    msg: |
      Rivermax SDK: {{ final_sdk_check.stdout | trim }} (expected {{ rivermax_version }})
      Rivermax DLL: OK
      License file: OK
      Adapters:
      {{ adapter_check.stdout }}

- name: Clean up temp installers
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ item }}"
    state: absent
  loop:
    - "{{ rivermax_sdk_file }}"
    - rivermax_sdk
