---
# rivermax defaults
# Ref: https://dev.epicgames.com/documentation/en-us/unreal-engine/setting-up-smpte-2110-in-unreal-engine

# Version — set per-inventory in group_vars/windows.yml, this is the fallback
rivermax_version: "1.81.21"

# Derived paths — do not override individually
rivermax_install_dir: 'C:\Program Files\Mellanox\Rivermax'
rivermax_installer_dir: "{{ nas_share }}\\installers\\rivermax\\{{ rivermax_version }}"
rivermax_sdk_file: "Rivermax_Windows_{{ rivermax_version }}.zip"
rivermax_license_dir: "{{ nas_share }}\\installers\\rivermax\\license"

# GPUDirect RDMA — works on CX6 VFs + RTX 6000 Ada (RIVERMAX_ENABLE_CUDA env var)
rivermax_gpudirect: false
