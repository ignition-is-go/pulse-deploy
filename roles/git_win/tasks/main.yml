---
# git_win — Git for Windows installation and SSH deploy key configuration
#
# Requires (group_vars):
#   git_installer_dir:  NAS directory containing Git for Windows installer
#   git_installer_file: Git installer filename
#   git_deploy_key: (optional) SSH private key for GitHub auth

- name: Check if installed
  ansible.windows.win_stat:
    path: C:\Program Files\Git\cmd\git.exe
  register: git_check

- name: Copy installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ git_installer_dir }}"
    win_robocopy_from_nas_file: "{{ git_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not git_check.stat.exists

- name: Install (silent)
  ansible.windows.win_package:
    path: "C:\\Windows\\Temp\\{{ git_installer_file }}"
    arguments: /VERYSILENT /NORESTART /NOCANCEL /SP- /CLOSEAPPLICATIONS /RESTARTAPPLICATIONS /COMPONENTS=icons,ext\reg\shellhere,assoc,assoc_sh
    state: present
    product_id: Git_is1
  when: not git_check.stat.exists

- name: Verify installation
  ansible.windows.win_command:
    argv:
      - C:\Program Files\Git\cmd\git.exe
      - --version
  changed_when: false

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ git_installer_file }}"
    state: absent

- name: Create .ssh directory
  ansible.windows.win_file:
    path: C:\Users\{{ ansible_user }}\.ssh
    state: directory
  when: git_deploy_key is defined

- name: Deploy SSH key
  ansible.windows.win_copy:
    content: "{{ git_deploy_key }}\n"
    dest: C:\Users\{{ ansible_user }}\.ssh\id_ed25519
  when: git_deploy_key is defined
  no_log: true

- name: Scan GitHub host keys
  ansible.windows.win_command:
    argv:
      - C:\Program Files\Git\usr\bin\ssh-keyscan.exe
      - github.com
  register: github_host_keys
  changed_when: false
  when: git_deploy_key is defined

- name: Set GitHub known hosts
  ansible.windows.win_copy:
    content: "{{ github_host_keys.stdout_lines | sort | join('\n') }}\n"
    dest: C:\Users\{{ ansible_user }}\.ssh\known_hosts
  when: git_deploy_key is defined

- name: Configure git SSH command
  ansible.windows.win_command:
    argv:
      - C:\Program Files\Git\cmd\git.exe
      - config
      - --global
      - core.sshCommand
      - "\"C:/Program Files/Git/usr/bin/ssh.exe\" -o UserKnownHostsFile=C:/Users/{{ ansible_user }}/.ssh/known_hosts -i C:/Users/{{ ansible_user }}/.ssh/id_ed25519"
  changed_when: false
  when: git_deploy_key is defined

- name: Verify SSH auth to GitHub
  ansible.windows.win_command:
    argv:
      - C:\Program Files\Git\usr\bin\ssh.exe
      - -o
      - UserKnownHostsFile=C:\Users\{{ ansible_user }}\.ssh\known_hosts
      - -i
      - C:\Users\{{ ansible_user }}\.ssh\id_ed25519
      - -T
      - git@github.com
  register: git_ssh_verify
  changed_when: false
  failed_when: "'successfully authenticated' not in git_ssh_verify.stderr"
  when: git_deploy_key is defined
