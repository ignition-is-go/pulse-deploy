---
# win_robocopy_from_nas — Server-side file copy from NAS via robocopy
#
# Replaces win_copy remote_src:true to avoid WinRM HTTP 400 errors
# on large files. Runs robocopy on the remote host so file data
# never flows through the WinRM channel.
#
# Required vars:
#   win_robocopy_from_nas_src:  source directory  (e.g. {{ nas_share }}\installers\chrome\latest)
#   win_robocopy_from_nas_file: filename to copy  (e.g. ChromeSetup.exe)
#   win_robocopy_from_nas_dest: dest directory    (e.g. C:\Windows\Temp)

- name: "Robocopy from NAS — {{ win_robocopy_from_nas_file }}"
  ansible.windows.win_command:
    argv:
      - robocopy
      - "{{ win_robocopy_from_nas_src }}"
      - "{{ win_robocopy_from_nas_dest }}"
      - "{{ win_robocopy_from_nas_file }}"
      - /R:5
      - /W:10
  register: _win_robocopy_from_nas
  failed_when: _win_robocopy_from_nas.rc >= 8
  changed_when: _win_robocopy_from_nas.rc != 0
