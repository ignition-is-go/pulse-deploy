---
# sonic_mcast — CoPP IGMP trap for SONiC switches
#
# Traps IGMP packets to CPU so the kernel bridge can see group
# memberships. This is a prerequisite for IGMP snooping but does NOT
# prevent multicast flooding on its own — SONiC on Mellanox uses
# SAI/syncd (not mlxsw_spectrum switchdev), so kernel bridge MDB
# entries are never offloaded to the Spectrum ASIC.
#
# To actually prevent flooding, either:
#   - Switch to Cumulus Linux (mlxsw_spectrum switchdev = MDB offload)
#   - Wait for SONiC to add SAI-based IGMP snooping for Mellanox

# =================================================================
# CoPP — IGMP trap so ASIC sends reports to CPU
#
# Patches the existing copp_cfg.json to add an IGMP trap entry with
# a dedicated trap group. Uses always_enabled so coppmgrd does not
# gate on the FEATURE table. Leaves all other entries untouched so
# SONiC upgrades that add new defaults are preserved.
# =================================================================

- name: Patch CoPP config with IGMP trap entry
  ansible.builtin.script:
    cmd: patch_copp_igmp.py
  register: copp_patch_result
  changed_when: "'CHANGED' in copp_patch_result.stdout"
  notify: Load CoPP config into CONFIG_DB

# =================================================================
# Runtime verification
# =================================================================

- name: Check IGMP CoPP trap in APP_DB
  ansible.builtin.command:
    argv: [redis-cli, -n, "0", hget, "COPP_TABLE:queue4_group4", trap_ids]
  register: copp_check
  changed_when: false
  failed_when: false

- name: Warn if IGMP CoPP trap not programmed
  ansible.builtin.debug:
    msg: "IGMP CoPP trap NOT in APP_DB — ASIC will not trap IGMP to CPU. Reboot may be required."
  when: "'igmp_query' not in (copp_check.stdout | default(''))"

# =================================================================
# Static MDB — PTP multicast (224.0.1.129)
#
# SONiC IGMP snooping on Mellanox does not offload MDB to the ASIC,
# so VMs behind OVS/switchdev hypervisors never receive PTP multicast
# unless the switch port has an MDB entry. These static entries ensure
# PTP reaches Proxmox hosts with Rivermax VMs.
#
# Runtime-only (bridge mdb is not persisted in config_db). Re-run the
# role after switch reboot to re-apply.
# =================================================================

- name: Add static PTP multicast MDB entry for {{ item }}
  ansible.builtin.command:
    argv:
      - bridge
      - mdb
      - replace
      - dev
      - Bridge
      - port
      - "{{ item }}"
      - grp
      - "224.0.1.129"
      - permanent
      - vid
      - "{{ sonic_media_vlan }}"
  loop: "{{ sonic_ptp_mcast_ports }}"
  changed_when: true

- name: Verify PTP MDB entries
  ansible.builtin.command:
    argv: [bridge, mdb, show]
  register: mdb_show
  changed_when: false

- name: Display PTP MDB entries
  ansible.builtin.debug:
    msg: "{{ mdb_show.stdout_lines | select('search', '224.0.1.129') | list }}"
