---
# win_install_chrome — Install Google Chrome (silent)
#
# Uses the standalone offline installer from NAS.
#
# Requires (group_vars):
#   chrome_installer_dir:  NAS directory containing Chrome installer
#   chrome_installer_file: Chrome installer filename

- name: Check if Chrome is installed
  ansible.windows.win_stat:
    path: C:\Program Files\Google\Chrome\Application\chrome.exe
  register: chrome_check

- name: Copy Chrome installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ chrome_installer_dir }}"
    win_robocopy_from_nas_file: "{{ chrome_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not chrome_check.stat.exists

- name: Install Google Chrome (silent)
  ansible.windows.win_command:
    argv:
      - "C:\\Windows\\Temp\\{{ chrome_installer_file }}"
      - /silent
      - /install
  when: not chrome_check.stat.exists

- name: Verify Chrome installed
  ansible.windows.win_stat:
    path: C:\Program Files\Google\Chrome\Application\chrome.exe
  register: chrome_verify
  failed_when: not chrome_verify.stat.exists

- name: Clean up Chrome installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ chrome_installer_file }}"
    state: absent
