---
# claude_code_win — Claude Code CLI (Windows)
#
# Installs Claude Code for the connection user via the official installer.

- name: Check if Claude Code is installed
  ansible.windows.win_command:
    argv:
      - claude
      - --version
  register: claude_check
  failed_when: false
  changed_when: false

- name: Install Claude Code CLI
  ansible.windows.win_shell: irm https://claude.ai/install.ps1 | iex
  when: claude_check.rc != 0
  changed_when: true

- name: Add Claude Code to user PATH
  ansible.windows.win_path:
    elements:
      - '%USERPROFILE%\.local\bin'
    scope: user
