---
# vscode — Visual Studio Code (user installer, silent)
#
# Requires (group_vars):
#   vscode_installer_dir:  NAS directory containing VS Code installer
#   vscode_installer_file: VS Code installer filename

- name: Check if installed
  ansible.windows.win_stat:
    path: C:\Users\{{ ansible_user }}\AppData\Local\Programs\Microsoft VS Code\Code.exe
  register: vscode_check

- name: Copy installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ vscode_installer_dir }}"
    win_robocopy_from_nas_file: "{{ vscode_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not vscode_check.stat.exists

- name: Install (silent)
  ansible.windows.win_command:
    argv:
      - "C:\\Windows\\Temp\\{{ vscode_installer_file }}"
      - /VERYSILENT
      - /NORESTART
      - /MERGETASKS=!runcode,addcontextmenufiles,addcontextmenufolders,addtopath
  when: not vscode_check.stat.exists
  async: 300
  poll: 15

- name: Verify installation
  ansible.windows.win_stat:
    path: C:\Users\{{ ansible_user }}\AppData\Local\Programs\Microsoft VS Code\Code.exe
  register: vscode_verify
  failed_when: not vscode_verify.stat.exists

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ vscode_installer_file }}"
    state: absent
