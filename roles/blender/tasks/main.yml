---
# blender -- Blender 3D installation (Windows)
#
# Installs Blender from MSI on the deploy share via silent install.
#
# Requires (group_vars):
#   blender_installer_dir:  NAS directory containing Blender MSI
#   blender_installer_file: Blender MSI filename
#   blender_version: full version string (e.g. "5.0.1")

- name: Set install directory
  ansible.builtin.set_fact:
    blender_install_dir: >-
      C:\Program Files\Blender Foundation\Blender {{ blender_version.split('.')[:2] | join('.') }}

- name: Check if installed
  ansible.windows.win_stat:
    path: "{{ blender_install_dir }}\\blender.exe"
  register: blender_check

- name: Copy MSI from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ blender_installer_dir }}"
    win_robocopy_from_nas_file: "{{ blender_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not blender_check.stat.exists

- name: Install (silent)
  ansible.windows.win_package:
    path: "C:\\Windows\\Temp\\{{ blender_installer_file }}"
    arguments: ALLUSERS=1
    state: present
  when: not blender_check.stat.exists
  register: blender_install

- name: Verify installation
  ansible.windows.win_command:
    argv:
      - "{{ blender_install_dir }}\\blender.exe"
      - --version
  register: blender_verify
  changed_when: false
  failed_when: blender_version not in blender_verify.stdout

- name: Show version
  ansible.builtin.debug:
    msg: "{{ blender_verify.stdout | trim }}"

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ blender_installer_file }}"
    state: absent
