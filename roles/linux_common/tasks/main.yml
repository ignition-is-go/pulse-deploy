---
# linux_common — Layer 0: base config safe for all Linux targets
# (hypervisors, VMs, LXC containers)
#
# Apt cache, base packages, SSH. No firewall — that's tier-specific.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ linux_common_packages }}"
    state: present

- name: Ensure SSH is running
  ansible.builtin.service:
    name: sshd
    state: started
    enabled: true
