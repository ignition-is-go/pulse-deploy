---
# cx6_ip — Configure static IP on ConnectX-6 VF passthrough adapter
#
# Discovers the Mellanox/ConnectX adapter, clears existing IPs/routes,
# assigns the media network IP, and disables DHCP.
#
# Requires (host_vars):
#   media_ip: static IP for the media network (e.g. "10.0.0.1")

- name: Discover ConnectX-6 adapter
  ansible.windows.win_shell: |
    $adapters = @(Get-NetAdapter | Where-Object {
      $_.InterfaceDescription -like '*Mellanox*' -or $_.InterfaceDescription -like '*ConnectX*'
    })
    if ($adapters.Count -eq 0) { throw "ConnectX adapter not found" }
    if ($adapters.Count -gt 1) { throw "Multiple ConnectX adapters found ($($adapters.Count)), expected 1" }
    $adapters[0].ifIndex
  register: cx6_discovery
  changed_when: false
  when: rivermax | default(false)

- name: Set ConnectX-6 interface index
  ansible.builtin.set_fact:
    cx6_ifindex: "{{ cx6_discovery.stdout | trim }}"
  when: rivermax | default(false)

- name: Check current IP on CX6
  ansible.windows.win_shell: |
    $ip = Get-NetIPAddress -InterfaceIndex {{ cx6_ifindex }} -AddressFamily IPv4 -ErrorAction SilentlyContinue |
      Where-Object { $_.IPAddress -notlike '169.*' }
    if ($ip) { "CURRENT=$($ip.IPAddress)" } else { "NONE" }
  register: cx6_current_ip
  changed_when: false
  when: rivermax | default(false)

- name: Remove existing IP addresses on CX6
  ansible.windows.win_shell: |
    Remove-NetIPAddress -InterfaceIndex {{ cx6_ifindex }} -Confirm:$false
  when:
    - rivermax | default(false)
    - "'CURRENT=' in cx6_current_ip.stdout"
    - "media_ip not in cx6_current_ip.stdout"
  changed_when: true

- name: Remove existing routes on CX6
  ansible.windows.win_shell: |
    Remove-NetRoute -InterfaceIndex {{ cx6_ifindex }} -Confirm:$false
  when:
    - rivermax | default(false)
    - "'CURRENT=' in cx6_current_ip.stdout"
    - "media_ip not in cx6_current_ip.stdout"
  changed_when: true

- name: Assign media network IP
  ansible.windows.win_shell: |
    New-NetIPAddress -InterfaceIndex {{ cx6_ifindex }} -IPAddress {{ media_ip }} -PrefixLength 24
  when:
    - rivermax | default(false)
    - "media_ip not in (cx6_current_ip.stdout | default(''))"

- name: Disable DHCP on CX6
  ansible.windows.win_shell: |
    Set-NetIPInterface -InterfaceIndex {{ cx6_ifindex }} -Dhcp Disabled
  when: rivermax | default(false)

- name: Display configured IPs
  ansible.windows.win_shell: |
    Get-NetIPAddress -AddressFamily IPv4 |
      Where-Object { $_.IPAddress -notlike "169.*" -and $_.IPAddress -ne "127.0.0.1" } |
      Select-Object InterfaceAlias, IPAddress |
      Format-Table -AutoSize
  register: ip_output
  changed_when: false

- name: Show IP configuration
  ansible.builtin.debug:
    msg: "{{ ip_output.stdout_lines }}"
