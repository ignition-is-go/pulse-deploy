---
# nvidia_gpu_win -- Layer 1: NVIDIA GPU driver installation and validation (Windows)
#
# Detects NVIDIA GPU via PCI vendor ID, installs driver if missing,
# validates GPU model against nvidia_supported_gpus after driver is present.
#
# Requires (group_vars):
#   nvidia_driver_dir:  NAS directory containing NVIDIA driver exe
#   nvidia_driver_file: NVIDIA driver exe filename
#   nvidia_supported_gpus: list of GPU name substrings this driver supports
#     e.g. ["RTX A4000", "RTX 6000 Ada"]

- name: Detect NVIDIA PCI hardware
  ansible.windows.win_shell: |
    $pci = Get-WmiObject Win32_PnPEntity | Where-Object { $_.DeviceID -like '*VEN_10DE*' -and $_.DeviceID -like 'PCI*' }
    if ($pci) { "found" } else { "not_found" }
  register: gpu_pci_detect
  changed_when: false

- name: Fail if no NVIDIA GPU detected
  ansible.builtin.fail:
    msg: "No NVIDIA GPU detected on {{ inventory_hostname }}. Check PCI passthrough configuration."
  when: "'not_found' in gpu_pci_detect.stdout"

- name: Check if NVIDIA driver installed
  ansible.windows.win_stat:
    path: C:\Windows\System32\nvidia-smi.exe
  register: nvsmi_check

- name: Copy NVIDIA driver from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ nvidia_driver_dir }}"
    win_robocopy_from_nas_file: "{{ nvidia_driver_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not nvsmi_check.stat.exists

- name: Install NVIDIA driver (silent)
  ansible.windows.win_shell: >-
    Start-Process -FilePath "C:\Windows\Temp\{{ nvidia_driver_file }}"
    -ArgumentList "-s -noreboot -noeula"
    -Wait -PassThru
  when: not nvsmi_check.stat.exists
  register: nvidia_install
  async: 600
  poll: 15

- name: Reboot after NVIDIA driver install
  ansible.builtin.include_role:
    name: win_reboot
  when: nvidia_install is changed

- name: Query GPU via nvidia-smi
  ansible.windows.win_command:
    argv:
      - C:\Windows\System32\nvidia-smi.exe
      - --query-gpu=name,driver_version,memory.total
      - --format=csv,noheader
  register: nvsmi_verify
  changed_when: false

- name: Set GPU model fact
  ansible.builtin.set_fact:
    gpu_model: "{{ nvsmi_verify.stdout | trim }}"

- name: Display GPU info
  ansible.builtin.debug:
    msg: "{{ gpu_model }}"

- name: Validate GPU is supported by configured driver
  ansible.builtin.fail:
    msg: >-
      GPU '{{ gpu_model }}' on {{ inventory_hostname }} is not in nvidia_supported_gpus: {{ nvidia_supported_gpus }}.
      Check group_vars — the configured driver may be wrong for this GPU.
  when: nvidia_supported_gpus | select('in', gpu_model) | list | length == 0

- name: Clean up NVIDIA driver installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ nvidia_driver_file }}"
    state: absent
