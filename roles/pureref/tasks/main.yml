---
# pureref -- PureRef reference image viewer (Windows)
#
# Installs PureRef silently via NSIS installer.
#
# Requires (group_vars):
#   pureref_installer_dir:  NAS directory containing PureRef installer
#   pureref_installer_file: PureRef installer filename
#   pureref_version: version string (e.g. "2.1.0")

- name: Check if PureRef installed
  ansible.windows.win_stat:
    path: C:\Program Files\PureRef\PureRef.exe
  register: pureref_check

- name: Copy PureRef installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ pureref_installer_dir }}"
    win_robocopy_from_nas_file: "{{ pureref_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not pureref_check.stat.exists

- name: Install PureRef (silent)
  ansible.windows.win_command:
    argv:
      - "C:\\Windows\\Temp\\{{ pureref_installer_file }}"
      - /S
  when: not pureref_check.stat.exists
  register: pureref_install

- name: Verify PureRef installation
  ansible.windows.win_stat:
    path: C:\Program Files\PureRef\PureRef.exe
  register: pureref_verify
  failed_when: not pureref_verify.stat.exists

- name: Create PureRef desktop shortcut
  community.windows.win_shortcut:
    src: C:\Program Files\PureRef\PureRef.exe
    dest: C:\Users\Public\Desktop\PureRef.lnk

- name: Clean up PureRef installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ pureref_installer_file }}"
    state: absent
