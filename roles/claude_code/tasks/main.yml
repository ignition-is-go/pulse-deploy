---
# claude_code — Claude Code CLI
#
# Installs for the connection user (ansible_user), not root.

- name: Check if Claude Code is installed
  become: false
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/.local/bin/claude"
  register: claude_check

- name: Install Claude Code CLI
  become: false
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  when: not claude_check.stat.exists
  changed_when: true

- name: Add Claude Code to PATH in bashrc
  become: false
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '\.local/bin'
    state: present
