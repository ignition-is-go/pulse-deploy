---
# vs_buildtools — Visual Studio Build Tools with C++ workload (if missing) and validation
#
# Installs from an offline layout on the NAS (created by create-layout.ps1).
# No internet required on target nodes.
#
# Requires (group_vars):
#   vs_buildtools_layout_source: UNC path to offline layout directory on NAS
#
# Sources:
#   https://dev.epicgames.com/documentation/en-us/unreal-engine/setting-up-visual-studio-development-environment-for-cplusplus-projects-in-unreal-engine
#   https://learn.microsoft.com/en-us/visualstudio/install/create-a-network-installation-of-visual-studio

- name: Check if VS Build Tools installed
  ansible.windows.win_stat:
    path: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Current\\Bin\\MSBuild.exe"
  register: msbuild_check

- name: Start VS Build Tools layout copy from NAS
  ansible.windows.win_command: >-
    robocopy "{{ vs_buildtools_layout_source }}" "C:\Windows\Temp\vs_BuildTools" /MIR /NDL /R:5 /W:10 /LOG:C:\Windows\Temp\robocopy-vs-buildtools.log
  async: 1800
  poll: 0
  register: vs_copy_job
  when: not msbuild_check.stat.exists

- name: "Monitor VS Build Tools copy progress"
  ansible.windows.win_shell: |
    $log = "C:\Windows\Temp\robocopy-vs-buildtools.log"
    if (Test-Path $log) { (Get-Content $log -Tail 1).Trim() }
    $procs = Get-Process -Name Robocopy -ErrorAction SilentlyContinue |
      Where-Object { $_.StartTime -gt (Get-Date).AddMinutes(-35) }
    if ($procs) { exit 1 } else { exit 0 }
  register: vs_copy_progress
  until: vs_copy_progress.rc == 0
  retries: 120
  delay: 15
  changed_when: false
  when: vs_copy_job is not skipped

- name: Collect VS Build Tools copy result
  ansible.builtin.async_status:
    jid: "{{ vs_copy_job.ansible_job_id }}"
  register: vs_copy_result
  failed_when: vs_copy_result.rc >= 8
  changed_when: vs_copy_result.rc in [1, 3, 5, 7]
  when: vs_copy_job is not skipped

- name: Install VS Build Tools from offline layout (silent)
  ansible.windows.win_shell: >-
    Start-Process -FilePath "C:\Windows\Temp\vs_BuildTools\vs_BuildTools.exe"
    -ArgumentList "--noWeb --wait --quiet --norestart
    --add Microsoft.VisualStudio.Workload.VCTools
    --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64
    --add Microsoft.VisualStudio.Component.Windows11SDK.26100
    --add Microsoft.VisualStudio.Component.VC.ASAN
    --add Microsoft.VisualStudio.Component.VC.Llvm.Clang
    --add Microsoft.NetCore.Component.Runtime.8.0
    --includeRecommended"
    -Wait -PassThru
  when: not msbuild_check.stat.exists
  async: 1800
  poll: 30

- name: Verify MSBuild is callable
  ansible.windows.win_command:
    argv:
      - C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe
      - -version
  changed_when: false
