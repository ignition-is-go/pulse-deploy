---
# netbird/tasks/windows.yml — Install Netbird on Windows

- name: Check if Netbird is installed
  ansible.windows.win_shell: |
    $nb = Get-Command netbird -ErrorAction SilentlyContinue
    if ($nb) { "INSTALLED=$($nb.Source)" } else { "NOT_INSTALLED" }
  register: netbird_check
  changed_when: false

- name: Copy Netbird installer from NAS
  ansible.windows.win_copy:
    src: "{{ netbird_installer_source }}"
    dest: C:\Windows\Temp\netbird-installer.exe
    remote_src: true
  when: "'NOT_INSTALLED' in netbird_check.stdout"

- name: Install Netbird (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\netbird-installer.exe
      - /S
  when: "'NOT_INSTALLED' in netbird_check.stdout"

- name: Verify Netbird installed
  ansible.windows.win_shell: |
    $nb = Get-Command netbird -ErrorAction SilentlyContinue
    if ($nb) { "OK=$($nb.Source)" } else { "MISSING" }
  register: netbird_win_verify
  changed_when: false
  failed_when: "'MISSING' in netbird_win_verify.stdout"

- name: Clean up Netbird installer
  ansible.windows.win_file:
    path: C:\Windows\Temp\netbird-installer.exe
    state: absent
