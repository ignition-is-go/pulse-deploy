---
# netbird/tasks/linux.yml — Install Netbird on Linux

- name: Check if installed
  ansible.builtin.stat:
    path: /usr/bin/netbird
  register: netbird_check

- name: Install via apt repo script
  ansible.builtin.shell: curl -fsSL https://pkgs.netbird.io/install.sh | sh
  when: not netbird_check.stat.exists
  changed_when: true
