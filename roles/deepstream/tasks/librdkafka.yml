---
# deepstream/librdkafka — Build librdkafka from source (DeepStream 8.0 guide)

- name: Check if librdkafka is installed
  ansible.builtin.stat:
    path: /usr/local/lib/librdkafka.so
  register: rdkafka_check

- name: Install librdkafka build dependencies
  ansible.builtin.apt:
    name:
      - libssl-dev
      - zlib1g-dev
    state: present
  when: not rdkafka_check.stat.exists

- name: Clone librdkafka
  ansible.builtin.git:
    repo: https://github.com/confluentinc/librdkafka.git
    dest: /tmp/librdkafka
    version: "{{ librdkafka_version }}"
    depth: 1
  when: not rdkafka_check.stat.exists

- name: Configure librdkafka
  ansible.builtin.command:
    cmd: ./configure --enable-ssl
    chdir: /tmp/librdkafka
  when: not rdkafka_check.stat.exists
  changed_when: true

- name: Build librdkafka
  ansible.builtin.command:
    cmd: make
    chdir: /tmp/librdkafka
  when: not rdkafka_check.stat.exists
  changed_when: true

- name: Install librdkafka
  ansible.builtin.command:
    cmd: make install
    chdir: /tmp/librdkafka
  when: not rdkafka_check.stat.exists
  changed_when: true

- name: Run ldconfig
  ansible.builtin.command:
    cmd: ldconfig
  when: not rdkafka_check.stat.exists
  changed_when: true

- name: Clean up librdkafka source
  ansible.builtin.file:
    path: /tmp/librdkafka
    state: absent
  when: not rdkafka_check.stat.exists
