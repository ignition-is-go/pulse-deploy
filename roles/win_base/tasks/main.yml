---
# win_base — Layer 0: Windows VM base configuration
# Ensures WinRM, firewall, auto-logon, and power settings are correct.
# Prerequisite: scripts/bootstrap-ansible.ps1 must have been run via Proxmox console first.

- name: Ensure Secondary Logon service is running
  ansible.windows.win_service:
    name: seclogon
    start_mode: auto
    state: started

- name: Ensure WinRM service is running
  ansible.windows.win_service:
    name: WinRM
    start_mode: auto
    state: started

- name: Set DNS servers
  ansible.windows.win_dns_client:
    adapter_names: '*'
    dns_servers: "{{ win_base_dns_servers }}"

- name: Set network profile to Private
  ansible.windows.win_shell: |
    Get-NetConnectionProfile | Where-Object { $_.NetworkCategory -ne 'Private' } | Set-NetConnectionProfile -NetworkCategory Private
  changed_when: false

- name: Ensure firewall rules for WinRM
  community.windows.win_firewall_rule:
    name: WinRM-HTTP-In-TCP
    localport: 5985
    action: allow
    direction: in
    protocol: tcp
    profiles:
      - domain
      - private
      - public
    state: present
    enabled: true

- name: Ensure firewall allows ICMP
  community.windows.win_firewall_rule:
    name: Allow-ICMPv4
    action: allow
    direction: in
    protocol: icmpv4
    profiles:
      - domain
      - private
      - public
    state: present
    enabled: true

- name: Configure auto-logon
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: string
  loop:
    - { name: AutoAdminLogon, data: "1" }
    - { name: DefaultUserName, data: "{{ ansible_user }}" }
    - { name: DefaultPassword, data: "{{ ansible_password }}" }
    - { name: DefaultDomainName, data: "" }
  no_log: true
  register: autologon_result

- name: Reboot to start interactive desktop session
  ansible.builtin.include_role:
    name: win_reboot
  when: autologon_result is changed

- name: Disable Server Manager at logon
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\ServerManager
    name: DoNotOpenServerManagerAtLogon
    data: 1
    type: dword

- name: Close Server Manager window if open
  ansible.windows.win_shell: |
    $proc = Get-Process -Name ServerManager -ErrorAction SilentlyContinue
    if ($proc) { $proc | Stop-Process -Force; 'CLOSED' } else { 'NOT_RUNNING' }
  register: servermanager_close
  changed_when: servermanager_close.stdout_lines[0] == 'CLOSED'

- name: Disable Shutdown Event Tracker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Reliability
    name: ShutdownReasonOn
    data: 0
    type: dword

- name: Check lock screen registry value
  ansible.windows.win_reg_stat:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
    name: NoLockScreen
  register: lock_screen_reg

- name: Disable lock screen
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
    name: NoLockScreen
    data: 1
    type: dword
  when: lock_screen_reg.value is not defined or lock_screen_reg.value != 1

- name: Disable sleep on AC power
  ansible.windows.win_command: powercfg /change standby-timeout-ac 0
  changed_when: false
  when: win_base_disable_sleep

- name: Disable hibernation
  ansible.windows.win_command: powercfg /hibernate off
  changed_when: false
  when: win_base_disable_hibernation

- name: Check if RustDesk is installed
  ansible.windows.win_stat:
    path: C:\Program Files\PulseRemoteDesktopVM
  register: rustdesk_check

- name: Copy RustDesk installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ nas_share_mgmt }}\\installers\\rustdesk\\1.4.3"
    win_robocopy_from_nas_file: pulseremotedesktopvm.msi
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not rustdesk_check.stat.exists

- name: Install RustDesk (silent)
  ansible.windows.win_package:
    path: C:\Windows\Temp\pulseremotedesktopvm.msi
    arguments: /qn /norestart /l*v "C:\Windows\Temp\rustdesk_install.log"
    state: present
    product_id: '{45EAF4E5-E9A3-4F44-A32B-D0A69208FC78}'
  when: not rustdesk_check.stat.exists

- name: Verify RustDesk installed
  ansible.windows.win_stat:
    path: C:\Program Files\PulseRemoteDesktopVM\PulseRemoteDesktopVM.exe
  register: rustdesk_post_check
  failed_when: not rustdesk_post_check.stat.exists

- name: Apply RustDesk config from relay server
  ansible.windows.win_command:
    argv:
      - C:\Program Files\PulseRemoteDesktopVM\PulseRemoteDesktopVM.exe
      - --config
      - "{{ rustdesk_config }}"
  changed_when: false
  no_log: true

- name: Check current RustDesk ID
  ansible.windows.win_command:
    argv:
      - C:\Program Files\PulseRemoteDesktopVM\PulseRemoteDesktopVM.exe
      - --get-id
  register: rustdesk_current_id
  changed_when: false

- name: Stop RustDesk service to set ID
  ansible.windows.win_service:
    name: PulseRemoteDesktopVM
    state: stopped
    force_dependent_services: true
  when: rustdesk_current_id.stdout | trim != inventory_hostname

- name: Set RustDesk ID to inventory hostname
  community.windows.win_lineinfile:
    path: C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\PulseRemoteDesktopVM\config\PulseRemoteDesktopVM.toml
    regexp: ^id =
    insertbefore: ^enc_id =
    line: "id = '{{ inventory_hostname }}'"
  when: rustdesk_current_id.stdout | trim != inventory_hostname

- name: Clear enc_id to force ID re-registration
  community.windows.win_lineinfile:
    path: C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\PulseRemoteDesktopVM\config\PulseRemoteDesktopVM.toml
    regexp: ^enc_id =
    line: "enc_id = ''"
  when: rustdesk_current_id.stdout | trim != inventory_hostname

- name: Start RustDesk service after ID change
  ansible.windows.win_service:
    name: PulseRemoteDesktopVM
    state: started
  when: rustdesk_current_id.stdout | trim != inventory_hostname

- name: Check if PowerToys is installed
  ansible.windows.win_stat:
    path: C:\Program Files\PowerToys
  register: powertoys_check

- name: Copy PowerToys installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ nas_share_mgmt }}\\installers\\powertoys\\0.97.2"
    win_robocopy_from_nas_file: PowerToysSetup-0.97.2-x64.exe
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not powertoys_check.stat.exists

- name: Install PowerToys (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\PowerToysSetup-0.97.2-x64.exe
      - /install
      - /quiet
      - /norestart
      - /log
      - C:\Windows\Temp\powertoys_install.log
  when: not powertoys_check.stat.exists

- name: Verify PowerToys installed
  ansible.windows.win_stat:
    path: C:\Program Files\PowerToys\PowerToys.exe
  register: powertoys_post_check
  failed_when: not powertoys_post_check.stat.exists

- name: Install NuGet package provider
  ansible.windows.win_shell: Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
  changed_when: false

- name: Remove old DisplayConfig module versions
  ansible.windows.win_shell: |
    Get-Module -Name DisplayConfig -ListAvailable |
      Where-Object { $_.Version -lt '5.0' } |
      ForEach-Object { Remove-Item -Recurse -Force $_.ModuleBase; "removed $($_.Version)" }
  register: dc_cleanup
  changed_when: "'removed' in dc_cleanup.stdout"

- name: Install DisplayConfig PowerShell module
  ansible.windows.win_shell: Install-Module -Name DisplayConfig -MinimumVersion 5.0 -Force -Scope AllUsers -AllowClobber
  changed_when: false

- name: Set high performance power plan
  ansible.windows.win_shell: |
    $current = powercfg /getactivescheme
    $highPerf = powercfg /list | Select-String "High performance"
    if ($highPerf -match "([a-f0-9-]{36})") {
      if ($current -match $matches[1]) {
        "already_active"
      } else {
        powercfg /setactive $matches[1]
        "activated"
      }
    } else {
      "not_found"
    }
  register: power_plan
  changed_when: "'activated' in power_plan.stdout"
