---
# pve_cx6_sriov — ConnectX-6 SR-IOV + OVS switchdev for Proxmox hosts
#
# Writes all config (udev, OVS globals service, bridges, representors),
# then verifies live runtime state. Only warns about reboot if the
# running system doesn't match the desired config.
#
# Firmware: sets NUM_OF_VFS via mlxconfig (requires cold reboot to apply).
# Manual prerequisites: LINK_TYPE_P1/P2=2 (Ethernet), SRIOV_EN=1, VF_VPD_ENABLE=1
# See docs/proxmox/CONNECTX6_SRIOV.md for mlxconfig steps
#
# Required variables:
#   cx6_cards    — list of CX6 card defs (from Terraform via group_vars/proxmox.yml)
#   cx6_vf_count, cx6_ovs_mtu

# =================================================================
# Preflight — validate hardware before writing any config
# =================================================================

- name: Fail if cx6_cards is not defined
  ansible.builtin.fail:
    msg: "cx6_cards must be defined for {{ inventory_hostname }}"
  when: cx6_cards is not defined or cx6_cards | length == 0

- name: Fail if any switchid is not set
  ansible.builtin.fail:
    msg: "switchid must be set for {{ item.bridge }} on {{ inventory_hostname }}"
  when: item.switchid is not defined or item.switchid == "" or item.switchid == "TODO"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"

- name: Verify CX6 PCI devices exist
  ansible.builtin.command:
    argv: [lspci, -s, "{{ item.1 }}"]
  loop: "{{ cx6_cards | subelements('pci_slots') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: preflight_pci
  changed_when: false
  failed_when: "preflight_pci.rc != 0 or 'ConnectX' not in preflight_pci.stdout"

- name: Verify PF interfaces exist
  ansible.builtin.stat:
    path: "/sys/class/net/{{ item.1 }}"
  loop: "{{ cx6_cards | subelements('pf_ifaces') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: preflight_ifaces
  failed_when: not preflight_ifaces.stat.exists

- name: Verify switchids match hardware
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.pf_ifaces[0] }}/phys_switch_id"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: preflight_switchid
  failed_when: "(preflight_switchid.content | b64decode | trim) != item.switchid"

- name: Verify management bridge is not on CX6
  ansible.builtin.command:
    argv: [ip, -br, addr, show, dev, vmbr0]
  register: preflight_mgmt
  changed_when: false
  failed_when: >-
    preflight_mgmt.rc != 0 or
    preflight_mgmt.stdout | length == 0

# =================================================================
# Packages
# =================================================================

- name: Install OVS and networking packages
  ansible.builtin.apt:
    name:
      - openvswitch-switch
      - ifupdown2
      - patch
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Pin openvswitch-switch to prevent auto-update
  ansible.builtin.command:
    argv:
      - apt-mark
      - hold
      - openvswitch-switch
  register: apt_hold_result
  changed_when: "'already' not in apt_hold_result.stdout"

# =================================================================
# Firmware — set NUM_OF_VFS via mlxconfig (first PF per card)
# =================================================================

- name: Query firmware config on each CX6 card
  ansible.builtin.command:
    argv: [mlxconfig, -d, "{{ item.pci_slots[0] }}", q]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.pci_slots[0] }}"
  register: cx6_fw_query
  changed_when: false

- name: Validate firmware has SRIOV_EN on each CX6 card
  ansible.builtin.fail:
    msg: >-
      SRIOV_EN is not True on {{ item.item.pci_slots[0] }}.
      Enable manually: mlxconfig -d {{ item.item.pci_slots[0] }} set SRIOV_EN=1
  loop: "{{ cx6_fw_query.results }}"
  loop_control:
    label: "{{ item.item.pci_slots[0] }}"
  when: "'SRIOV_EN' not in item.stdout or 'True' not in (item.stdout | regex_search('SRIOV_EN\\s+\\S+') | default(''))"

- name: Parse current NUM_OF_VFS from firmware
  ansible.builtin.set_fact:
    cx6_fw_numvfs: >-
      {{ cx6_fw_query.results | map(attribute='stdout')
         | map('regex_search', 'NUM_OF_VFS\s+(\d+)', '\1')
         | map('first') | list }}

- name: Validate parsed NUM_OF_VFS values
  ansible.builtin.fail:
    msg: "Could not parse NUM_OF_VFS from mlxconfig output on {{ cx6_cards[idx].pci_slots[0] }}"
  loop: "{{ cx6_fw_numvfs }}"
  loop_control:
    index_var: idx
    label: "{{ cx6_cards[idx].pci_slots[0] }}"
  when: item is none or item | string == 'None'

- name: Set firmware NUM_OF_VFS on CX6 cards where it differs
  ansible.builtin.command:
    argv: [mlxconfig, -d, "{{ item.pci_slots[0] }}", -y, set, "NUM_OF_VFS={{ cx6_vf_count }}"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.pci_slots[0] }}"
    index_var: idx
  when: cx6_fw_numvfs[idx] | int != cx6_vf_count | int
  changed_when: true
  notify: Warn cold reboot needed

# =================================================================
# Firmware — ATS (Address Translation Services) for GPUDirect P2P
#
# ATS on the NIC allows DirectTrans ACS bit to enable direct P2P
# between NIC and GPU without root complex redirect. Requires the
# PEX switch ACS DirectTrans bit (set by pex-acs-p2p.service).
# Ref: https://docs.nvidia.com/ai-enterprise/planning-resource/optimizing-vm-configuration-ai-inference/latest/appendix.html
#      https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/troubleshooting.html#pci-access-control-services-acs
# =================================================================

- name: Parse current ATS_ENABLED from firmware
  ansible.builtin.set_fact:
    cx6_fw_ats: >-
      {{ cx6_fw_query.results | map(attribute='stdout')
         | map('regex_search', 'ATS_ENABLED\s+(\S+)', '\1')
         | map('first') | list }}

- name: Set firmware ATS_ENABLED on CX6 cards where it differs
  ansible.builtin.command:
    argv: [mlxconfig, -d, "{{ item.pci_slots[0] }}", -y, set, "ATS_ENABLED=True"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.pci_slots[0] }}"
    index_var: idx
  when:
    - cx6_ats_enabled | default(false) | bool
    - cx6_fw_ats[idx] | default('') != 'True(1)'
  changed_when: true
  notify: Warn cold reboot needed

# =================================================================
# udev rules (switchdev + VF creation)
# =================================================================

- name: Deploy udev rules for CX6 switchdev + VF creation
  ansible.builtin.template:
    src: 70-persistent-net-vf.rules.j2
    dest: /etc/udev/rules.d/70-persistent-net-vf.rules
    owner: root
    group: root
    mode: "0644"
    backup: true

# =================================================================
# Uplink auto-detection — find which PF has cable on each card
# =================================================================

- name: Bring all CX6 PFs up for link detection
  ansible.builtin.command:
    argv: [ip, link, set, "{{ item.1 }}", up]
  loop: "{{ cx6_cards | subelements('pf_ifaces') }}"
  loop_control:
    label: "{{ item.1 }}"
  changed_when: false

- name: Wait for link negotiation
  ansible.builtin.pause:
    seconds: 5

- name: Check link state on each CX6 PF
  ansible.builtin.command:
    argv: [ethtool, "{{ item.1 }}"]
  loop: "{{ cx6_cards | subelements('pf_ifaces') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: cx6_link_check
  changed_when: false

- name: Detect uplink PF for each card
  ansible.builtin.set_fact:
    cx6_uplinks: >-
      {% set result = [] -%}
      {% for card in cx6_cards -%}
        {% set ns = namespace(found='') -%}
        {% for pf in card.pf_ifaces -%}
          {% set check = cx6_link_check.results | selectattr('item.1', 'eq', pf) | first -%}
          {% if 'Link detected: yes' in check.stdout and ns.found == '' -%}
            {% set ns.found = pf -%}
          {% endif -%}
        {% endfor -%}
        {% if ns.found == '' -%}
          {{ result.append({'bridge': card.bridge, 'uplink': card.pf_ifaces[0], 'detected': false}) }}{%- else -%}
          {{ result.append({'bridge': card.bridge, 'uplink': ns.found, 'detected': true}) }}{%- endif -%}
      {% endfor -%}
      {{ result }}

- name: Warn if no link detected on any PF
  ansible.builtin.debug:
    msg: "WARNING — no cable detected on {{ item.bridge }}, defaulting to {{ item.uplink }}"
  loop: "{{ cx6_uplinks }}"
  loop_control:
    label: "{{ item.bridge }}"
  when: not item.detected

# =================================================================
# OVS global settings (systemd oneshot service)
#
# ifupdown2 recreates the OVS database on every boot, so globals
# set via ovs-vsctl do not persist across reboots. A oneshot
# service re-applies them after OVS starts.
# See docs/proxmox/CONNECTX6_SRIOV.md lines 492-496.
#
# tc-policy=none (not skip_sw): NVIDIA recommends tc-policy for debugging only.
# skip_sw blocks the software fallback path, preventing OVS IGMP snooping
# from forwarding reports to the physical uplink. none allows hw-offload
# for data traffic while IGMP control packets use the software path.
# Ref: https://docs.nvidia.com/networking/display/mlnxofedv531001/ovs+offload+using+asap%C2%B2+direct
# =================================================================

- name: Deploy CX6 OVS globals service
  ansible.builtin.template:
    src: cx6-ovs-globals.service.j2
    dest: /etc/systemd/system/cx6-ovs-globals.service
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart CX6 OVS globals

- name: Enable CX6 OVS globals service
  ansible.builtin.systemd:
    name: cx6-ovs-globals.service
    enabled: true
    daemon_reload: true

# =================================================================
# Network config (bridges)
# =================================================================

- name: Ensure source interfaces.d line in /etc/network/interfaces
  ansible.builtin.lineinfile:
    path: /etc/network/interfaces
    line: "source /etc/network/interfaces.d/*"
    state: present
    mode: "0644"

- name: Deploy CX6 bridge config
  ansible.builtin.template:
    src: cx6-bridges.conf.j2
    dest: /etc/network/interfaces.d/cx6-bridges.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Reload network interfaces

# =================================================================
# Representor config
# =================================================================

- name: Deploy representor config for each bridge
  ansible.builtin.template:
    src: vmbr-vfs.conf.j2
    dest: "/etc/network/interfaces.d/{{ item.bridge }}-vfs.conf"
    owner: root
    group: root
    mode: "0644"
    backup: true
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  notify: Reload network interfaces

# =================================================================
# Runtime verification — check live state, warn only on mismatch
# =================================================================

- name: Check eswitch mode on each PF
  ansible.builtin.command:
    argv: [devlink, dev, eswitch, show, "pci/{{ item.1 }}"]
  loop: "{{ cx6_cards | subelements('pci_slots') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: eswitch_check
  changed_when: false
  failed_when: false

- name: Check VF firmware max on first PF of each card
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.pf_ifaces[0] }}/device/sriov_totalvfs"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.pf_ifaces[0] }}"
  register: vf_totalvfs_check
  failed_when: false

- name: Check VF count on first PF of each card
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.pf_ifaces[0] }}/device/sriov_numvfs"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.pf_ifaces[0] }}"
  register: vf_count_check
  failed_when: false

- name: Check OVS hw-offload is enabled
  ansible.builtin.command:
    argv: [ovs-vsctl, get, Open_vSwitch, ., "other_config:hw-offload"]
  register: ovs_hwoffload_check
  changed_when: false
  failed_when: false

- name: Check OVS bridges exist
  ansible.builtin.command:
    argv: [ovs-vsctl, br-exists, "{{ item.bridge }}"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: bridge_check
  changed_when: false
  failed_when: false

- name: Warn if eswitch not in switchdev mode
  ansible.builtin.debug:
    msg: "REBOOT REQUIRED — {{ item.item.1 }} eswitch mode is not switchdev"
  loop: "{{ eswitch_check.results }}"
  loop_control:
    label: "{{ item.item.1 }}"
  when: "'switchdev' not in (item.stdout | default(''))"

- name: Flag if firmware VF max does not match
  ansible.builtin.set_fact:
    _cx6_reboot_needed: true
  loop: "{{ vf_totalvfs_check.results }}"
  loop_control:
    label: "{{ item.item.pf_ifaces[0] }}"
  when: item.content is not defined or (item.content | b64decode | trim) | int != cx6_vf_count | int
  changed_when: true
  notify: Warn cold reboot needed

- name: Warn if VF count does not match
  ansible.builtin.debug:
    msg: >-
      REBOOT REQUIRED — {{ item.item.pf_ifaces[0] }}
      {{ 'has ' ~ (item.content | b64decode | trim) ~ ' VFs' if item.content is defined else 'sriov_numvfs not readable' }},
      expected {{ cx6_vf_count }}
  loop: "{{ vf_count_check.results }}"
  loop_control:
    label: "{{ item.item.pf_ifaces[0] }}"
  when: item.content is not defined or (item.content | b64decode | trim) | int != cx6_vf_count | int

- name: Warn if OVS hw-offload is not enabled
  ansible.builtin.debug:
    msg: "OVS hw-offload is not enabled — restart cx6-ovs-globals.service or reboot"
  when: "'true' not in (ovs_hwoffload_check.stdout | default(''))"

- name: Warn if OVS bridge is missing
  ansible.builtin.debug:
    msg: "OVS bridge {{ item.item.bridge }} does not exist — run ifreload -a or reboot"
  loop: "{{ bridge_check.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: item.rc != 0

- name: Check IGMP snooping on OVS bridges
  ansible.builtin.command:
    argv: [ovs-vsctl, get, bridge, "{{ item.bridge }}", mcast_snooping_enable]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: mcast_check
  changed_when: false
  failed_when: false

- name: Warn if IGMP snooping is not enabled
  ansible.builtin.debug:
    msg: "IGMP snooping not enabled on {{ item.item.bridge }} — multicast will flood all ports"
  loop: "{{ mcast_check.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: "'true' not in (item.stdout | default(''))"
