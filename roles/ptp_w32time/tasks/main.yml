---
# ptp_w32time — Configure W32Time PTP client on render nodes
#
# Follows Microsoft's official PTP client configuration:
#   https://github.com/microsoft/W32Time/blob/master/Precision%20Time%20Protocol/Windows%20Configuration%20Helpers/PTPClientConfig.txt
#   https://learn.microsoft.com/en-us/windows-server/networking/windows-time-service/configuring-systems-for-high-accuracy
#
# Requires (group_vars):
#   ptp_masters: comma-separated PTP grandmaster IPs (e.g. "10.0.0.100")
#   ptp_domain: PTP domain number (e.g. 0)

# --- PTP Client provider (Microsoft PTPClientConfig.txt) ---

- name: Set PTP grandmaster(s)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: PtpMasters
    data: "{{ ptp_masters }}"
    type: string
  when: rivermax | default(false)

- name: Enable PTP client provider
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: Enabled
    data: 1
    type: dword
  when: rivermax | default(false)

- name: Set PTP client as input provider
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: InputProvider
    data: 1
    type: dword
  when: rivermax | default(false)

- name: Set PTP client DLL
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: DllName
    data: "C:\\Windows\\System32\\ptpprov.dll"
    type: string
  when: rivermax | default(false)

- name: Set PTP DelayPollInterval
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: DelayPollInterval
    data: 0x3e80
    type: dword
  when: rivermax | default(false)

- name: Set PTP AnnounceInterval
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: AnnounceInterval
    data: 0x0fa0
    type: dword
  when: rivermax | default(false)

# --- Multicast and delay settings ---

- name: Enable PTP multicast RX
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: EnableMulticastRx
    data: 1
    type: dword
  when: rivermax | default(false)

- name: Enable PTP multicast TX
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: EnableMulticastTx
    data: 1
    type: dword
  when: rivermax | default(false)

- name: Enable E2E delay correction
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: UseE2ECorrection
    data: 1
    type: dword
  when: rivermax | default(false)

- name: Set PTP domain number
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\PtpClient
    name: DomainNumber
    data: "{{ ptp_domain }}"
    type: dword
  when: rivermax | default(false)

# --- Disable competing time providers (per Microsoft guide) ---

- name: Disable NTP client provider
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\NtpClient
    name: Enabled
    data: 0
    type: dword
  when: rivermax | default(false)

- name: Disable Hyper-V VMIC time provider
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\VMICTimeProvider
    name: Enabled
    data: 0
    type: dword
  when: rivermax | default(false)

# --- High accuracy settings (Microsoft high-accuracy guide) ---

- name: Set MinPollInterval to 64s (log2 = 6)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config
    name: MinPollInterval
    data: 6
    type: dword
  when: rivermax | default(false)

- name: Set MaxPollInterval to 64s (log2 = 6)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config
    name: MaxPollInterval
    data: 6
    type: dword
  when: rivermax | default(false)

- name: Set UpdateInterval to 100
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config
    name: UpdateInterval
    data: 100
    type: dword
  when: rivermax | default(false)

- name: Set FrequencyCorrectRate to 2
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config
    name: FrequencyCorrectRate
    data: 2
    type: dword
  when: rivermax | default(false)

- name: Disable Secure Time Seeding
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config
    name: UtilizeSslTimeData
    data: 0
    type: dword
  when: rivermax | default(false)

# --- Firewall rules for PTP ---
# W32Time PTP joins 224.0.1.129 on ALL interfaces and receives duplicate
# packets (one per NIC). The triplicated PTP messages corrupt the PTP state
# machine on most nodes. Fix: block inbound PTP on non-media NICs using
# InterfaceAlias (localip doesn't work — multicast dst is 224.0.1.129).

- name: Allow PTP Event port (UDP 319)
  community.windows.win_firewall_rule:
    name: PTP Event (UDP 319)
    direction: in
    protocol: udp
    localport: 319
    action: allow
    enabled: true
  when: rivermax | default(false)

- name: Allow PTP General port (UDP 320)
  community.windows.win_firewall_rule:
    name: PTP General (UDP 320)
    direction: in
    protocol: udp
    localport: 320
    action: allow
    enabled: true
  when: rivermax | default(false)

- name: Block inbound PTP on non-media NICs
  ansible.windows.win_shell: |
    $mac = ("{{ mac_2110 }}" -replace ":", "-")
    $mediaNic = Get-NetAdapter | Where-Object { $_.MacAddress -eq $mac }
    if (-not $mediaNic) { throw "No adapter with MAC {{ mac_2110 }}" }

    $changed = $false
    $otherNics = Get-NetAdapter | Where-Object {
      $_.MacAddress -ne $mac -and $_.Status -eq "Up"
    }

    foreach ($nic in $otherNics) {
      $ruleName = "Block PTP inbound on $($nic.Name)"
      $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
      if (-not $existing) {
        New-NetFirewallRule -DisplayName $ruleName `
          -Direction Inbound -Protocol UDP -LocalPort 319,320 `
          -Action Block -Enabled True `
          -InterfaceAlias $nic.Name | Out-Null
        $changed = $true
      }
    }

    if ($changed) { "CHANGED" } else { "OK" }
  register: ptp_inbound_block
  changed_when: "'CHANGED' in ptp_inbound_block.stdout"
  when: rivermax | default(false)

- name: Block PTP on management NIC (outbound)
  community.windows.win_firewall_rule:
    name: Block PTP on management NIC
    direction: out
    protocol: udp
    localport: "319,320"
    action: block
    enabled: true
    localip: "{{ ansible_host }}"
  when: rivermax | default(false)

- name: Block PTP on storage NIC (outbound)
  community.windows.win_firewall_rule:
    name: Block PTP on storage NIC
    direction: out
    protocol: udp
    localport: "319,320"
    action: block
    enabled: true
    localip: "{{ ip_smb }}"
  when:
    - rivermax | default(false)
    - ip_smb is defined

# Ensure multicast route exists only on media NIC
- name: Pin multicast route to media NIC
  ansible.windows.win_shell: |
    $mac = ("{{ mac_2110 }}" -replace ":", "-")
    $nic = Get-NetAdapter | Where-Object { $_.MacAddress -eq $mac }
    if (-not $nic) { throw "No adapter with MAC $mac" }
    $idx = $nic.ifIndex

    $changed = $false

    # Remove 224.0.0.0/4 routes on non-media interfaces
    Get-NetRoute -DestinationPrefix "224.0.0.0/4" -ErrorAction SilentlyContinue |
      Where-Object { $_.InterfaceIndex -ne $idx } |
      ForEach-Object {
        Remove-NetRoute -InterfaceIndex $_.InterfaceIndex -DestinationPrefix "224.0.0.0/4" -Confirm:$false -ErrorAction SilentlyContinue
        $changed = $true
      }

    # Add route on media NIC if missing
    $existing = Get-NetRoute -DestinationPrefix "224.0.0.0/4" -InterfaceIndex $idx -ErrorAction SilentlyContinue
    if (-not $existing) {
      New-NetRoute -DestinationPrefix "224.0.0.0/4" -InterfaceIndex $idx -RouteMetric 1
      $changed = $true
    }

    if ($changed) { "CHANGED" } else { "OK" }
  register: mcast_route
  changed_when: "'CHANGED' in mcast_route.stdout"
  when: rivermax | default(false)

# --- Set W32Time to auto-start and restart ---

- name: Set W32Time service to automatic startup
  ansible.windows.win_service:
    name: w32time
    start_mode: auto
  when: rivermax | default(false)

- name: Apply W32Time config
  ansible.windows.win_command: w32tm /config /update
  when: rivermax | default(false)

- name: Restart W32Time service
  ansible.windows.win_service:
    name: w32time
    state: restarted
  when: rivermax | default(false)

- name: Force W32Time resync
  ansible.windows.win_command: w32tm /resync /force
  register: resync_result
  until: resync_result.rc == 0
  retries: 3
  delay: 2
  when: rivermax | default(false)

# --- Verify ---

- name: Query W32Time PTP status
  ansible.windows.win_command: w32tm /query /status /verbose
  register: w32time_status
  changed_when: false
  when: rivermax | default(false)

- name: Display W32Time status
  ansible.builtin.debug:
    msg: "{{ w32time_status.stdout_lines }}"
  when: rivermax | default(false)
