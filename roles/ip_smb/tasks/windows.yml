---
# ip_smb — Configure static IP on the SMB/storage VF (10.0.1.x)
#
# Requires (host_vars via Terraform):
#   mac_smb:  expected MAC address (e.g. "02:00:00:04:91:01")
#   ip_smb:   static IP for the storage network (e.g. "10.0.1.169")

- name: Ensure SMB adapter has TCP/IP bound
  ansible.windows.win_shell: |
    $mac = ("{{ mac_smb }}" -replace ":", "-")
    $nic = Get-NetAdapter | Where-Object { $_.MacAddress -eq $mac }
    if (-not $nic) { throw "No adapter with MAC $mac" }

    $netvsc = Get-NetAdapterBinding -Name $nic.Name |
      Where-Object { $_.ComponentID -eq 'netvsc_vfpp' -and $_.Enabled }
    $tcpip = Get-NetAdapterBinding -Name $nic.Name |
      Where-Object { $_.ComponentID -eq 'ms_tcpip' }

    if ($netvsc -and -not $tcpip) {
      Disable-NetAdapterBinding -Name $nic.Name -ComponentID netvsc_vfpp
      Disable-NetAdapter -Name $nic.Name -Confirm:$false
      Enable-NetAdapter -Name $nic.Name
      $timeout = 15
      while ($timeout-- -gt 0) {
        $tcpip = Get-NetAdapterBinding -Name $nic.Name -ErrorAction SilentlyContinue |
          Where-Object { $_.ComponentID -eq 'ms_tcpip' -and $_.Enabled }
        if ($tcpip) { break }
        Start-Sleep -Seconds 1
      }
      if (-not $tcpip) { throw "TCP/IP did not bind after disabling netvsc_vfpp" }
      "CHANGED"
    } else { "OK" }
  register: smb_tcpip
  changed_when: "'CHANGED' in smb_tcpip.stdout"

- name: Configure static IP on SMB adapter via netsh
  ansible.windows.win_shell: |
    $mac = ("{{ mac_smb }}" -replace ":", "-")
    $nic = Get-NetAdapter | Where-Object { $_.MacAddress -eq $mac }

    $current = Get-NetIPAddress -InterfaceIndex $nic.ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
      Where-Object { $_.IPAddress -notlike '169.*' }
    if ($current.IPAddress -eq "{{ ip_smb }}") { "OK"; return }

    netsh interface ipv4 set address name="$($nic.Name)" static {{ ip_smb }} 255.255.255.0
    if ($LASTEXITCODE -ne 0) { throw "netsh failed with exit code $LASTEXITCODE" }
    "CHANGED"
  register: smb_ip
  changed_when: "'CHANGED' in smb_ip.stdout"
