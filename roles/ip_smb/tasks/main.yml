---
# ip_smb — Configure static IP on the SMB Direct VF (10.0.1.x)
#
# Identifies the adapter by MAC address (set on the host via vf_mac role),
# then assigns ip_smb with /24 prefix.
#
# Requires (host_vars via Terraform):
#   mac_smb:    expected MAC address (e.g. "02:00:00:04:91:01")
#   ip_smb: static IP for the storage network (e.g. "10.0.1.169")

- name: Find SMB adapter by MAC
  ansible.windows.win_shell: |
    $mac = "{{ mac_smb }}" -replace ":", "-"
    $nic = Get-NetAdapter | Where-Object { $_.MacAddress -eq $mac }
    if (-not $nic) { throw "No adapter found with MAC $mac" }
    $nic.ifIndex
  register: smb_adapter
  changed_when: false

- name: Check current IP on SMB adapter
  ansible.windows.win_shell: |
    $ip = Get-NetIPAddress -InterfaceIndex {{ smb_adapter.stdout | trim }} -AddressFamily IPv4 -ErrorAction SilentlyContinue |
      Where-Object { $_.IPAddress -notlike '169.*' }
    if ($ip) { "CURRENT=$($ip.IPAddress)" } else { "NONE" }
  register: smb_current_ip
  changed_when: false

- name: Remove existing IPs on SMB adapter
  ansible.windows.win_shell: |
    Remove-NetIPAddress -InterfaceIndex {{ smb_adapter.stdout | trim }} -Confirm:$false
  when:
    - "'CURRENT=' in smb_current_ip.stdout"
    - "ip_smb not in smb_current_ip.stdout"
  changed_when: true

- name: Remove existing routes on SMB adapter
  ansible.windows.win_shell: |
    Remove-NetRoute -InterfaceIndex {{ smb_adapter.stdout | trim }} -Confirm:$false
  when:
    - "'CURRENT=' in smb_current_ip.stdout"
    - "ip_smb not in smb_current_ip.stdout"
  changed_when: true

- name: Assign storage network IP
  ansible.windows.win_shell: |
    New-NetIPAddress -InterfaceIndex {{ smb_adapter.stdout | trim }} -IPAddress {{ ip_smb }} -PrefixLength 24
  when: "ip_smb not in (smb_current_ip.stdout | default(''))"

- name: Disable DHCP on SMB adapter
  ansible.windows.win_shell: |
    Set-NetIPInterface -InterfaceIndex {{ smb_adapter.stdout | trim }} -Dhcp Disabled
  changed_when: false
