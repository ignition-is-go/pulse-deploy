---
# grafana — Grafana visualization server
#
# Installs Grafana OSS from the official apt repository and
# auto-provisions Prometheus as a datasource.
#
# Requires (group_vars):
#   grafana_prometheus_url: URL of the Prometheus server

- name: Install Grafana dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - wget
      - gnupg
    state: present

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Import Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg-full.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: "0644"

- name: Add Grafana apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    filename: grafana
    state: present

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Create provisioning datasources directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: root
    group: grafana
    mode: "0755"

- name: Provision Prometheus datasource
  ansible.builtin.template:
    src: prometheus-datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: "0640"
    backup: true
  notify: Restart grafana

- name: Ensure Grafana is running and enabled
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
