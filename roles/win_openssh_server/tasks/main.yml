---
# win_openssh_server — Enable OpenSSH Server and set to automatic start
#
# Uses Add-WindowsCapability (Server 2025 capability, not optional feature).

- name: Check if installed
  ansible.windows.win_shell: |
    $cap = Get-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
    $cap.State
  register: openssh_check
  changed_when: false

- name: Install capability
  ansible.windows.win_shell: |
    Add-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
  when: "'Installed' not in openssh_check.stdout"

- name: Set sshd service to automatic start
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started

- name: Set ssh-agent service to automatic start
  ansible.windows.win_service:
    name: ssh-agent
    start_mode: auto
    state: started

- name: Verify sshd is running
  ansible.windows.win_service_info:
    name: sshd
  register: sshd_info
  failed_when: sshd_info.services[0].state != 'started'
  changed_when: false
