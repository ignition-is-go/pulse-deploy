---
# samba_server — Samba file share
#
# Manages an authenticated SMB share with multiple auth users.
# Each entry in smb_users gets a Linux passwd entry + Samba passdb entry.
#
# Requires (group_vars):
#   smb_users:      List of {name, password} dicts — clients that can authenticate
#   smb_share_name: SMB share name (becomes [section] in smb.conf)
#   smb_share_path: Local filesystem path to share
#   smb_force_user: Linux user for all file I/O (must own the data on disk)
#
# Sources:
#   https://wiki.samba.org/index.php/Setting_up_Samba_as_a_Standalone_Server
#   https://www.samba.org/samba/docs/current/man-html/smb.conf.5.html

- name: Ensure Samba is installed
  ansible.builtin.apt:
    name: samba
    state: present

- name: Ensure auth users exist in system passwd
  ansible.builtin.user:
    name: "{{ item.name }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  loop: "{{ smb_users }}"
  when: item.name != 'root'
  no_log: true

- name: Check if auth users exist in Samba passdb
  ansible.builtin.command:
    argv:
      - pdbedit
      - -L
      - "{{ item.name }}"
  loop: "{{ smb_users }}"
  register: pdbedit_checks
  changed_when: false
  failed_when: false
  no_log: true

- name: Add missing auth users to Samba passdb
  ansible.builtin.command:
    argv:
      - smbpasswd
      - -a
      - -s
      - "{{ item.item.name }}"
    stdin: |-
      {{ item.item.password }}
      {{ item.item.password }}
  loop: "{{ pdbedit_checks.results }}"
  when: item.rc != 0
  changed_when: true
  no_log: true

- name: Update Samba passwords for existing auth users
  ansible.builtin.command:
    argv:
      - smbpasswd
      - -s
      - "{{ item.item.name }}"
    stdin: |-
      {{ item.item.password }}
      {{ item.item.password }}
  loop: "{{ pdbedit_checks.results }}"
  when: item.rc == 0
  no_log: true
  changed_when: false

- name: Configure global settings
  community.general.ini_file:
    path: /etc/samba/smb.conf
    section: global
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop:
    - { option: map to guest, value: never }
    - { option: server min protocol, value: SMB2_02 }
  notify: Reload smbd

- name: Configure SMB share
  community.general.ini_file:
    path: /etc/samba/smb.conf
    section: "{{ smb_share_name }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop:
    - { option: path, value: "{{ smb_share_path }}" }
    - { option: browseable, value: "yes" }
    - { option: read only, value: "no" }
    - { option: guest ok, value: "no" }
    - { option: valid users, value: "{{ smb_users | map(attribute='name') | join(' ') }}" }
    - { option: force user, value: "{{ smb_force_user }}" }
    - { option: create mask, value: "0664" }
    - { option: directory mask, value: "0775" }
  notify: Reload smbd

- name: Validate smb.conf
  ansible.builtin.command:
    argv:
      - testparm
      - -s
  changed_when: false

- name: Ensure Samba is running and enabled
  ansible.builtin.service:
    name: smbd
    state: started
    enabled: true
