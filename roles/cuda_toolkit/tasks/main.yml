---
# cuda_toolkit — Install NVIDIA CUDA Toolkit on Windows
#
# Installs CUDA toolkit (compiler, runtime, libraries).
# Does NOT install/override the GPU display driver.
#
# Requires:
#   cuda_version:        version string (default in defaults/main.yml)
#   cuda_installer_dir:  UNC path to installer directory on NAS
#   cuda_installer_file: installer filename

- name: Check if nvcc exists
  ansible.windows.win_stat:
    path: "{{ cuda_install_dir }}\\bin\\nvcc.exe"
  register: nvcc_check

- name: Get installed version
  ansible.windows.win_shell: |
    & "{{ cuda_install_dir }}\bin\nvcc.exe" --version |
      Select-String 'release' |
      ForEach-Object { ($_ -replace '.*release ([\d.]+),.*','$1').Trim() }
  register: cuda_version_check
  changed_when: false
  when: nvcc_check.stat.exists

- name: Show installed version
  ansible.builtin.debug:
    msg: >-
      CUDA Toolkit:
      {{ cuda_version_check.stdout | default('not_installed') | trim }}
      (expected {{ cuda_version }})

- name: Copy installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ cuda_installer_dir }}"
    win_robocopy_from_nas_file: "{{ cuda_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not nvcc_check.stat.exists or cuda_version_check.stdout | trim != cuda_version

- name: Install CUDA Toolkit (silent)
  ansible.windows.win_shell: |
    $p = Start-Process -FilePath "C:\Windows\Temp\{{ cuda_installer_file }}" `
      -ArgumentList '-s -n' `
      -Wait -PassThru
    $p.ExitCode
  async: 86400
  poll: 30
  register: cuda_install
  when: not nvcc_check.stat.exists or cuda_version_check.stdout | trim != cuda_version

- name: Verify nvcc exists
  ansible.windows.win_stat:
    path: "{{ cuda_install_dir }}\\bin\\nvcc.exe"
  register: nvcc_verify
  failed_when: not nvcc_verify.stat.exists

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ cuda_installer_file }}"
    state: absent
