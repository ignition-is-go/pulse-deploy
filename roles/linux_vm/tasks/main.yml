---
# linux_vm — Layer 1: Linux VM firewall
# UFW with default deny incoming, SSH allowed.
# NOT for hypervisors (use pve-firewall) or LXC (no cap_net_admin).

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
