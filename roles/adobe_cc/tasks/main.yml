---
# adobe_cc — Adobe Creative Cloud desktop app (Windows)
#
# Copies the CC installer and launches it in the interactive desktop session.
# The installer requires manual sign-in — it cannot be fully automated.
# After sign-in completes, re-run site.yml to verify installation.
#
# Requires (group_vars):
#   adobe_cc_installer_dir:  NAS directory containing Creative Cloud installer
#   adobe_cc_installer_file: Creative Cloud installer filename

- name: Check if installed
  ansible.windows.win_stat:
    path: C:\Program Files\Adobe\Adobe Creative Cloud\ACC\Creative Cloud.exe
  register: adobe_cc_check

- name: Copy installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ adobe_cc_installer_dir }}"
    win_robocopy_from_nas_file: "{{ adobe_cc_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not adobe_cc_check.stat.exists

- name: Create installer scheduled task
  community.windows.win_scheduled_task:
    name: ansible-cc-install
    actions:
      - path: "C:\\Windows\\Temp\\{{ adobe_cc_installer_file }}"
        arguments: --silent
    username: Administrator
    password: "{{ ansible_password }}"
    logon_type: interactive_token
    run_level: highest
    state: present
    enabled: true
  when: not adobe_cc_check.stat.exists

- name: Launch installer in interactive session
  ansible.windows.win_command:
    argv:
      - schtasks.exe
      - /Run
      - /TN
      - ansible-cc-install
  when: not adobe_cc_check.stat.exists

- name: Prompt — requires manual sign-in
  ansible.builtin.debug:
    msg: >-
      Adobe Creative Cloud installer launched on {{ inventory_hostname }}.
      Sign in via RustDesk/console to complete installation.
      Re-run site.yml afterward to verify.
  when: not adobe_cc_check.stat.exists

- name: Remove installer scheduled task
  community.windows.win_scheduled_task:
    name: ansible-cc-install
    state: absent
  when: adobe_cc_check.stat.exists

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ adobe_cc_installer_file }}"
    state: absent
  when: adobe_cc_check.stat.exists
