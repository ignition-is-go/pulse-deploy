---
# dropbox -- Dropbox desktop app (Windows)
#
# Installs Dropbox via enterprise MSI installer. Users sign in on first launch.
#
# Requires (group_vars):
#   dropbox_installer_dir:  NAS directory containing Dropbox MSI
#   dropbox_installer_file: Dropbox MSI filename

- name: Check if installed
  ansible.windows.win_stat:
    path: C:\Program Files (x86)\Dropbox\Client\Dropbox.exe
  register: dropbox_check

- name: Copy MSI from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ dropbox_installer_dir }}"
    win_robocopy_from_nas_file: "{{ dropbox_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not dropbox_check.stat.exists

- name: Install (silent)
  ansible.windows.win_package:
    path: "C:\\Windows\\Temp\\{{ dropbox_installer_file }}"
    state: present
  when: not dropbox_check.stat.exists
  register: dropbox_install

- name: Verify installation
  ansible.windows.win_stat:
    path: C:\Program Files (x86)\Dropbox\Client\Dropbox.exe
  register: dropbox_verify
  failed_when: not dropbox_verify.stat.exists

- name: Create desktop shortcut
  community.windows.win_shortcut:
    src: C:\Program Files (x86)\Dropbox\Client\Dropbox.exe
    dest: C:\Users\Public\Desktop\Dropbox.lnk

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ dropbox_installer_file }}"
    state: absent
