---
# cx6_sriov — ConnectX-6 SR-IOV + OVS switchdev for Proxmox hosts
#
# Writes all config (udev, OVS globals service, bridges, representors),
# then user reboots. Verify with tasks_from=verify after reboot.
#
# Firmware prerequisites (manual, not managed by this role):
#   LINK_TYPE_P1/P2=2 (Ethernet), SRIOV_EN=1, NUM_OF_VFS=8, VF_VPD_ENABLE=1
#   See docs/proxmox/CONNECTX6_SRIOV.md for mlxconfig steps
#
# Required variables:
#   cx6_cards    — list of CX6 card defs (from Terraform via group_vars/proxmox.yml)
#   cx6_vf_count, cx6_ovs_mtu

# =================================================================
# Preflight — validate hardware before writing any config
# =================================================================

- name: Fail if cx6_cards is not defined
  ansible.builtin.fail:
    msg: "cx6_cards must be defined for {{ inventory_hostname }}"
  when: cx6_cards is not defined or cx6_cards | length == 0

- name: Fail if any switchid is not set
  ansible.builtin.fail:
    msg: "switchid must be set for {{ item.bridge }} on {{ inventory_hostname }}"
  when: item.switchid is not defined or item.switchid == "" or item.switchid == "TODO"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"

- name: Verify CX6 PCI devices exist
  ansible.builtin.command:
    argv: [lspci, -s, "{{ item.1 }}"]
  loop: "{{ cx6_cards | subelements('pci_slots') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: preflight_pci
  changed_when: false
  failed_when: "preflight_pci.rc != 0 or 'ConnectX' not in preflight_pci.stdout"

- name: Verify PF interfaces exist
  ansible.builtin.stat:
    path: "/sys/class/net/{{ item.1 }}"
  loop: "{{ cx6_cards | subelements('pf_ifaces') }}"
  loop_control:
    label: "{{ item.1 }}"
  register: preflight_ifaces
  failed_when: not preflight_ifaces.stat.exists

- name: Verify switchids match hardware
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.pf_ifaces[0] }}/phys_switch_id"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: preflight_switchid
  failed_when: "(preflight_switchid.content | b64decode | trim) != item.switchid"

- name: Verify management bridge is not on CX6
  ansible.builtin.command:
    argv: [ip, -br, addr, show, dev, vmbr0]
  register: preflight_mgmt
  changed_when: false
  failed_when: >-
    preflight_mgmt.rc != 0 or
    preflight_mgmt.stdout | length == 0

# =================================================================
# Packages
# =================================================================

- name: Install OVS and networking packages
  ansible.builtin.apt:
    name:
      - openvswitch-switch
      - ifupdown2
      - patch
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Pin openvswitch-switch to prevent auto-update
  ansible.builtin.command:
    argv:
      - apt-mark
      - hold
      - openvswitch-switch
  register: apt_hold_result
  changed_when: "'already' not in apt_hold_result.stdout"

# =================================================================
# udev rules (switchdev + VF creation)
# =================================================================

- name: Deploy udev rules for CX6 switchdev + VF creation
  ansible.builtin.template:
    src: 70-persistent-net-vf.rules.j2
    dest: /etc/udev/rules.d/70-persistent-net-vf.rules
    owner: root
    group: root
    mode: "0644"
  notify: Reboot to apply CX6 SR-IOV changes

- name: Verify udev rules file deployed
  ansible.builtin.stat:
    path: /etc/udev/rules.d/70-persistent-net-vf.rules
  register: verify_udev_file
  failed_when: not verify_udev_file.stat.exists

# =================================================================
# OVS global settings (systemd oneshot service)
#
# ifupdown2 recreates the OVS database on every boot, so globals
# set via ovs-vsctl do not persist across reboots. A oneshot
# service re-applies them after OVS starts.
# See docs/proxmox/CONNECTX6_SRIOV.md lines 492-496.
# =================================================================

- name: Deploy CX6 OVS globals service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=CX6 OVS global settings (hw-offload, tc-policy, lacp-fallback-ab)
      After=openvswitch-switch.service
      Requires=openvswitch-switch.service

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/ovs-vsctl set Open_vSwitch . other_config:hw-offload=true
      ExecStart=/usr/bin/ovs-vsctl set Open_vSwitch . other_config:lacp-fallback-ab=true
      ExecStart=/usr/bin/ovs-vsctl set Open_vSwitch . other_config:tc-policy=skip_sw
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/cx6-ovs-globals.service
    owner: root
    group: root
    mode: "0644"
  notify: Reboot to apply CX6 SR-IOV changes

- name: Enable CX6 OVS globals service
  ansible.builtin.systemd:
    name: cx6-ovs-globals.service
    enabled: true
    daemon_reload: true

# =================================================================
# Network config (bridges + bonds)
# =================================================================

- name: Ensure source interfaces.d line in /etc/network/interfaces
  ansible.builtin.lineinfile:
    path: /etc/network/interfaces
    line: "source /etc/network/interfaces.d/*"
    state: present
    mode: "0644"

- name: Deploy CX6 bridge and bond config
  ansible.builtin.template:
    src: cx6-bridges.conf.j2
    dest: /etc/network/interfaces.d/cx6-bridges.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reboot to apply CX6 SR-IOV changes

- name: Verify bridge config file deployed
  ansible.builtin.stat:
    path: /etc/network/interfaces.d/cx6-bridges.conf
  register: verify_bridge_file
  failed_when: not verify_bridge_file.stat.exists

# =================================================================
# Representor config
# =================================================================

- name: Deploy representor config for each bridge
  ansible.builtin.template:
    src: vmbr-vfs.conf.j2
    dest: "/etc/network/interfaces.d/{{ item.bridge }}-vfs.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  notify: Reboot to apply CX6 SR-IOV changes

- name: Verify representor config files deployed
  ansible.builtin.stat:
    path: "/etc/network/interfaces.d/{{ item.bridge }}-vfs.conf"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: verify_rep_files
  failed_when: not verify_rep_files.stat.exists
