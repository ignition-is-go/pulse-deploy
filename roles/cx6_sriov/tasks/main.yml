---
# cx6_sriov — ConnectX-6 SR-IOV + OVS switchdev for Proxmox hosts
#
# Configures udev rules (switchdev + VF creation), OVS bridges with
# bonded PF uplinks, representor ports with ring buffer tuning, and
# OVS hw-offload.
#
# Firmware prerequisites (manual, not managed by this role):
#   LINK_TYPE_P1/P2=2 (Ethernet), SRIOV_EN=1, NUM_OF_VFS=8, VF_VPD_ENABLE=1
#   See docs/proxmox/CONNECTX6_SRIOV.md for mlxconfig steps
#
# Required host_vars:
#   cx6_cards    — list of CX6 card defs (switchid, pci_slots, pf_ifaces, rep_prefix, bridge, bond)
#
# Required group_vars (proxmox_cx6):
#   cx6_vf_count, cx6_ovs_mtu, cx6_rep_ring_rx, cx6_rep_ring_tx

# --- Preflight ---

- name: Fail if cx6_cards is not defined
  ansible.builtin.fail:
    msg: "cx6_cards must be defined in host_vars for {{ inventory_hostname }}"
  when: cx6_cards is not defined or cx6_cards | length == 0

- name: Fail if any switchid is not set
  ansible.builtin.fail:
    msg: "switchid must be discovered for {{ item.bridge }} on {{ inventory_hostname }}"
  when: item.switchid is not defined or item.switchid == "" or item.switchid == "TODO"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"

# --- Packages ---

- name: Install OVS and networking packages
  ansible.builtin.apt:
    name:
      - openvswitch-switch
      - ifupdown2
      - patch
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Pin openvswitch-switch to prevent auto-update
  ansible.builtin.command:
    argv:
      - apt-mark
      - hold
      - openvswitch-switch
  register: apt_hold_result
  changed_when: "'already' not in apt_hold_result.stdout"

# --- udev rules (switchdev + VF creation) ---

- name: Deploy udev rules for CX6 switchdev + VF creation
  ansible.builtin.template:
    src: 70-persistent-net-vf.rules.j2
    dest: /etc/udev/rules.d/70-persistent-net-vf.rules
    owner: root
    group: root
    mode: "0644"
  register: udev_changed
  notify: Reboot to apply CX6 SR-IOV changes

- name: "Verify: Check switchdev mode per card"
  ansible.builtin.command:
    argv:
      - devlink
      - dev
      - eswitch
      - show
      - "pci/{{ item.pci_slots[0] }}"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: verify_switchdev
  changed_when: false
  when: not udev_changed is changed

- name: "Verify: Assert switchdev mode active"
  ansible.builtin.assert:
    quiet: true
    that: "'switchdev' in item.stdout"
    fail_msg: "{{ item.item.bridge }}: switchdev NOT active on pci/{{ item.item.pci_slots[0] }}"
    success_msg: "{{ item.item.bridge }}: switchdev active"
  loop: "{{ verify_switchdev.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: not udev_changed is changed

- name: "Verify: Read sriov_numvfs per card"
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.pf_ifaces[0] }}/device/sriov_numvfs"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: verify_numvfs
  when: not udev_changed is changed

- name: "Verify: Assert VF count"
  ansible.builtin.assert:
    quiet: true
    that: "(item.content | b64decode | trim) | int == cx6_vf_count"
    fail_msg: "{{ item.item.bridge }}: {{ item.content | b64decode | trim }} VFs, expected {{ cx6_vf_count }}"
    success_msg: "{{ item.item.bridge }}: {{ cx6_vf_count }} VFs"
  loop: "{{ verify_numvfs.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: not udev_changed is changed

# --- OVS global settings ---

- name: Read current OVS other_config
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - get
      - Open_vSwitch
      - .
      - other_config
  register: ovs_other_config
  changed_when: false
  failed_when: false

- name: Set OVS hw-offload=true
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - set
      - Open_vSwitch
      - .
      - "other_config:hw-offload=true"
  when: "'hw-offload=\"true\"' not in (ovs_other_config.stdout | default(''))"
  changed_when: true
  notify: Restart openvswitch-switch

- name: Set OVS lacp-fallback-ab=true
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - set
      - Open_vSwitch
      - .
      - "other_config:lacp-fallback-ab=true"
  when: "'lacp-fallback-ab=\"true\"' not in (ovs_other_config.stdout | default(''))"
  changed_when: true
  notify: Restart openvswitch-switch

- name: Set OVS tc-policy=skip_sw
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - set
      - Open_vSwitch
      - .
      - "other_config:tc-policy=skip_sw"
  when: "'tc-policy=skip_sw' not in (ovs_other_config.stdout | default(''))"
  changed_when: true
  notify: Restart openvswitch-switch

- name: "Verify: Read OVS other_config"
  ansible.builtin.command:
    argv: [ovs-vsctl, get, Open_vSwitch, ., other_config]
  register: verify_ovs_cfg
  changed_when: false

- name: "Verify: Assert OVS global settings"
  ansible.builtin.assert:
    quiet: true
    that:
      - "'hw-offload=\"true\"' in verify_ovs_cfg.stdout"
      - "'tc-policy=skip_sw' in verify_ovs_cfg.stdout"
      - "'lacp-fallback-ab=\"true\"' in verify_ovs_cfg.stdout"
    fail_msg: "OVS other_config incomplete: {{ verify_ovs_cfg.stdout }}"
    success_msg: "OVS hw-offload, tc-policy, lacp-fallback-ab set"

# --- Network config (bridges + bonds) ---

- name: Ensure source interfaces.d line in /etc/network/interfaces
  ansible.builtin.lineinfile:
    path: /etc/network/interfaces
    line: "source /etc/network/interfaces.d/*"
    state: present
    mode: "0644"

- name: Deploy CX6 bridge and bond config
  ansible.builtin.template:
    src: cx6-bridges.conf.j2
    dest: /etc/network/interfaces.d/cx6-bridges.conf
    owner: root
    group: root
    mode: "0644"
  register: bridges_changed
  notify: Reboot to apply CX6 SR-IOV changes

- name: "Verify: Read OVS bridge list"
  ansible.builtin.command:
    argv: [ovs-vsctl, list-br]
  register: verify_br_list
  changed_when: false
  when: not bridges_changed is changed

- name: "Verify: Assert bridges exist"
  ansible.builtin.assert:
    quiet: true
    that: "item.bridge in verify_br_list.stdout_lines"
    fail_msg: "Bridge {{ item.bridge }} missing"
    success_msg: "{{ item.bridge }} present"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  when: not bridges_changed is changed

- name: "Verify: Check bond members per card"
  ansible.builtin.command:
    argv: [ovs-appctl, bond/show, "{{ item.bond }}"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bond }}"
  register: verify_bonds
  changed_when: false
  when: not bridges_changed is changed

- name: "Verify: Assert bond has both PF uplinks"
  ansible.builtin.assert:
    quiet: true
    that:
      - "item.item.pf_ifaces[0] in item.stdout"
      - "item.item.pf_ifaces[1] in item.stdout"
    fail_msg: "{{ item.item.bond }}: missing PF uplinks"
    success_msg: "{{ item.item.bond }}: {{ item.item.pf_ifaces | join(', ') }}"
  loop: "{{ verify_bonds.results }}"
  loop_control:
    label: "{{ item.item.bond }}"
  when: not bridges_changed is changed

- name: "Verify: Read bridge MTU per card"
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ item.bridge }}/mtu"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: verify_mtu
  when: not bridges_changed is changed

- name: "Verify: Assert bridge MTU"
  ansible.builtin.assert:
    quiet: true
    that: "(item.content | b64decode | trim) | int == cx6_ovs_mtu"
    fail_msg: "{{ item.item.bridge }}: MTU {{ item.content | b64decode | trim }}, expected {{ cx6_ovs_mtu }}"
    success_msg: "{{ item.item.bridge }}: MTU {{ cx6_ovs_mtu }}"
  loop: "{{ verify_mtu.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: not bridges_changed is changed

# --- Representor config ---

- name: Deploy representor config for each bridge
  ansible.builtin.template:
    src: vmbr-vfs.conf.j2
    dest: "/etc/network/interfaces.d/{{ item.bridge }}-vfs.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: reps_changed
  notify: Reboot to apply CX6 SR-IOV changes

- name: "Verify: List interfaces per bridge"
  ansible.builtin.command:
    argv: [ovs-vsctl, list-ifaces, "{{ item.bridge }}"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.bridge }}"
  register: verify_br_ifaces
  changed_when: false
  when: not reps_changed is changed

- name: "Verify: Assert representor count per bridge"
  ansible.builtin.assert:
    quiet: true
    that: "(item.stdout_lines | select('match', '^' ~ item.item.rep_prefix ~ '\\d+$') | list | length) == cx6_vf_count"
    fail_msg: "{{ item.item.bridge }}: expected {{ cx6_vf_count }} representors ({{ item.item.rep_prefix }}*)"
    success_msg: "{{ item.item.bridge }}: {{ cx6_vf_count }} representors attached"
  loop: "{{ verify_br_ifaces.results }}"
  loop_control:
    label: "{{ item.item.bridge }}"
  when: not reps_changed is changed

- name: "Verify: Check ring buffers on first representor per card"
  ansible.builtin.command:
    argv: [ethtool, -g, "{{ item.rep_prefix }}0"]
  loop: "{{ cx6_cards }}"
  loop_control:
    label: "{{ item.rep_prefix }}0"
  register: verify_rings
  changed_when: false
  when: not reps_changed is changed

- name: "Verify: Assert ring buffer sizes"
  ansible.builtin.assert:
    quiet: true
    that:
      - "item.stdout is regex('Current hardware settings:[\\s\\S]*?RX:\\s+' ~ (cx6_rep_ring_rx | string))"
      - "item.stdout is regex('Current hardware settings:[\\s\\S]*?TX:\\s+' ~ (cx6_rep_ring_tx | string))"
    fail_msg: "{{ item.item.rep_prefix }}0: ring buffers not at {{ cx6_rep_ring_rx }}/{{ cx6_rep_ring_tx }}"
    success_msg: "{{ item.item.rep_prefix }}0: RX={{ cx6_rep_ring_rx }} TX={{ cx6_rep_ring_tx }}"
  loop: "{{ verify_rings.results }}"
  loop_control:
    label: "{{ item.item.rep_prefix }}0"
  when: not reps_changed is changed
