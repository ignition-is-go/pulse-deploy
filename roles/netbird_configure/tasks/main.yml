---
# netbird_configure — Enroll Netbird client with management server
#
# Requires (group_vars):
#   netbird_setup_key: Setup key for enrollment (vault-encrypted)
#   netbird_management_url: Management server URL
#   netbird_admin_url: Admin server URL

- name: Windows — configure and enroll
  ansible.builtin.include_tasks: windows.yml
  when: ansible_os_family == "Windows"

- name: Linux — configure and enroll
  ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family == "Debian"
