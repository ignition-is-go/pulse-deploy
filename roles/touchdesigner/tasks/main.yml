---
# touchdesigner — TouchDesigner installation (Windows)
#
# Installs TouchDesigner from EXE on the deploy share via silent install.
#
# Requires (group_vars):
#   touchdesigner_installer_source: UNC path to installer EXE on NAS
#   touchdesigner_version: version string (e.g. "2025.32280")
#   touchdesigner_install_dir: install directory (check after first install)

- name: Check if TouchDesigner installed
  ansible.windows.win_stat:
    path: "{{ touchdesigner_install_dir }}\\bin\\TouchDesigner.exe"
  register: touch_check

- name: Copy TouchDesigner installer from NAS
  ansible.windows.win_copy:
    src: "{{ touchdesigner_installer_source }}"
    dest: C:\Windows\Temp\TouchDesigner.exe
    remote_src: true
  async: 1800
  poll: 0
  register: touch_copy_job
  when: not touch_check.stat.exists

- name: Wait for TouchDesigner installer copy
  ansible.builtin.async_status:
    jid: "{{ touch_copy_job.ansible_job_id }}"
  register: touch_copy_result
  until: touch_copy_result.finished
  retries: 120
  delay: 15
  when: not touch_check.stat.exists

- name: Install TouchDesigner (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\TouchDesigner.exe
      - /VERYSILENT
      - /NORESTART
  async: 1800
  poll: 0
  register: touch_install_job
  when: not touch_check.stat.exists

- name: Wait for TouchDesigner install
  ansible.builtin.async_status:
    jid: "{{ touch_install_job.ansible_job_id }}"
  register: touch_install_result
  until: touch_install_result.finished
  retries: 120
  delay: 15
  when: not touch_check.stat.exists

- name: Verify TouchDesigner installation
  ansible.windows.win_stat:
    path: "{{ touchdesigner_install_dir }}\\bin\\TouchDesigner.exe"
  register: touch_verify
  failed_when: not touch_verify.stat.exists

- name: Clean up TouchDesigner installer
  ansible.windows.win_file:
    path: C:\Windows\Temp\TouchDesigner.exe
    state: absent
