---
# win_reboot — Reboot a Windows host and wait for stable WinRM
#
# Usage from any role:
#   - name: Reboot after <reason>
#     ansible.builtin.include_role:
#       name: win_reboot
#     when: <condition>

- name: Reboot host
  ansible.windows.win_reboot:
    reboot_timeout: 300
    post_reboot_delay: 15

- name: Wait for OS boot to stabilize
  ansible.builtin.include_role:
    name: win_base
    tasks_from: wait_boot
