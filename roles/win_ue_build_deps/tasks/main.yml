---
# win_ue_build_deps — VS Build Tools (C++ workload), .NET Framework 4.6.2, .NET 8.0 Runtime
#
# Installs from an offline layout on the NAS (created by create-layout.ps1).
# No internet required on target nodes.
#
# Requires (group_vars):
#   vs_buildtools_layout_source: UNC path to offline layout directory on NAS
#   dotnet_runtime_installer_source: UNC path to windowsdesktop-runtime exe on NAS
#   netfx_devpack_installer_source: UNC path to NDP462 Developer Pack exe on NAS
#
# Sources:
#   https://dev.epicgames.com/documentation/en-us/unreal-engine/setting-up-visual-studio-development-environment-for-cplusplus-projects-in-unreal-engine
#   https://learn.microsoft.com/en-us/visualstudio/install/create-a-network-installation-of-visual-studio

- name: Check if VS Build Tools installed
  ansible.windows.win_stat:
    path: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Current\\Bin\\MSBuild.exe"
  register: msbuild_check

- name: Copy VS Build Tools layout from NAS
  ansible.windows.win_command: >-
    robocopy "{{ vs_buildtools_layout_source }}" "C:\Windows\Temp\vs_BuildTools" /MIR /NDL /R:5 /W:10
  async: 1800
  poll: 30
  register: vs_copy_result
  failed_when: vs_copy_result.rc >= 8
  changed_when: vs_copy_result.rc in [1, 3, 5, 7]
  when: not msbuild_check.stat.exists

- name: Install VS Build Tools from offline layout (silent)
  ansible.windows.win_shell: |
    $p = Start-Process -FilePath "C:\Windows\Temp\vs_BuildTools\vs_BuildTools.exe" `
      -ArgumentList "--noWeb --wait --quiet --norestart --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.26100 --add Microsoft.VisualStudio.Component.VC.ASAN --add Microsoft.VisualStudio.Component.VC.Llvm.Clang --add Microsoft.NetCore.Component.Runtime.8.0 --includeRecommended" `
      -Wait -PassThru
    exit $p.ExitCode
  when: not msbuild_check.stat.exists
  register: vs_install
  failed_when: vs_install.rc not in [0, 3010, 8005]
  async: 1800
  poll: 30

- name: Reboot after VS Build Tools install
  ansible.builtin.include_role:
    name: win_reboot
  when: vs_install is changed

- name: Verify MSBuild is callable
  ansible.windows.win_command:
    argv:
      - C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe
      - -version
  changed_when: false

- name: Clean up VS Build Tools installer cache
  ansible.windows.win_file:
    path: C:\Windows\Temp\vs_BuildTools
    state: absent

- name: Check if .NET Framework 4.6.2 targeting pack installed
  ansible.windows.win_stat:
    path: "C:\\Program Files (x86)\\Reference Assemblies\\Microsoft\\Framework\\.NETFramework\\v4.6.2"
  register: netfx_targeting_check

- name: Copy .NET Framework 4.6.2 Developer Pack from NAS
  ansible.windows.win_copy:
    src: "{{ netfx_devpack_installer_source }}"
    dest: C:\Windows\Temp\NDP462-DevPack.exe
    remote_src: true
  when: not netfx_targeting_check.stat.exists

- name: Install .NET Framework 4.6.2 Developer Pack (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\NDP462-DevPack.exe
      - /q
      - /norestart
  when: not netfx_targeting_check.stat.exists

- name: Verify .NET Framework 4.6.2 targeting pack is present
  ansible.windows.win_stat:
    path: "C:\\Program Files (x86)\\Reference Assemblies\\Microsoft\\Framework\\.NETFramework\\v4.6.2"
  register: netfx_targeting_verify
  failed_when: not netfx_targeting_verify.stat.exists

- name: Clean up .NET Framework Developer Pack installer
  ansible.windows.win_file:
    path: C:\Windows\Temp\NDP462-DevPack.exe
    state: absent

- name: Check if .NET 8.0 runtime host installed
  ansible.windows.win_stat:
    path: C:\Program Files\dotnet\dotnet.exe
  register: dotnet_host_check

- name: Copy .NET 8.0 Desktop Runtime installer from NAS
  ansible.windows.win_copy:
    src: "{{ dotnet_runtime_installer_source }}"
    dest: C:\Windows\Temp\windowsdesktop-runtime-8.0-win-x64.exe
    remote_src: true
  when: not dotnet_host_check.stat.exists

- name: Install .NET 8.0 Desktop Runtime (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\windowsdesktop-runtime-8.0-win-x64.exe
      - /install
      - /quiet
      - /norestart
  when: not dotnet_host_check.stat.exists

- name: Verify .NET 8.0 runtime host is present
  ansible.windows.win_stat:
    path: C:\Program Files\dotnet\dotnet.exe
  register: dotnet_host_verify
  failed_when: not dotnet_host_verify.stat.exists

- name: Clean up .NET runtime installer
  ansible.windows.win_file:
    path: C:\Windows\Temp\windowsdesktop-runtime-8.0-win-x64.exe
    state: absent
