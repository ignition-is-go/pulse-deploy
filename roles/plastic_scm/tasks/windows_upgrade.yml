---
# plastic_scm/tasks/windows_upgrade.yml — Upgrade Plastic SCM client in-place
#
# Runs in Session 0 (WinRM). Does NOT touch plastic4 config or workspace registrations.
# Expects plastic_installer to be set to the new version's installer filename.

- name: Check current Plastic version
  ansible.windows.win_shell: |
    & "{{ plastic_exe }}" version
  register: plastic_version_before
  changed_when: false
  failed_when: false

- name: Fail if Plastic is not installed
  ansible.builtin.fail:
    msg: "Plastic SCM is not installed at {{ plastic_exe }} — use plastic-install.yml first"
  when: plastic_version_before.rc != 0

- name: Show current version
  ansible.builtin.debug:
    msg: "Current: {{ plastic_version_before.stdout | trim }}"

- name: Stop Plastic processes
  ansible.windows.win_shell: |
    Stop-Process -Name plastic -Force -ErrorAction SilentlyContinue
    Stop-Process -Name cm -Force -ErrorAction SilentlyContinue
    Stop-Process -Name plasticfs -Force -ErrorAction SilentlyContinue
    Start-Sleep -Seconds 2
  failed_when: false
  changed_when: false

- name: Copy installer to temp
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "\\\\{{ deploy_share_host }}\\{{ deploy_share_name }}\\plastic"
    win_robocopy_from_nas_file: "{{ plastic_installer }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp

- name: Run Plastic SCM installer (silent upgrade)
  ansible.windows.win_shell: |
    Start-Process -FilePath "C:\Windows\Temp\{{ plastic_installer }}" `
      -ArgumentList "--mode", "unattended" `
      -Wait -NoNewWindow
    if (!(Test-Path "{{ plastic_exe }}")) {
      throw "Plastic SCM upgrade failed — {{ plastic_exe }} not found after install"
    }
  register: upgrade_result

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ plastic_installer }}"
    state: absent

- name: Check new Plastic version
  ansible.windows.win_shell: |
    & "{{ plastic_exe }}" version
  register: plastic_version_after
  changed_when: false

- name: Show upgrade result
  ansible.builtin.debug:
    msg: "Upgraded: {{ plastic_version_before.stdout | trim }} → {{ plastic_version_after.stdout | trim }}"
