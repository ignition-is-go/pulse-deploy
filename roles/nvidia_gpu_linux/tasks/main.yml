---
# nvidia_gpu_linux — Layer 1: NVIDIA driver + CUDA (Linux)
# TODO: Implement driver and CUDA installation when provisioning Linux GPU nodes

- name: Check for NVIDIA GPU
  ansible.builtin.command: lspci
  register: gpu_check
  changed_when: false
  failed_when: false

- name: Show GPU status
  ansible.builtin.debug:
    msg: "{{ gpu_check.stdout_lines | select('search', '(?i)nvidia') | list | default(['No NVIDIA GPU detected'], true) }}"

- name: Check nvidia-smi
  ansible.builtin.command:
    argv:
      - nvidia-smi
      - --query-gpu=name,driver_version,memory.total
      - --format=csv,noheader
  register: nvsmi_check
  changed_when: false
  failed_when: false

- name: Show nvidia-smi output
  ansible.builtin.debug:
    msg: "{{ nvsmi_check.stdout | default('nvidia-smi not available') }}"
