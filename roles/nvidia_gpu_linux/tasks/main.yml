---
# nvidia_gpu_linux — NVIDIA driver + CUDA for Linux GPU VMs
#
# Installs per DeepStream 8.0 dGPU setup guide:
#   1. NVIDIA driver via runfile
#   2. NVIDIA apt repository (apt-key + add-apt-repository)
#   3. CUDA toolkit via apt
#
# Requires:
#   nvidia_driver_version   — full version, e.g. "570.133.20"
#   cuda_toolkit_version    — e.g. "12-8"

- name: Check for NVIDIA GPU
  ansible.builtin.command:
    cmd: lspci
  register: gpu_check
  changed_when: false

- name: Fail if no NVIDIA GPU detected
  ansible.builtin.fail:
    msg: "No NVIDIA GPU detected in lspci output"
  when: gpu_check.stdout | regex_search('(?i)nvidia') is none

# --- NVIDIA driver (runfile) ---------------------------------------------------

- name: Check nvidia-smi
  ansible.builtin.command:
    cmd: nvidia-smi --query-gpu=driver_version --format=csv,noheader
  register: nvsmi_check
  changed_when: false
  failed_when: false

- name: Check if nouveau is loaded
  ansible.builtin.command:
    cmd: lsmod
  register: lsmod_check
  changed_when: false
  when: nvsmi_check.rc != 0

- name: Blacklist nouveau driver
  ansible.builtin.copy:
    content: |
      blacklist nouveau
      options nouveau modeset=0
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    mode: "0644"
  register: nouveau_blacklist
  when:
    - nvsmi_check.rc != 0
    - lsmod_check.stdout is search('nouveau')

- name: Rebuild initramfs after nouveau blacklist
  ansible.builtin.command:
    cmd: update-initramfs -u
  when: nouveau_blacklist is changed
  changed_when: true

- name: Reboot to unload nouveau
  ansible.builtin.reboot:
    msg: "Rebooting to unload nouveau driver"
    reboot_timeout: 300
  when: nouveau_blacklist is changed

- name: Wait for dpkg lock to be released
  ansible.builtin.shell:
    cmd: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
  changed_when: false
  when: nvsmi_check.rc != 0

- name: Install driver build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - "linux-headers-{{ ansible_kernel }}"
      - pkg-config
      - libglvnd-dev
    state: present
    update_cache: true
  when: nvsmi_check.rc != 0

- name: Download NVIDIA driver runfile
  ansible.builtin.get_url:
    url: "https://us.download.nvidia.com/tesla/{{ nvidia_driver_version }}/NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}.run"
    dest: "/tmp/NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}.run"
    mode: "0755"
  when: nvsmi_check.rc != 0

- name: Install NVIDIA driver via runfile
  ansible.builtin.command:
    cmd: "/tmp/NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}.run --silent --no-cc-version-check"
  register: driver_install
  changed_when: true
  when: nvsmi_check.rc != 0

- name: Reboot after driver install
  ansible.builtin.reboot:
    msg: "Rebooting for NVIDIA driver installation"
    reboot_timeout: 300
  when: driver_install is changed

- name: Verify nvidia-smi
  ansible.builtin.command:
    argv:
      - nvidia-smi
      - --query-gpu=name,driver_version,memory.total
      - --format=csv,noheader
  register: nvsmi_verify
  changed_when: false
  failed_when: nvsmi_verify.rc != 0 or nvidia_driver_version not in nvsmi_verify.stdout

- name: Show GPU status
  ansible.builtin.debug:
    msg: "{{ nvsmi_verify.stdout_lines }}"

# --- NVIDIA apt repository (for CUDA toolkit) ---------------------------------

- name: Add NVIDIA CUDA repository key
  ansible.builtin.apt_key:
    url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/3bf863cc.pub
    state: present

- name: Add NVIDIA CUDA repository
  ansible.builtin.apt_repository:
    repo: "deb https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/ /"
    state: present
    filename: cuda-ubuntu2404-x86_64

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

# --- CUDA toolkit -------------------------------------------------------------

- name: Check CUDA compiler
  ansible.builtin.stat:
    path: "/usr/local/cuda-{{ cuda_toolkit_version | replace('-', '.') }}/bin/nvcc"
  register: nvcc_check

- name: Install CUDA toolkit
  ansible.builtin.apt:
    name: "cuda-toolkit-{{ cuda_toolkit_version }}"
    state: present
  when: not nvcc_check.stat.exists

- name: Verify CUDA
  ansible.builtin.command:
    cmd: "/usr/local/cuda-{{ cuda_toolkit_version | replace('-', '.') }}/bin/nvcc --version"
  register: nvcc_verify
  changed_when: false
  failed_when: nvcc_verify.rc != 0 or cuda_toolkit_version | replace('-', '.') not in nvcc_verify.stdout

- name: Show CUDA version
  ansible.builtin.debug:
    msg: "{{ nvcc_verify.stdout_lines }}"
