---
# prometheus — Prometheus monitoring server
#
# Installs Prometheus from official binary release, configures
# systemd service and scrape targets.
#
# Requires (group_vars):
#   prometheus_version:       Release version (e.g. "3.10.0")
#   prometheus_scrape_configs: List of scrape job definitions

- name: Install prometheus dependencies
  ansible.builtin.apt:
    name:
      - tar
      - gzip
    state: present

- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Check current prometheus version
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: prometheus_bin

- name: Get installed prometheus version
  ansible.builtin.command:
    argv:
      - /usr/local/bin/prometheus
      - --version
  register: prometheus_installed_version
  changed_when: false
  failed_when: false
  when: prometheus_bin.stat.exists

- name: Download prometheus {{ prometheus_version }}
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    checksum: "sha256:{{ prometheus_sha256 }}"
    mode: "0644"
  when: >-
    not prometheus_bin.stat.exists or
    ('prometheus_version' not in (prometheus_installed_version.stderr | default('')))

- name: Extract prometheus binary
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: true
  when: >-
    not prometheus_bin.stat.exists or
    ('prometheus_version' not in (prometheus_installed_version.stderr | default('')))

- name: Install prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  loop:
    - prometheus
    - promtool
  notify: Restart prometheus
  when: >-
    not prometheus_bin.stat.exists or
    ('prometheus_version' not in (prometheus_installed_version.stderr | default('')))

- name: Deploy prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
    backup: true
    validate: /usr/local/bin/promtool check config %s
  notify: Reload prometheus

- name: Deploy prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prometheus

- name: Ensure prometheus is running and enabled
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true

- name: Clean up download artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    - "/tmp/prometheus-{{ prometheus_version }}.linux-amd64"
  changed_when: false
