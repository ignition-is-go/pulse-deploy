---
# ndi_tools — NDI 6 Tools (runtime + Studio Monitor)
#
# Installs NDI Tools silently via Inno Setup installer.
# Sets NDI_RUNTIME_DIR_V5 environment variable for UE NDI plugin.
#
# Requires (group_vars):
#   ndi_tools_installer_source: UNC path to NDI 6 Tools exe on NAS

- name: Check if NDI Tools installed
  ansible.windows.win_stat:
    path: C:\Program Files\NDI\NDI 6 Tools\NDI Launcher.exe
  register: ndi_check

- name: Copy NDI Tools installer from NAS
  ansible.windows.win_copy:
    src: "{{ ndi_tools_installer_source }}"
    dest: C:\Windows\Temp\ndi_tools_setup.exe
    remote_src: true
  when: not ndi_check.stat.exists

- name: Install NDI Tools (silent)
  ansible.windows.win_command:
    argv:
      - C:\Windows\Temp\ndi_tools_setup.exe
      - /VERYSILENT
      - /NORESTART
  when: not ndi_check.stat.exists

- name: Verify NDI Tools installed
  ansible.windows.win_stat:
    path: C:\Program Files\NDI\NDI 6 Tools\NDI Launcher.exe
  register: ndi_verify
  failed_when: not ndi_verify.stat.exists

- name: Verify NDI runtime env var is set
  ansible.windows.win_shell: |
    $val = [System.Environment]::GetEnvironmentVariable('NDI_RUNTIME_DIR_V5', 'Machine')
    if ($val) { "NDI_RUNTIME_DIR_V5=$val" } else { "NOT_SET" }
  register: ndi_env_check
  changed_when: false
  failed_when: "'NOT_SET' in ndi_env_check.stdout"

- name: Clean up NDI Tools installer
  ansible.windows.win_file:
    path: C:\Windows\Temp\ndi_tools_setup.exe
    state: absent
