---
# ndi_tools — NDI 6 Tools (runtime + Studio Monitor)
#
# Installs NDI Tools silently via Inno Setup installer.
# Sets NDI_RUNTIME_DIR_V5 environment variable for UE NDI plugin.
#
# Requires (group_vars):
#   ndi_tools_installer_dir:  NAS directory containing NDI Tools installer
#   ndi_tools_installer_file: NDI Tools installer filename

- name: Check if installed
  ansible.windows.win_stat:
    path: C:\Program Files\NDI\NDI 6 Tools\NDI Launcher.exe
  register: ndi_check

- name: Copy installer from NAS
  ansible.builtin.include_role:
    name: win_robocopy_from_nas
  vars:
    win_robocopy_from_nas_src: "{{ ndi_tools_installer_dir }}"
    win_robocopy_from_nas_file: "{{ ndi_tools_installer_file }}"
    win_robocopy_from_nas_dest: C:\Windows\Temp
  when: not ndi_check.stat.exists

- name: Install (silent)
  ansible.windows.win_command:
    argv:
      - "C:\\Windows\\Temp\\{{ ndi_tools_installer_file }}"
      - /VERYSILENT
      - /NORESTART
  when: not ndi_check.stat.exists

- name: Verify installation
  ansible.windows.win_stat:
    path: C:\Program Files\NDI\NDI 6 Tools\NDI Launcher.exe
  register: ndi_verify
  failed_when: not ndi_verify.stat.exists

- name: Verify runtime env var is set
  ansible.windows.win_shell: |
    $val = [System.Environment]::GetEnvironmentVariable('NDI_RUNTIME_DIR_V5', 'Machine')
    if ($val) { "NDI_RUNTIME_DIR_V5=$val" } else { "NOT_SET" }
  register: ndi_env_check
  changed_when: false
  failed_when: "'NOT_SET' in ndi_env_check.stdout"

- name: Clean up installer
  ansible.windows.win_file:
    path: "C:\\Windows\\Temp\\{{ ndi_tools_installer_file }}"
    state: absent
