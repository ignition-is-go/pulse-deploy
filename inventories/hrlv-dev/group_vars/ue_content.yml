---
# nDisplay cluster configuration

nvidia_supported_gpus: ["RTX 6000 Ada"]
vdd_width: 2560
vdd_height: 1440

unreal_project: "{{ plastic_workspace }}/ue/HRLV_Content/HRLV_Content.uproject"

# Available maps — select with: -e "map=lookdev"
map_options:
  content: "/Game/HRLV_Content/Maps/PL_ContentHostSend_v7"
  lookdev: "/Game/HRLV_Content/Maps/Dev/LookDev/ColorCharts_v3"

# Default map (override with -e "map=...")
map: content
map_path: "{{ map_options[map] }}"

# Available nDisplay configs — select with: -e "config=rivermax_4node"
ndisplay_configs:
  rm_fullres_8node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplayConfig_RM_FullRes_8Node_Prod1.ndisplay"
  rm_fullres_8node_prod2: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplayConfig_RM_FullRes_8Node_Prod2.ndisplay"
  rm_halfres_4node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/4Node/nDisplayConfig_RM_HalfRes_4Node_Prod1.ndisplay"
  rm_1node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/1Node/nDisplayConfig_RM_1Node_7680.ndisplay"
  ndi_4node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/4Node/nDisplayConfig_NDI_4Node.ndisplay"

# Default config (override with -e "config=...")
config: rm_fullres_8node_prod1
ndisplay_config: "{{ ndisplay_configs[config] }}"

# Concert (Multi-User Editing) — render nodes connect to this server
# concert_server_ip flows from Terraform via ansible_host variables
concert_server_port: 6666
concert_session: "HRLV_Content"
concert_server_name: "HRLV-MU-Server"
