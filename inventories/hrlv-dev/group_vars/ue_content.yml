---
# nDisplay cluster configuration

nvidia_supported_gpus: ["RTX 6000 Ada"]

# Rivermax GPUDirect RDMA — proven working on CX6 VFs + RTX 6000 Ada
rivermax_gpudirect: true
vdd_width: 2560
vdd_height: 1440

unreal_project: "{{ plastic_workspace }}/ue/HRLV_Content/HRLV_Content.uproject"

# Available maps — select with: -e "map=lookdev"
map_options:
  content: "/Game/HRLV_Content/Maps/PL_ContentHostSend_v7"
  lookdev: "/Game/HRLV_Content/Maps/Dev/LookDev/ColorCharts_v3"

# Default map (override with -e "map=...")
map: content
map_path: "{{ map_options[map] }}"

# Available nDisplay configs — select with: -e "config=rivermax_4node"
ndisplay_configs:
  rm_fullres_8node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplayConfig_RM_FullRes_8Node_Prod1.ndisplay"
  rm_fullres_packed_8node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplay_RM_FullRes_Packed_8Node_Prod1.ndisplay"
  rm_fullres_8node_prod2: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplayConfig_RM_FullRes_8Node_Prod2.ndisplay"
  rm_fullres_packed_8node_prod2: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/8Node/nDisplay_RM_FullRes_Packed_8Node_Prod2.ndisplay"
  rm_halfres_4node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/4Node/nDisplayConfig_RM_HalfRes_4Node_Prod1.ndisplay"
  rm_16k_1node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/1Node/nDisplayConfig_RM_1Node_16384_Prod1.ndisplay"
  rm_1920_1node_prod1: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/1Node/nDisplayConfig_RM_1Node_1920_Prod1.ndisplay"
  ndi_4node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/4Node/nDisplayConfig_NDI_4Node.ndisplay"

# Default config (override with -e "config=...")
config: rm_fullres_8node_prod1
ndisplay_config: "{{ ndisplay_configs[config] }}"

# Concert (Multi-User Editing) — render nodes connect to this server
# concert_server_ip flows from Terraform via ansible_host variables
concert_server_port: 6666
concert_session: "HRLV_Content"
concert_server_name: "HRLV-MU-Server"

# --- UE INI overrides (passed as -ini: flags at launch) ---
# Each fragment is a separate -ini: flag. Multiple flags for the same INI file
# are fine — UE processes them left to right, last key wins.
# Add/remove fragments per group or per host to change launch behavior.

# nDisplay engine — required for DisplayCluster game engine
# yamllint disable-line rule:line-length
ini_ndisplay_engine: "-ini:Engine:[/Script/Engine.Engine]:GameEngine=/Script/DisplayCluster.DisplayClusterGameEngine,[/Script/Engine.Engine]:GameViewportClientClassName=/Script/DisplayCluster.DisplayClusterViewportClient,[/Script/Engine.UserInterfaceSettings]:bAllowHighDPIInGameMode=True,[/Script/Engine.UserInterfaceSettings]:bAllowHighDpiWhenUnattended=True"

# nDisplay input — prevents mouse from controlling camera
ini_ndisplay_input: "-ini:Input:[/Script/Engine.InputSettings]:DefaultPlayerInputClass=/Script/DisplayCluster.DisplayClusterPlayerInput"

# Rivermax — multi-SRD output + PTP interface binding
ini_rivermax: "-ini:Engine:[ConsoleVariables]:Rivermax.Output.EnableMultiSRD=1,[/Script/RivermaxCore.RivermaxSettings]:PTPInterfaceAddress=10.0.0.*"

# Game settings — borderless window mode for nDisplay
ini_game: "-ini:Game:[/Script/EngineSettings.GeneralProjectSettings]:bUseBorderlessWindow=True"

# Concert — disable multicast, disable QUIC (unicast only)
# yamllint disable-line rule:line-length
ini_concert: "-ini:Engine:[/Script/UdpMessaging.UdpMessagingSettings]:MulticastEndpoint=0.0.0.0:0,[/Script/UdpMessaging.UdpMessagingSettings]:MulticastTimeToLive=0,[/Script/QuicMessaging.QuicMessagingSettings]:EnableTransport=False"
