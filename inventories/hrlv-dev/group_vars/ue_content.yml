---
# nDisplay cluster configuration

rivermax: true

nvidia_supported_gpus: ["RTX 6000 Ada"]
vdd_width: 2560
vdd_height: 1440

unreal_project: "{{ plastic_workspace }}/ue/HRLV_Content/HRLV_Content.uproject"

# Map/level to load
ndisplay_map: "/Game/HRLV_Content/Maps/PL_ContentHostSend_v7"

# Available nDisplay configs — select with: -e "ndisplay=rivermax_4node"
ndisplay_configs:
  rivermax_4node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/nDisplayConfig_Rivermax_4Node.ndisplay"
  rivermax_1node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/nDisplayConfig_Rivermax_1Node.ndisplay"
  ndi_4node: "{{ plastic_workspace }}/ue/HRLV_Content/Content/HRLV_Content/Stages/nDisplayConfig_NDI_4Node.ndisplay"

# Default config (override with -e "ndisplay=...")
ndisplay: rivermax_4node
ndisplay_config: "{{ ndisplay_configs[ndisplay] }}"

# Concert (Multi-User Editing) — render nodes connect to this server
concert_server_ip: "192.168.1.153"
concert_server_port: 6666
concert_session: "HRLV_Content"
concert_server_name: "HRLV-MU-Server"
