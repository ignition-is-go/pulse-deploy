---
# Global defaults — references vault-encrypted secrets

# Render server
render_server_url: "{{ vault_render_server_url }}"

# Deploy share (SMB on pulse-admin)
deploy_share: "\\\\192.168.1.70\\deploy"

# NVIDIA RTX Enterprise driver (covers RTX A4000, RTX 6000 Ada, etc.)
nvidia_driver_source: "{{ deploy_share }}\\installers\\nvidia-driver\\582.16\\582.16-nvidia-rtx-winserv-2022-2025-64bit-international-dch-whql.exe"

# Visual C++ Redistributable (required by UE shader compiler)
vcredist_installer_source: "{{ deploy_share }}\\installers\\vcredist\\latest\\vc_redist.x64.exe"

# Google Chrome (offline standalone installer)
chrome_installer_source: "{{ deploy_share }}\\installers\\chrome\\latest\\ChromeSetup.exe"

# Git deploy key (SSH)
git_deploy_key: "{{ vault_git_deploy_key }}"

# Netbird mesh VPN
netbird_management_url: "https://net.rship.io"
netbird_admin_url: "https://net.rship.io"
netbird_setup_key: "{{ vault_netbird_setup_key }}"

# Proxmox VE API
proxmox_api_url: "{{ vault_proxmox_api_url }}"
proxmox_api_user: "{{ vault_proxmox_api_user }}"
proxmox_api_password: "{{ vault_proxmox_api_password }}"
