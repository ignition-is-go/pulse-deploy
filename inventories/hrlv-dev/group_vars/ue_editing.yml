---
# Concert multi-user editor node — live scene editing for nDisplay cluster

nvidia_supported_gpus: ["RTX 6000 Ada"]
vdd_width: 2560
vdd_height: 1440

unreal_project: "{{ plastic_workspace }}/ue/HRLV_Content/HRLV_Content.uproject"

# Concert (Multi-User Editing) — this node runs the Concert server
# concert_server_ip flows from Terraform via ansible_host variables
concert_server_port: 6666
concert_session: "HRLV_Content"
concert_server_name: "HRLV-MU-Server"

# --- UE INI overrides ---
# Concert — disable multicast, disable QUIC (unicast only)
# yamllint disable-line rule:line-length
ini_concert: "-ini:Engine:[/Script/UdpMessaging.UdpMessagingSettings]:MulticastEndpoint=0.0.0.0:0,[/Script/UdpMessaging.UdpMessagingSettings]:MulticastTimeToLive=0,[/Script/QuicMessaging.QuicMessagingSettings]:EnableTransport=False"
