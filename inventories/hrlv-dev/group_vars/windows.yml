---
# Windows group vars — applied to all Windows VMs
# WinRM connection vars are set in inventory/hosts.yml under windows.vars

ansible_user: "{{ vault_win_user }}"
ansible_password: "{{ vault_win_password }}"

# PTP (applied when rivermax: true)
ptp_masters: "10.0.0.100"
ptp_domain: 0

# WinOF-2 driver (uses management NIC — must work before VF is configured)
winof2_installer_dir: "{{ nas_share_mgmt }}\\installers\\winof2\\24.10.50010"
winof2_installer_file: MLNX_WinOF2-24_10_50010_All_x64.exe

# Rivermax (applied when rivermax: true)
rivermax_version: "1.81.21"

# Plastic SCM
plastic_exe: "C:/Program Files/PlasticSCM5/client/cm.exe"
plastic_workspace: "C:/P-0616-HRLV"
plastic_repo: "P-0616-HRLV"
plastic_cloud_org: "{{ vault_plastic_cloud_org }}"
plastic_cloud_user: "{{ vault_plastic_cloud_user }}"
plastic_api_key: "{{ vault_plastic_api_key }}"

# Netbird
netbird_installer_dir: "{{ nas_share }}\\installers\\netbird\\0.66.0"
netbird_installer_file: netbird_installer_0.66.0_windows_amd64.exe
