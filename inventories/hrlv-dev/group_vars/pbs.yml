---
# Samba share on PBS — serves installers and workspaces to Windows and Linux clients
# NFS exports — shared storage for Proxmox cluster (templates, ISOs)

# SMB storage network (10.0.1.x) — CX6 direct attach
ip_smb: "10.0.1.31"

smb_users:
  - name: "{{ vault_win_user }}"
    password: "{{ vault_win_password }}"
  - name: "{{ vault_linux_user }}"
    password: "{{ vault_linux_password }}"
smb_force_user: root
smb_share_name: share
smb_share_path: /mnt/datastore/tank/share

nfs_exports:
  - path: /mnt/datastore/tank/nfs
    clients: "192.168.1.0/24"
    options: "rw,sync,no_subtree_check,no_root_squash"
    zfs_dataset: tank/nfs
