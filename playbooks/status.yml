---
# Check status of all render nodes
#
# Usage: ansible-playbook playbooks/status.yml
#        ansible-playbook playbooks/status.yml --limit windows-unreal-03

- name: Check Render Node Status
  hosts: ue
  gather_facts: true
  ignore_unreachable: true

  tasks:
    - name: Check worker process
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq worker.exe" /NH
      register: worker_status
      changed_when: false

    - name: Check UE process
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_status
      changed_when: false

    - name: Display status
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }}: {{ ansible_processor_vcpus }} cores, {{ (ansible_memtotal_mb / 1024) | round(1) }}GB RAM
          Worker: {{ 'RUNNING' if 'worker.exe' in worker_status.stdout else 'STOPPED' }}
          Unreal: {{ 'RENDERING' if 'UnrealEditor.exe' in ue_status.stdout else 'IDLE' }}
