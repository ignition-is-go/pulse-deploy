---
# Start Rivermax media_receiver (persistent, runs until stopped)
# Listens for a 2110-20 stream on the node's ip_2110.
#
# Usage:
#   ansible-playbook playbooks/rmax-media-receiver-start.yml --limit ue-previs-01 -e "rmax_src_ip=10.0.0.169 rmax_dst_ip=239.0.0.1"
#   ansible-playbook playbooks/rmax-media-receiver-start.yml --limit ue-previs-01 -e '{"rmax_src_ip":"10.0.0.169","rmax_dst_ip":"239.0.0.1","rmax_width":"3840","rmax_height":"2160","rmax_fps":"60","rmax_depth":"10"}'

- name: Start Rivermax media_receiver
  hosts: windows
  gather_facts: false

  vars:
    rmax_receiver: 'C:\Program Files\Mellanox\Rivermax\apps\media_receiver\media_receiver.exe'
    rmax_src_ip: "10.0.0.1"
    rmax_dst_ip: "{{ ip_2110 }}"
    rmax_dst_port: 50000
    rmax_width: "1920"
    rmax_height: "1080"
    rmax_depth: "8"
    rmax_fps: "30"
    rmax_sampling: "YCbCr-4:2:2"

  tasks:
    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: "C:\\Windows\\Temp"
        state: directory

    - name: Write SDP file
      ansible.windows.win_copy:
        content: |
          v=0
          o=- 0 0 IN IP4 {{ rmax_src_ip }}
          s=Rivermax RX {{ inventory_hostname }}
          c=IN IP4 {{ rmax_dst_ip }}/1
          t=0 0
          m=video {{ rmax_dst_port }} RTP/AVP 96
          a=rtpmap:96 raw/90000
          a=fmtp:96 sampling={{ rmax_sampling }}; width={{ rmax_width }}; height={{ rmax_height }}; depth={{ rmax_depth }}; exactframerate={{ rmax_fps }}; colorimetry=BT709; PM=2110GPM; SSN=ST2110-20:2017; TP=2110TPN
          a=source-filter: incl IN IP4 {{ rmax_dst_ip }} {{ rmax_src_ip }}
        dest: C:\Windows\Temp\rmax-rx.sdp

    - name: Write RX launch script
      ansible.windows.win_copy:
        content: |
          & "{{ rmax_receiver }}" --sdp-file C:\Windows\Temp\rmax-rx.sdp -i {{ ip_2110 }} 2>&1 | Tee-Object -FilePath C:\Windows\Temp\rmax-rx.log
        dest: C:\Windows\Temp\rmax-rx.ps1

    - name: Create RX scheduled task
      community.windows.win_scheduled_task:
        name: RivermaxMediaReceiver
        description: Rivermax media_receiver
        actions:
          - path: powershell.exe
            arguments: -ExecutionPolicy Bypass -File C:\Windows\Temp\rmax-rx.ps1
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

    - name: Start RX
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "RivermaxMediaReceiver"

    - name: Wait for media_receiver to start
      ansible.windows.win_shell: |
        (Get-Process -Name media_receiver -ErrorAction SilentlyContinue).Id
      register: rx_check
      until: rx_check.stdout | trim | length > 0
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false

    - name: Show RX status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ip_2110 }}): RUNNING (PID: {{ rx_check.stdout | trim }})"
      when: rx_check.stdout | trim | length > 0

    - name: Read RX log on failure
      ansible.windows.win_shell: |
        if (Test-Path C:\Windows\Temp\rmax-rx.log) { Get-Content C:\Windows\Temp\rmax-rx.log -Tail 20 } else { Write-Host "No log file" }
      register: rx_log
      changed_when: false
      when: rx_check.stdout | trim | length == 0

    - name: Show RX failure
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ip_2110 }}): FAILED TO START\n{{ rx_log.stdout }}"
      when: rx_check.stdout | trim | length == 0
