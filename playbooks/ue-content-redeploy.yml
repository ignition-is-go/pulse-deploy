---
# Full content redeploy: stop cluster → update Plastic → mirror to nodes → start cluster
#
# Sequence:
#   1. Stop nDisplay on content nodes (safe — headless renderers, no state)
#   2. Update Plastic SCM on staging node (pull latest from cloud)
#   3. Mirror staging → NAS → content/previs nodes (robocopy)
#   4. Start nDisplay cluster (preflight + launch)
#
# Usage:
#   ansible-playbook playbooks/ue-content-redeploy.yml
#   ansible-playbook playbooks/ue-content-redeploy.yml -e "skip_preflight=true"
#   ansible-playbook playbooks/ue-content-redeploy.yml -e "changeset=1646"
#   ansible-playbook playbooks/ue-content-redeploy.yml -e "robocopy_dry_run=true"

- name: "Phase 1 — Stop nDisplay cluster"
  ansible.builtin.import_playbook: ue-content-stop.yml

- name: "Phase 2 — Update Plastic SCM on staging"
  ansible.builtin.import_playbook: plastic-update.yml

- name: "Phase 3 — Mirror staging → NAS → cluster nodes"
  ansible.builtin.import_playbook: mirror-staging-nas-cluster.yml

- name: "Phase 4 — Start nDisplay cluster"
  ansible.builtin.import_playbook: ue-content-start.yml
