---
# site.yml — Full convergence playbook
#
# Applies all layers to every node type. Idempotent and safe to re-run.
#
# Usage:
#   ansible-playbook playbooks/site.yml                              # everything
#   ansible-playbook playbooks/site.yml --limit windows              # all Windows
#   ansible-playbook playbooks/site.yml --limit ue                   # UE nodes only
#   ansible-playbook playbooks/site.yml --limit windows-unreal-03    # single node
#   ansible-playbook playbooks/site.yml --limit rship                # rship nodes only
#   ansible-playbook playbooks/site.yml --check                      # dry run

# === Preflight ===

- name: Preflight — wait for Windows boot stability
  hosts: windows
  gather_facts: false
  tasks:
    - name: Wait for OS boot to stabilize
      ansible.builtin.include_role:
        name: win_base
        tasks_from: wait_boot

# === Windows VMs ===

- name: Base config — all Windows
  hosts: windows
  gather_facts: true
  roles:
    - win_base
    - win_theme
    - win_disable_wlms
    - win_disable_watermark

- name: GPU validation — Windows nodes with GPUs
  hosts: ue_content:ue_editing:ue_previs:ue_plugin_dev:arnold_fusion:workstation
  gather_facts: false
  roles:
    - nvidia_gpu_win
    - virtual_display_driver
    - role: ip_2110
      when: mac_2110 is defined
    - role: ip_smb
      when: mac_smb is defined

- name: Rivermax — all Windows nodes with rivermax enabled
  hosts: windows
  gather_facts: false
  roles:
    - role: rivermax
      when: rivermax | default(false)
    - role: vf_2110_tune
      when: rivermax | default(false)
    - role: vf_2110_ptp
      when: rivermax | default(false)
    - role: ptp_w32time
      when: rivermax | default(false)

- name: Netbird mesh VPN — all hosts
  hosts: all
  gather_facts: true
  roles:
    - netbird

- name: Plastic SCM — staging, plugin dev, touch, and workstation nodes
  hosts: ue_staging:ue_plugin_dev:touch:workstation
  gather_facts: false
  roles:
    - plastic_scm

- name: Content nodes — nDisplay cluster
  hosts: ue_content
  gather_facts: false
  roles:
    - ndi_tools
    - unreal_engine
    - render_worker

- name: Editing nodes — Concert multi-user editor
  hosts: ue_editing
  gather_facts: false
  roles:
    - ndi_tools
    - unreal_engine

- name: Previs nodes
  hosts: ue_previs
  gather_facts: false
  roles:
    - ndi_tools
    - unreal_engine
    - render_worker

- name: Staging nodes
  hosts: ue_staging
  gather_facts: false
  roles:
    - ndi_tools
    - unreal_engine

- name: Plugin dev nodes
  hosts: ue_plugin_dev
  gather_facts: false
  roles:
    - win_remove_edge
    - win_install_chrome
    - win_openssh_server
    - win_bun
    - win_gh_cli
    - netbird_configure
    - git
    - win_ue_build_deps
    - vscode
    - visual_studio
    - ndi_tools
    - unreal_engine
  tasks:
    - name: Clone git repos
      ansible.builtin.include_role:
        name: git
        tasks_from: clone
      when: git_repos is defined

- name: UE automation runners
  hosts: ue_runner
  gather_facts: false
  roles:
    - git
    - win_ue_build_deps
    - ndi_tools
    - unreal_engine

- name: Workstation nodes
  hosts: workstation
  gather_facts: false
  roles:
    - win_remove_edge
    - win_install_chrome
    - ndi_tools
    - unreal_engine
    - blender
    # TODO: adobe_creative_cloud (needs Admin Console deployment package)
    - pureref
    - dropbox

- name: Touch nodes
  hosts: touch
  gather_facts: false
  roles:
    - touchdesigner

- name: Arnold/Fusion nodes
  hosts: arnold_fusion
  gather_facts: false
  roles:
    - arnold

# === Linux ===

- name: Proxmox hypervisors
  hosts: proxmox
  serial: 1
  max_fail_percentage: 0
  gather_facts: true
  roles:
    - role: cx6_sriov
      when: has_cx6 | bool
    - role: pve_bf2_sriov
      when: has_bf2 | bool
    - role: pve_vf_mac
      when: vf_macs_json is defined
  post_tasks:
    - name: Verify SSH connectivity after convergence
      ansible.builtin.wait_for_connection:
        timeout: 30

- name: PBS — deploy share
  hosts: pbs
  gather_facts: false
  roles:
    - samba_server

- name: Optik
  hosts: optik
  gather_facts: false
  roles:
    - nvidia_gpu_linux
    - optik

- name: Rship server nodes
  hosts: rship
  gather_facts: false
  roles:
    - rship

# === Cross-platform ===
