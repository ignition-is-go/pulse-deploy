---
# Create Plastic SCM workspace (one-time setup)
# Usage: ansible-playbook playbooks/plastic-workspace.yml --limit ue_staging

- name: Plastic SCM — create workspace
  hosts: "{{ plastic_workspace_hosts | default('ue') }}"
  gather_facts: true
  tasks:
    - name: Include Plastic SCM workspace tasks
      ansible.builtin.include_role:
        name: plastic_scm
        tasks_from: windows_workspace.yml
      when: ansible_os_family == "Windows" and plastic_workspace | length > 0
