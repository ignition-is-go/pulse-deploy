---
# Mirror staging workspace to NAS (DMZ distribution point)
#
# Robocopy /MIR from the staging node's local Plastic workspace to the
# deploy share on pulse-admin. Destination nodes pull from here via
# mirror-nas-workspace.yml.
#
# Usage:
#   ansible-playbook playbooks/mirror-staging-nas.yml
#   ansible-playbook playbooks/mirror-staging-nas.yml -e "robocopy_dry_run=true"

- name: Mirror staging workspace to NAS
  hosts: ue_staging[0]
  gather_facts: false

  tasks:
    - name: Ensure log directory exists
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Verify source workspace exists
      ansible.windows.win_stat:
        path: "{{ plastic_workspace }}"
      register: src_check

    - name: Fail if source workspace missing
      ansible.builtin.fail:
        msg: "Source workspace not found at {{ plastic_workspace }}"
      when: not src_check.stat.exists

    - name: Mirror workspace to NAS
      ansible.windows.win_command: >-
        robocopy "{{ plastic_workspace }}" "{{ staging_workspace_unc }}"
        /MIR /MT:16 /R:5 /W:10 /NP /NDL
        /XD .plastic4
        /LOG:C:\temp\robocopy-to-nas.log
        {{ '/L' if (robocopy_dry_run | default(false) | bool) else '' }}
      register: mirror_result
      failed_when: mirror_result.rc >= 8
      changed_when: mirror_result.rc in [1, 3, 5, 7]

    - name: Read robocopy summary
      ansible.windows.win_shell: |
        Get-Content C:\temp\robocopy-to-nas.log -Tail 8 | Where-Object { $_ -match '\S' }
      register: mirror_summary
      changed_when: false

    - name: Show mirror result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} → NAS: exit {{ mirror_result.rc }} (0=no change, 1=copied, 2=extras, 3=both)\n{{ mirror_summary.stdout }}"
