---
# Stop Rivermax media_receiver and clean up
#
# Usage:
#   ansible-playbook playbooks/rmax-media-receiver-stop.yml --limit windows-unreal-render-05
#   ansible-playbook playbooks/rmax-media-receiver-stop.yml --limit ue_content

- name: Stop Rivermax media_receiver
  hosts: windows
  gather_facts: false

  tasks:
    - name: Stop media_receiver process
      ansible.windows.win_command: taskkill /F /IM media_receiver.exe
      failed_when: false
      changed_when: false

    - name: Stop media_receiver cmd wrapper
      ansible.windows.win_command: taskkill /F /IM cmd.exe /FI "WINDOWTITLE eq C:\temp\rmax-rx.bat"
      failed_when: false
      changed_when: false

    - name: Stop and remove RX scheduled task
      community.windows.win_scheduled_task:
        name: RivermaxMediaReceiver
        state: absent

    - name: Confirm stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq media_receiver.exe" /NH
      register: rx_status
      changed_when: false

    - name: Show status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'STOPPED' if 'media_receiver.exe' not in rx_status.stdout else 'STILL RUNNING' }}"
