---
# Launch UE editor on the editing node and auto-join the Concert session
#
# Opens the full editor UI in interactive desktop session so artists can
# make changes that propagate to the nDisplay render nodes via Concert.
#
# Prerequisites:
#   - Concert server running (playbooks/ue-concert-server-start.yml)
#   - Firewall rules applied (playbooks/ue-firewall-rules.yml)
#
# Usage:
#   ansible-playbook playbooks/ue-concert-editor-start.yml
#   ansible-playbook playbooks/ue-concert-editor-start.yml -e "editor_map=/Game/Path/To/Map"

- name: Reachability gate — verify editing node is online
  hosts: ue_editing
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Check WinRM connectivity
      ansible.windows.win_ping:

    - name: Add reachable hosts to dynamic group
      ansible.builtin.group_by:
        key: ue_node_reachable

- name: Fail fast if editing node is unreachable
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert editing node responded
      ansible.builtin.assert:
        that: groups['ue_node_reachable'] | default([]) | intersect(groups['ue_editing']) | length > 0
        fail_msg: >-
          Editing node is unreachable. Cannot start Concert editor.

- name: Check for already-running UE editor
  hosts: ue_editing
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Check if UnrealEditor is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: editor_running_check
      changed_when: false

    - name: Fail if UE editor is already running
      ansible.builtin.fail:
        msg: "UnrealEditor is already running on {{ inventory_hostname }}. Run ue-concert-editor-stop.yml first."
      when: "'UnrealEditor.exe' in editor_running_check.stdout"

- name: GPU health check
  ansible.builtin.import_playbook: win-gpu-check.yml
  vars:
    gpu_check_hosts: ue_editing

- name: Launch Concert editor
  hosts: ue_editing
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Check UnrealEditor exists
      ansible.windows.win_stat:
        path: "{{ unreal_exe }}"
      register: editor_exe

    - name: Fail if editor binary not found
      ansible.builtin.fail:
        msg: "UnrealEditor.exe not found at {{ unreal_exe }}"
      when: not editor_exe.stat.exists

    - name: Write Concert editor launch script
      ansible.windows.win_copy:
        content: |
          @echo off
          "{{ unreal_exe }}" ^
            "{{ unreal_project }}" ^
            {% if editor_map is defined %}{{ editor_map }} ^
            {% endif %}-messaging ^
            -CONCERTAUTOCONNECT ^
            -CONCERTSERVER="{{ concert_server_name }}" ^
            -CONCERTSESSION="{{ concert_session }}" ^
            -CONCERTDISPLAYNAME="{{ inventory_hostname }}" ^
            -UDPMESSAGING_TRANSPORT_UNICAST={{ ansible_host }}:0 ^
            -UDPMESSAGING_TRANSPORT_STATIC={{ concert_server_ip }}:{{ concert_server_port }} ^
            {{ ini_concert }}
        dest: C:\concert-editor.bat

    - name: Create Concert editor scheduled task
      community.windows.win_scheduled_task:
        name: ConcertEditor
        description: Launch UE editor with Concert auto-connect
        actions:
          - path: C:\concert-editor.bat
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

    - name: Start Concert editor
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "ConcertEditor"
        Write-Host "LAUNCHED"

    - name: Wait for editor process
      ansible.windows.win_shell: |
        (Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue).Id
      register: editor_result
      until: editor_result.stdout | trim | length > 0
      retries: 15
      delay: 2
      changed_when: false

    - name: Show editor status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: UnrealEditor running (PID: {{ editor_result.stdout | trim }})"
