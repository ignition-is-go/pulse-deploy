---
# Firewall rules for UE services (nDisplay, Concert)
#
# Usage:
#   ansible-playbook playbooks/ue-firewall-rules.yml

- name: Reachability gate — identify online nodes
  hosts: ue_content:ue_editing
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Check WinRM connectivity
      ansible.windows.win_ping:

    - name: Add reachable hosts to dynamic group
      ansible.builtin.group_by:
        key: ue_node_reachable

- name: Report reachability results
  hosts: ue_node_reachable
  gather_facts: false
  tasks:
    - name: Show skipped (unreachable) hosts
      ansible.builtin.debug:
        msg: >-
          Reachable: {{ groups['ue_node_reachable'] | join(', ') }}
          — Skipped: {{ groups['ue_content'] | union(groups['ue_editing']) | difference(groups['ue_node_reachable']) | join(', ') | default('none', true) }}
      run_once: true

- name: UE nDisplay firewall rules
  hosts: ue_node_reachable:&ue_content
  gather_facts: false

  tasks:
    - name: Open nDisplay cluster sync ports
      community.windows.win_firewall_rule:
        name: nDisplay Cluster Sync
        direction: in
        protocol: tcp
        localport: "41001,41003,41004"
        action: allow
        enabled: true

- name: Concert server firewall rules
  hosts: ue_node_reachable:&ue_editing
  gather_facts: false

  tasks:
    - name: Open Concert server UdpMessaging port
      community.windows.win_firewall_rule:
        name: Concert Multi-User Server (UDP)
        direction: in
        protocol: udp
        localport: "{{ concert_server_port }}"
        action: allow
        enabled: true
