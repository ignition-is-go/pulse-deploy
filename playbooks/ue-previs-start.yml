---
# Start Previs project on previs nodes
# Usage: ansible-playbook playbooks/ue-previs-start.yml

- name: Start Previs
  hosts: ue_previs
  gather_facts: false
  tasks:
    - name: Check .uproject file exists
      ansible.windows.win_shell: |
        $f = "{{ unreal_project }}"
        if (-not (Test-Path $f)) { Write-Error "File not found: $f"; exit 1 }
        $size = (Get-Item $f).Length
        if ($size -eq 0) { Write-Error "File is empty (0 bytes): $f"; exit 1 }
        Write-Host "OK: $f ($size bytes)"
      changed_when: false

    - name: Check if UE is already running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_check
      changed_when: false

    - name: Fail if UE is already running
      ansible.builtin.fail:
        msg: "UnrealEditor is already running on {{ inventory_hostname }}. Run ue-previs-stop.yml first."
      when: "'UnrealEditor.exe' in ue_check.stdout"

    - name: Write previs launch script
      ansible.windows.win_copy:
        content: |
          @echo off
          "{{ unreal_exe }}" "{{ unreal_project }}"
        dest: C:\previs-launch.bat

    - name: Create previs scheduled task
      community.windows.win_scheduled_task:
        name: PrevisLaunch
        description: Launch UE Previs project
        actions:
          - path: C:\previs-launch.bat
            working_directory: "{{ unreal_project | dirname }}"
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

    - name: Start previs
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "PrevisLaunch"
        Write-Host "LAUNCHED"

    - name: Wait for UE process
      ansible.windows.win_shell: |
        $p = Get-Process -Name UnrealEditor* -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($p) { Write-Host "$($p.Id) ($($p.ProcessName))" }
      register: launch_result
      until: launch_result.stdout | trim | length > 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Show previs launch result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: UnrealEditor running — {{ launch_result.stdout | trim }}"
