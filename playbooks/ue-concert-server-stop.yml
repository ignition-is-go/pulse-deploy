---
# Stop the Concert (Multi-User Editing) server
#
# UnrealMultiUserServer is a headless console process (no windows) so
# WM_CLOSE-based graceful shutdown doesn't apply. Force-kill directly.
#
# Usage:
#   ansible-playbook playbooks/ue-concert-server-stop.yml

- name: Stop Concert server
  hosts: ue_editing
  gather_facts: false

  tasks:
    - name: Skip offline hosts
      ansible.builtin.include_tasks: tasks/skip_offline.yml

    - name: Check if UnrealMultiUserServer is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealMultiUserServer.exe" /NH
      register: server_check
      changed_when: false

    - name: Force-kill UnrealMultiUserServer
      ansible.windows.win_command: taskkill /F /IM UnrealMultiUserServer.exe
      when: "'UnrealMultiUserServer.exe' in server_check.stdout"

    - name: Verify UnrealMultiUserServer stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealMultiUserServer.exe" /NH
      register: server_verify
      until: "'UnrealMultiUserServer.exe' not in server_verify.stdout"
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false
      when: "'UnrealMultiUserServer.exe' in server_check.stdout"

    - name: Show Concert server status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{ 'was not running' if 'UnrealMultiUserServer.exe' not in server_check.stdout
          else ('STOPPED' if 'UnrealMultiUserServer.exe' not in server_verify.stdout else 'STILL RUNNING') }}
