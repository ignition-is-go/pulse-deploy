---
# Stop the Concert (Multi-User Editing) server
#
# UnrealMultiUserServer is a headless console process (no windows) so
# WM_CLOSE-based graceful shutdown doesn't apply. Force-kill directly.
#
# Usage:
#   ansible-playbook playbooks/ue-concert-server-stop.yml

- name: Stop Concert server
  hosts: ue_editing
  gather_facts: false

  tasks:
    - name: Check if UnrealMultiUserServer is running
      ansible.windows.win_shell: |
        $procs = Get-Process -Name UnrealMultiUserServer -ErrorAction SilentlyContinue
        if ($procs) { Write-Host "RUNNING (PID: $($procs.Id))" } else { Write-Host "NONE" }
      register: server_check
      changed_when: false

    - name: Stop UnrealMultiUserServer
      ansible.windows.win_shell: |
        Stop-Process -Name UnrealMultiUserServer -Force
        Start-Sleep -Seconds 2
        $remaining = Get-Process -Name UnrealMultiUserServer -ErrorAction SilentlyContinue
        if ($remaining) { Write-Host "STILL_RUNNING" } else { Write-Host "STOPPED" }
      register: server_stop
      when: "'RUNNING' in server_check.stdout"

    - name: Show Concert server status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ server_stop.stdout | trim if server_stop is not skipped else 'was not running' }}"
