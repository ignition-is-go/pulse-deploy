---
# Launch nDisplay cluster via command line (no Switchboard)
# Starts UnrealEditor on each content node in nDisplay mode.
#
# Reference command (from Epic Forums):
#   https://forums.unrealengine.com/t/how-to-run-ndisplay-by-script-or-command-line/479685
#
#   UnrealEditor.exe "Project.uproject" -game None -messaging -dc_cluster -nosplash
#     -dc_cfg="path/to/config.ndisplay" -dc_node=Node_0 -dc_dev_mono
#     -ini:Engine:[/Script/Engine.Engine]:GameEngine=...DisplayClusterGameEngine,...  (truncated, see launch task below)
#     -ini:Game:[/Script/EngineSettings.GeneralProjectSettings]:bUseBorderlessWindow=True
#     -ini:Input:[/Script/Engine.InputSettings]:DefaultPlayerInputClass=/Script/DisplayCluster.DisplayClusterPlayerInput
#     -unattended -NoScreenMessages -fixedseed -NoVerifyGC -noxrstereo
#     -RemoteControlIsHeadless -StageFriendlyName="Node_0" Log=Node_0.log
#
# Prerequisites:
#   - Populate map_path and ndisplay_config in
#     inventories/hrlv-dev/group_vars/ue_content.yml
#   - Plastic SCM synced (playbooks/plastic-sync.yml)
#   - Firewall rules applied (playbooks/ue-firewall-rules.yml)
#
# Usage:
#   ansible-playbook playbooks/ue-content-start.yml
#   ansible-playbook playbooks/ue-content-start.yml -e "map=lookdev"
#   ansible-playbook playbooks/ue-content-start.yml --limit ue-content-01 -e "config=rivermax_1node" -e "map=lookdev"  # single node
#   ansible-playbook playbooks/ue-content-start.yml -e "skip_preflight=true"  # fast relaunch

- name: Preflight — verify all content nodes are online
  hosts: ue_content
  gather_facts: false

  tasks:
    - name: Check WinRM connectivity
      ansible.windows.win_ping:
      ignore_unreachable: true
      register: _ping_result

    - name: Fail if node is unreachable
      ansible.builtin.fail:
        msg: "{{ inventory_hostname }} is unreachable — cannot launch nDisplay with missing nodes"
      when: _ping_result.unreachable | default(false)

    - name: Check if UnrealEditor is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_running_check
      changed_when: false

    - name: Fail if UE is already running
      ansible.builtin.fail:
        msg: "UnrealEditor is already running on {{ inventory_hostname }}. Run ue-content-stop.yml first."
      when: "'UnrealEditor.exe' in ue_running_check.stdout"

- name: GPU health check
  ansible.builtin.import_playbook: win-gpu-check.yml
  vars:
    gpu_check_hosts: ue_content

# TODO: Disabled — verify if OVS FDB priming is still needed with tc-policy=none
# - name: Prime OVS FDB for Rivermax hardware offload
#   ansible.builtin.import_playbook: rmax-arp-prime.yml

- name: Preflight and prepare nDisplay launch
  hosts: ue_content
  gather_facts: false

  vars_files:
    - ../roles/rivermax/defaults/main.yml

  tasks:
    - name: Check .uproject file exists
      ansible.windows.win_shell: |
        $f = "{{ unreal_project }}"
        if (-not (Test-Path $f)) { Write-Error "File not found: $f"; exit 1 }
        $size = (Get-Item $f).Length
        if ($size -eq 0) { Write-Error "File is empty (0 bytes): $f"; exit 1 }
        Write-Host "OK: $f ($size bytes)"
      changed_when: false
      when: not (skip_preflight | default(false) | bool)

    - name: Validate nDisplay config
      ansible.builtin.include_tasks: tasks/ndisplay_preflight.yml

    - name: Rivermax preflight check
      ansible.windows.win_shell: |
        $errors = @()
        if (!(Test-Path '{{ rivermax_install_dir }}\lib\rivermax.dll')) { $errors += 'Rivermax DLL missing' }
        if (!(Test-Path '{{ rivermax_install_dir }}\lib\{{ rivermax_license_file }}')) { $errors += 'License file missing' }
        $env = [System.Environment]::GetEnvironmentVariable('RIVERMAX_LICENSE_PATH', 'Machine')
        if (!$env) { $errors += 'RIVERMAX_LICENSE_PATH env var not set' }
        $adapter = Get-NetAdapter | Where-Object { $_.InterfaceDescription -like '*Mellanox*' -or $_.InterfaceDescription -like '*ConnectX*' }
        if (!$adapter) { $errors += 'No Mellanox/ConnectX adapter found' }
        if ($errors.Count -gt 0) { Write-Host "FAIL: $($errors -join '; ')" } else { Write-Host "OK" }
      register: rivermax_preflight
      changed_when: false
      when:
        - not (skip_preflight | default(false) | bool)
        - (ndisplay | default('')) is match('rivermax.*')

    - name: Fail if Rivermax is not ready
      ansible.builtin.fail:
        msg: >-
          Rivermax preflight FAILED on {{ inventory_hostname }}:
          {{ rivermax_preflight.stdout | trim }}.
          Fix: ansible-playbook playbooks/rmax-setup.yml --limit {{ inventory_hostname }}
      when:
        - rivermax_preflight is not skipped
        - "'FAIL' in rivermax_preflight.stdout"

    - name: Build nDisplay launch arguments
      ansible.builtin.set_fact:
        ndisplay_args: >-
          "{{ unreal_project }}"
          -game
          {{ map_path | default('None') }}
          -dc_cluster
          -dc_cfg="{{ ndisplay_config }}"
          -dc_node={{ ndisplay_node }}
          -dc_dev_mono
          {{ ini_ndisplay_engine }}
          {{ ini_ndisplay_input }}
          {{ ini_rivermax | default('') }}
          {{ ini_game | default('') }}
          {% if concert_server_ip is defined %}{{ ini_concert }}{% endif %}
          -unattended
          -NoScreenMessages
          -nosplash
          -fixedseed
          -NoVerifyGC
          -noxrstereo
          {% if ndisplay_window.fullscreen | bool %}-fullscreen{% else %}-windowed -forceres WinX={{ ndisplay_window.winx }} WinY={{ ndisplay_window.winy }} ResX={{ ndisplay_window.resx }} ResY={{ ndisplay_window.resy }}{% endif %}
          {% if ndisplay_window.headless | bool %}-RenderOffscreen{% endif %}
          {% if concert_server_ip is defined %}-messaging -CONCERTAUTOCONNECT -CONCERTSERVER="{{ concert_server_name }}" -CONCERTSESSION="{{ concert_session }}" -CONCERTDISPLAYNAME="{{ inventory_hostname }}" -UDPMESSAGING_TRANSPORT_UNICAST={{ ansible_host }}:0 -UDPMESSAGING_TRANSPORT_STATIC={{ concert_server_ip }}:{{ concert_server_port }}{% endif %}
          -RemoteControlIsHeadless
          -StageFriendlyName="{{ ndisplay_node }}"
          Log={{ ndisplay_node }}.log

    - name: Write nDisplay launch script
      ansible.windows.win_copy:
        content: |
          @echo off
          "{{ unreal_exe }}" {{ ndisplay_args }}
        dest: C:\ndisplay-launch.bat

    - name: Create nDisplay scheduled task
      community.windows.win_scheduled_task:
        name: nDisplayLaunch
        description: Launch UE in nDisplay mode
        actions:
          - path: C:\ndisplay-launch.bat
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

- name: Launch nDisplay cluster
  hosts: ue_content
  gather_facts: false

  tasks:
    - name: Start nDisplay on all nodes
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "nDisplayLaunch"
        Write-Host "LAUNCHED"

    - name: Wait for UE process to appear
      ansible.windows.win_shell: |
        $p = Get-Process -Name UnrealEditor* -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($p) { Write-Host "$($p.Id) ($($p.ProcessName))" }
      register: launch_result
      until: launch_result.stdout | trim | length > 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Show launch status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ndisplay_node }}): UnrealEditor running — {{ launch_result.stdout | trim }}"
