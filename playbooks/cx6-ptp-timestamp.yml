---
# ptp-enable.yml — Enable PTP hardware timestamping on ConnectX-6 media NICs
#
# Usage:
#   ansible-playbook playbooks/ptp-enable.yml                           # all rivermax nodes
#   ansible-playbook playbooks/ptp-enable.yml --limit ue_content     # content only
#   ansible-playbook playbooks/ptp-enable.yml --limit windows-unreal-render-01  # single node
#   ansible-playbook playbooks/ptp-enable.yml --check                   # dry run

- name: Enable PTP hardware timestamping on ConnectX-6
  hosts: ue:touch
  gather_facts: false

  tasks:
    - name: Discover ConnectX-6 adapter
      ansible.windows.win_shell: |
        $adapters = @(Get-NetAdapter | Where-Object {
          $_.InterfaceDescription -like '*Mellanox*' -or $_.InterfaceDescription -like '*ConnectX*'
        })
        if ($adapters.Count -eq 0) { throw "ConnectX adapter not found" }
        if ($adapters.Count -gt 1) { throw "Multiple ConnectX adapters found ($($adapters.Count)), expected 1" }
        $adapters[0].Name
      register: cx6_discovery
      changed_when: false
      when: rivermax | default(false)

    - name: Set ConnectX-6 adapter name
      ansible.builtin.set_fact:
        cx6_adapter: "{{ cx6_discovery.stdout | trim }}"
      when: rivermax | default(false)

    - name: Check PTP Hardware Timestamp setting
      ansible.windows.win_shell: |
        $prop = Get-NetAdapterAdvancedProperty -Name "{{ cx6_adapter }}" -RegistryKeyword "*PtpHardwareTimestamp" -ErrorAction Stop
        if (-not $prop) { throw "PtpHardwareTimestamp property not found on {{ cx6_adapter }}" }
        $prop.DisplayValue
      register: ptp_check
      changed_when: false
      when: rivermax | default(false)

    - name: Enable PTP Hardware Timestamp
      ansible.windows.win_shell: |
        Set-NetAdapterAdvancedProperty -Name "{{ cx6_adapter }}" -RegistryKeyword "*PtpHardwareTimestamp" -RegistryValue 1
      when:
        - rivermax | default(false)
        - ptp_check.stdout | default('') | trim != "Enabled"

    - name: Verify PTP Hardware Timestamp is enabled
      ansible.windows.win_shell: |
        (Get-NetAdapterAdvancedProperty -Name "{{ cx6_adapter }}" -RegistryKeyword "*PtpHardwareTimestamp").DisplayValue
      register: ptp_verify
      changed_when: false
      when: rivermax | default(false)

    - name: Display PTP status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: PTP Hardware Timestamp = {{ ptp_verify.stdout | trim }}"
      when: rivermax | default(false)
