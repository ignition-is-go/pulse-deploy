---
# Install Plastic SCM binary from deploy share
# Usage: ansible-playbook playbooks/plastic-install.yml --limit ue_staging

- name: Plastic SCM — install
  hosts: "{{ plastic_install_hosts | default('ue') }}"
  gather_facts: true
  tasks:
    - name: Skip offline hosts
      ansible.builtin.include_tasks: tasks/skip_offline.yml

    - name: Include Plastic SCM install tasks
      ansible.builtin.include_role:
        name: plastic_scm
        tasks_from: windows_install.yml
      when: ansible_os_family == "Windows" and plastic_workspace | length > 0
