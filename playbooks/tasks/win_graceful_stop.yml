---
# Graceful shutdown of a Windows process via interactive-session scheduled task.
#
# WinRM runs in Session 0 which cannot send WM_CLOSE to interactive desktop
# windows. This task deploys a stop script and runs it via a scheduled task
# in the interactive session, then falls back to force-kill after timeout.
#
# Required variables:
#   process_name: Process name without .exe (e.g. "UnrealEditor")
#
# Optional variables:
#   graceful_timeout: Seconds to wait before force-kill (default: 15)

- name: "Check if process is running — {{ process_name }}"
  ansible.windows.win_command: tasklist /FI "IMAGENAME eq {{ process_name }}.exe" /NH
  register: _stop_check
  changed_when: false

- name: "Process not running, nothing to stop — {{ process_name }}"
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }}: {{ process_name }} is not running, skipping."
  when: (process_name + '.exe') not in _stop_check.stdout

- name: "Graceful stop {{ process_name }}"
  when: (process_name + '.exe') in _stop_check.stdout
  block:
    - name: "Write graceful stop script — {{ process_name }}"
      ansible.windows.win_copy:
        content: |
          @echo off
          taskkill /IM {{ process_name }}.exe
        dest: "C:\\{{ process_name }}-stop.bat"

    - name: Create graceful stop scheduled task
      community.windows.win_scheduled_task:
        name: "{{ process_name }}GracefulStop"
        description: "Send WM_CLOSE to {{ process_name }} from interactive session"
        actions:
          - path: "C:\\{{ process_name }}-stop.bat"
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

    - name: Run graceful stop in interactive session
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "{{ process_name }}GracefulStop"

    - name: "Wait for graceful exit — {{ process_name }}"
      ansible.windows.win_shell: |
        if (Get-Process -Name {{ process_name }} -ErrorAction SilentlyContinue) { Write-Host "RUNNING" } else { Write-Host "STOPPED" }
      register: _graceful_result
      until: _graceful_result.stdout | trim == 'STOPPED'
      retries: "{{ ((graceful_timeout | default(15)) | int // 2) + 1 }}"
      delay: 2
      failed_when: false
      changed_when: _graceful_result.stdout | trim == 'STOPPED'

    - name: "Graceful exit result — {{ process_name }}"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'graceful stop succeeded' if _graceful_result.stdout | trim == 'STOPPED' else 'timed out — process still running' }}"

    - name: "Force-kill if graceful shutdown timed out — {{ process_name }}"
      ansible.windows.win_shell: |
        Get-Process -Name {{ process_name }} -ErrorAction SilentlyContinue | Stop-Process -Force
      register: _force_result
      when: _graceful_result.stdout | trim != 'STOPPED'

    - name: Clean up graceful stop task
      community.windows.win_scheduled_task:
        name: "{{ process_name }}GracefulStop"
        state: absent

    - name: Show stop status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{ 'graceful stop' if _graceful_result.stdout | trim == 'STOPPED'
          else 'force stop (graceful timed out)' }}
