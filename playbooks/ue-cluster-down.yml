---
# Stop UE on all cluster nodes (ue_cluster = ue_content + ue_previs)
#
# Usage:
#   ansible-playbook playbooks/ue-cluster-down.yml
#   ansible-playbook playbooks/ue-cluster-down.yml --limit ue_cluster_a

- name: "Phase 1 — Stop nDisplay content nodes"
  ansible.builtin.import_playbook: ue-content-stop.yml

- name: "Phase 2 — Stop previs nodes"
  ansible.builtin.import_playbook: ue-previs-stop.yml
