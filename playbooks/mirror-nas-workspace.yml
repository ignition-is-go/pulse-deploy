---
# Mirror workspace from NAS to destination UE nodes
#
# Robocopy /MIR from the deploy share (DMZ) to each destination node's
# local workspace. Run mirror-staging-nas.yml first to ensure the NAS
# copy is up to date.
#
# Usage:
#   ansible-playbook playbooks/mirror-nas-workspace.yml
#   ansible-playbook playbooks/mirror-nas-workspace.yml --limit ue_content
#   ansible-playbook playbooks/mirror-nas-workspace.yml -e "parallel_nodes=2"
#   ansible-playbook playbooks/mirror-nas-workspace.yml -e "robocopy_dry_run=true"

- name: Validate NAS workspace is accessible
  hosts: ue_content:ue_previs:ue_editing
  gather_facts: false

  tasks:
    - name: Check NAS workspace path exists
      ansible.windows.win_stat:
        path: "{{ staging_workspace_unc }}"
      register: nas_check

    - name: Fail if NAS workspace missing
      ansible.builtin.fail:
        msg: "NAS workspace not found at {{ staging_workspace_unc }}. Run mirror-staging-nas.yml first."
      when: not nas_check.stat.exists

- name: Mirror workspace from NAS to local
  hosts: ue_content:ue_previs:ue_editing
  serial: "{{ parallel_nodes | default(omit) }}"
  gather_facts: false

  tasks:
    - name: Ensure log directory exists
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Mirror from NAS to local workspace
      ansible.windows.win_command: >-
        robocopy "{{ staging_workspace_unc }}" "{{ plastic_workspace }}"
        /MIR /MT:16 /R:5 /W:10 /NP /NDL
        /XD .plastic4
        /LOG:C:\temp\robocopy-from-nas.log
        {{ '/L' if (robocopy_dry_run | default(false) | bool) else '' }}
      register: mirror_result
      failed_when: mirror_result.rc >= 8
      changed_when: mirror_result.rc in [1, 3, 5, 7]

    - name: Read robocopy summary
      ansible.windows.win_shell: |
        Get-Content C:\temp\robocopy-from-nas.log -Tail 8 | Where-Object { $_ -match '\S' }
      register: mirror_summary
      changed_when: false

    - name: Show mirror result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: exit {{ mirror_result.rc }} (0=no change, 1=copied, 2=extras, 3=both)\n{{ mirror_summary.stdout }}"
