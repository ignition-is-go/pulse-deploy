---
# Stop Previs project on previs nodes
# Usage: ansible-playbook playbooks/ue-previs-stop.yml

- name: Stop Previs
  hosts: ue_previs
  gather_facts: false

  tasks:
    - name: Check if UnrealEditor is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_check
      changed_when: false

    - name: Force-kill UnrealEditor
      ansible.windows.win_command: taskkill /F /IM UnrealEditor.exe
      when: "'UnrealEditor.exe' in ue_check.stdout"

    - name: Verify UnrealEditor stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_verify
      until: "'UnrealEditor.exe' not in ue_verify.stdout"
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false
      when: "'UnrealEditor.exe' in ue_check.stdout"

    - name: Show previs stop status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{ 'was not running' if 'UnrealEditor.exe' not in ue_check.stdout
          else ('STOPPED' if 'UnrealEditor.exe' not in ue_verify.stdout else 'STILL RUNNING') }}
