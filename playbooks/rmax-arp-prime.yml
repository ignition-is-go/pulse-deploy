---
# Prime OVS hardware-offloaded flow rules by exchanging ARP between all Rivermax VFs.
#
# Why: OVS with hw-offload + tc-policy=skip_sw offloads L2 forwarding to the CX6
# eSwitch hardware. But OVS must learn VF MAC addresses via ARP before it can install
# offloaded flows. Without this, high-rate streams (Rivermax) flood to every port on
# the bridge in software, causing ~8x bandwidth amplification and CPU saturation.
#
# When: Run this BEFORE starting any Rivermax media streams (nDisplay, media_sender, etc.)
#
# Usage:
#   ansible-playbook playbooks/rmax-arp-prime.yml

- name: Prime OVS FDB — ARP exchange between all Rivermax VFs
  hosts: ue:touch
  ignore_unreachable: true
  gather_facts: false

  tasks:
    - name: Skip if preflight disabled
      ansible.builtin.meta: end_host
      when: skip_preflight | default(false) | bool

    - name: Skip hosts without ip_2110
      ansible.builtin.meta: end_host
      when: ip_2110 is not defined

    - name: Gather all media IPs
      ansible.builtin.set_fact:
        peer_ips: "{{ hostvars | dict2items | selectattr('value.ip_2110', 'defined') | map(attribute='value.ip_2110') | list }}"

    - name: Ping all other media IPs (triggers ARP, primes OVS FDB)
      ansible.windows.win_command: ping -n 1 -w 500 {{ item }}
      loop: "{{ peer_ips | difference([ip_2110]) }}"
      changed_when: false
      failed_when: false

    - name: Show ARP prime result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: primed {{ peer_ips | difference([ip_2110]) | length }} peers from {{ ip_2110 }}"
