---
# Start Rivermax media_sender (persistent, runs until stopped)
# Sends a test 2110-20 stream from the node's ip_2110.
#
# SAFETY: Multicast destinations (224.0.0.0/4) are BLOCKED until IGMP snooping
# is confirmed working on the switch. Multicast without snooping floods all
# ports including management, risking total loss of SSH/WinRM connectivity.
#
# Usage (unicast only):
#   ansible-playbook playbooks/rmax-media-sender-start.yml --limit ue-content-01 -e "rmax_dst_ip=10.0.0.162"

- name: Start Rivermax media_sender
  hosts: windows
  gather_facts: false

  vars_files:
    - ../roles/rivermax/defaults/main.yml

  vars:
    rmax_sender: '{{ rivermax_install_dir }}\apps\media_sender\media_sender.exe'
    rmax_dst_ip: ""
    rmax_dst_port: 50000
    rmax_width: "1920"
    rmax_height: "1080"
    rmax_depth: "8"
    rmax_fps: "30"
    rmax_sampling: "YCbCr-4:2:2"

  tasks:
    - name: Fail if destination IP not specified
      ansible.builtin.fail:
        msg: "rmax_dst_ip is required — pass via -e rmax_dst_ip=<receiver_ip_2110>"
      when: rmax_dst_ip == ""

    - name: Block multicast destinations (IGMP snooping not verified)
      ansible.builtin.fail:
        msg: >-
          BLOCKED: {{ rmax_dst_ip }} is a multicast address (224.0.0.0/4).
          Multicast without confirmed IGMP snooping floods all switch ports
          including management, causing total network loss. Use unicast for testing.
      when: rmax_dst_ip | ansible.utils.ipaddr('224.0.0.0/4')

    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: "C:\\Windows\\Temp"
        state: directory

    - name: Write SDP file
      ansible.windows.win_copy:
        content: |
          v=0
          o=- 0 0 IN IP4 {{ ip_2110 }}
          s=Rivermax TX {{ inventory_hostname }}
          c=IN IP4 {{ rmax_dst_ip }}/1
          t=0 0
          m=video {{ rmax_dst_port }} RTP/AVP 96
          a=rtpmap:96 raw/90000
          a=fmtp:96 sampling={{ rmax_sampling }}; width={{ rmax_width }}; height={{ rmax_height }}; depth={{ rmax_depth }}; exactframerate={{ rmax_fps }}; colorimetry=BT709; PM=2110GPM; SSN=ST2110-20:2017; TP=2110TPN
          a=source-filter: incl IN IP4 {{ rmax_dst_ip }} {{ ip_2110 }}
        dest: C:\Windows\Temp\rmax-tx.sdp

    - name: Write TX launch script
      ansible.windows.win_copy:
        content: |
          & "{{ rmax_sender }}" -s C:\Windows\Temp\rmax-tx.sdp `
            --src-ip={{ ip_2110 }} --dst-ip={{ rmax_dst_ip }} `
            --dst-port={{ rmax_dst_port }} --fps={{ rmax_fps }} `
            -v system 2>&1 | Tee-Object -FilePath C:\Windows\Temp\rmax-tx.log
        dest: C:\Windows\Temp\rmax-tx.ps1

    - name: Create TX scheduled task
      community.windows.win_scheduled_task:
        name: RivermaxMediaSender
        description: Rivermax media_sender
        actions:
          - path: powershell.exe
            arguments: -ExecutionPolicy Bypass -File C:\Windows\Temp\rmax-tx.ps1
        triggers: []
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        logon_type: interactive_token
        run_level: highest
        state: present
        enabled: true

    - name: Start TX
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "RivermaxMediaSender"

    - name: Wait for media_sender to start
      ansible.windows.win_shell: |
        (Get-Process -Name media_sender -ErrorAction SilentlyContinue).Id
      register: tx_check
      until: tx_check.stdout | trim | length > 0
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false

    - name: Show TX status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ip_2110 }}): RUNNING (PID: {{ tx_check.stdout | trim }})"
      when: tx_check.stdout | trim | length > 0

    - name: Show TX failure
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ip_2110 }}): FAILED TO START — check C:\\Windows\\Temp\\rmax-tx.log"
      when: tx_check.stdout | trim | length == 0
