---
# Mirror workspace from NAS to content/previs nodes
#
# Robocopy /MIR from the deploy share (DMZ) to each destination node's
# local workspace. Run mirror-staging-nas.yml first to ensure the NAS
# copy is up to date.
#
# Usage:
#   ansible-playbook playbooks/mirror-nas-cluster.yml
#   ansible-playbook playbooks/mirror-nas-cluster.yml --limit ue_content
#   ansible-playbook playbooks/mirror-nas-cluster.yml -e "parallel_nodes=2"
#   ansible-playbook playbooks/mirror-nas-cluster.yml -e "robocopy_dry_run=true"
#   ansible-playbook playbooks/mirror-nas-cluster.yml -e "force_recopy=true"  # re-copy even if size+timestamp match
#   ansible-playbook playbooks/mirror-nas-cluster.yml -e "clean_copy=true"   # delete local workspace first (nuclear option)

- name: Preflight — ensure UE is not running on destination nodes
  hosts: ue_content:ue_previs
  gather_facts: false

  tasks:
    - name: Check for running UnrealEditor processes
      ansible.windows.win_shell: |
        $ue = Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue
        if ($ue) { "RUNNING pid=$($ue.Id -join ',')" } else { "STOPPED" }
      register: ue_proc_check
      changed_when: false

    - name: Fail if UE is running
      ansible.builtin.fail:
        msg: "UnrealEditor is running on {{ inventory_hostname }} ({{ ue_proc_check.stdout | trim }}). Stop UE before mirroring."
      when: "'RUNNING' in ue_proc_check.stdout"

- name: Validate NAS workspace is accessible
  hosts: ue_content:ue_previs
  gather_facts: false

  tasks:
    - name: Check NAS workspace path exists
      ansible.windows.win_shell: |
        if (Test-Path "{{ staging_workspace_unc }}") { "EXISTS" } else { "MISSING" }
      register: nas_check
      changed_when: false

    - name: Fail if NAS workspace missing
      ansible.builtin.fail:
        msg: "NAS workspace not found at {{ staging_workspace_unc }}. Run mirror-staging-nas.yml first."
      when: "'MISSING' in nas_check.stdout"

- name: Clean local workspace before copy
  hosts: ue_content:ue_previs
  serial: "{{ parallel_nodes | default(omit) }}"
  gather_facts: false

  tasks:
    - name: Delete local workspace (clean_copy)
      ansible.windows.win_file:
        path: "{{ plastic_workspace }}"
        state: absent
      when: clean_copy | default(false) | bool

- name: Mirror workspace from NAS to local
  hosts: ue_content:ue_previs
  serial: "{{ parallel_nodes | default(omit) }}"
  gather_facts: false

  tasks:
    - name: Mirror from NAS to local workspace
      ansible.windows.win_command: >-
        robocopy "{{ staging_workspace_unc }}" "{{ plastic_workspace }}"
        /MIR /MT:16 /R:5 /W:10 /NP /NDL
        /XD .plastic4
        /LOG:C:\Windows\Temp\robocopy-from-nas.log
        {{ '/IS' if (force_recopy | default(false) | bool) else '' }}
        {{ '/L' if (robocopy_dry_run | default(false) | bool) else '' }}
      async: 7200
      poll: 0
      register: mirror_async
      changed_when: false

    - name: Wait for robocopy from NAS to complete
      ansible.builtin.async_status:
        jid: "{{ mirror_async.ansible_job_id }}"
      register: mirror_result
      until: mirror_result.finished
      retries: 720
      delay: 10
      failed_when: mirror_result.rc | default(0) >= 8
      changed_when: mirror_result.rc | default(0) in [1, 3, 5, 7]

    - name: Read robocopy summary
      ansible.windows.win_shell: |
        Get-Content C:\Windows\Temp\robocopy-from-nas.log -Tail 8 | Where-Object { $_ -match '\S' }
      register: mirror_summary
      changed_when: false

    - name: Show mirror result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: exit {{ mirror_result.rc }} (0=no change, 1=copied, 2=extras, 3=both)\n{{ mirror_summary.stdout }}"
