---
# Stop nDisplay cluster on content nodes
#
# nDisplay -game nodes are headless renderers with no state to save.
# Force-kill directly via WinRM.
#
# Usage: ansible-playbook playbooks/ue-content-stop.yml

- name: Stop nDisplay cluster
  hosts: ue_content
  gather_facts: false

  tasks:
    - name: Skip offline hosts
      ansible.builtin.include_tasks: tasks/skip_offline.yml

    - name: Check if UnrealEditor is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_check
      changed_when: false

    - name: Force-kill UnrealEditor
      ansible.windows.win_command: taskkill /F /IM UnrealEditor.exe
      when: "'UnrealEditor.exe' in ue_check.stdout"

    - name: Verify UnrealEditor stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: ue_verify
      until: "'UnrealEditor.exe' not in ue_verify.stdout"
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false
      when: "'UnrealEditor.exe' in ue_check.stdout"

    - name: Show nDisplay stop status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{ 'was not running' if 'UnrealEditor.exe' not in ue_check.stdout
          else ('STOPPED' if 'UnrealEditor.exe' not in ue_verify.stdout else 'STILL RUNNING') }}
