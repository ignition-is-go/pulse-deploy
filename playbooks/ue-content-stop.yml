---
# Stop nDisplay cluster on content nodes
#
# nDisplay -game nodes are headless renderers with no state to save.
# Force-kill directly via WinRM.
#
# Usage: ansible-playbook playbooks/ue-content-stop.yml

- name: Stop nDisplay cluster
  hosts: ue_content
  gather_facts: false

  tasks:
    - name: Check if UnrealEditor is running
      ansible.windows.win_shell: |
        $procs = Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue
        if ($procs) { Write-Host "RUNNING (PID: $($procs.Id))" } else { Write-Host "NONE" }
      register: ue_check
      changed_when: false

    - name: Stop UnrealEditor
      ansible.windows.win_shell: |
        Stop-Process -Name UnrealEditor -Force
        Start-Sleep -Seconds 2
        $remaining = Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue
        if ($remaining) { Write-Host "STILL_RUNNING" } else { Write-Host "STOPPED" }
      register: ue_stop
      when: "'RUNNING' in ue_check.stdout"

    - name: Show nDisplay stop status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ ue_stop.stdout | trim if ue_stop is not skipped else 'was not running' }}"
