---
# Stop Rivermax media_sender and clean up
#
# Usage:
#   ansible-playbook playbooks/rmax-media-sender-stop.yml --limit windows-unreal-render-01
#   ansible-playbook playbooks/rmax-media-sender-stop.yml --limit ue_content

- name: Stop Rivermax media_sender
  hosts: windows
  gather_facts: false

  tasks:
    - name: Stop media_sender process
      ansible.windows.win_command: taskkill /F /IM media_sender.exe
      failed_when: false
      changed_when: false

    - name: Stop media_sender cmd wrapper
      ansible.windows.win_command: taskkill /F /IM cmd.exe /FI "WINDOWTITLE eq C:\Windows\Temp\rmax-tx.bat"
      failed_when: false
      changed_when: false

    - name: Stop and remove TX scheduled task
      community.windows.win_scheduled_task:
        name: RivermaxMediaSender
        state: absent

    - name: Verify media_sender process stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq media_sender.exe" /NH
      register: tx_status
      changed_when: false

    - name: Show media_sender stop result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'STOPPED' if 'media_sender.exe' not in tx_status.stdout else 'STILL RUNNING' }}"
