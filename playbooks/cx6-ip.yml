---
# Configure static IP on ConnectX-6 VF passthrough adapter
# Usage: ansible-playbook playbooks/cx6-ip.yml -i inventories/hrlv-dev/hosts.yml

- name: Configure ConnectX-6 VF media IP
  hosts: ue:touch
  gather_facts: false

  tasks:
    - name: Discover ConnectX-6 adapter
      ansible.windows.win_shell: |
        $adapters = @(Get-NetAdapter | Where-Object {
          $_.InterfaceDescription -like '*Mellanox*' -or $_.InterfaceDescription -like '*ConnectX*'
        })
        if ($adapters.Count -eq 0) { throw "ConnectX adapter not found" }
        if ($adapters.Count -gt 1) { throw "Multiple ConnectX adapters found ($($adapters.Count)), expected 1" }
        $adapters[0].ifIndex
      register: cx6_discovery
      changed_when: false
      when: rivermax | default(false)

    - name: Set ConnectX-6 interface index
      ansible.builtin.set_fact:
        cx6_ifindex: "{{ cx6_discovery.stdout | trim }}"
      when: rivermax | default(false)

    - name: Remove existing IP addresses on CX6
      ansible.windows.win_shell: |
        Remove-NetIPAddress -InterfaceIndex {{ cx6_ifindex }} -Confirm:$false -ErrorAction SilentlyContinue
      when: rivermax | default(false)
      changed_when: false

    - name: Remove existing routes on CX6
      ansible.windows.win_shell: |
        Remove-NetRoute -InterfaceIndex {{ cx6_ifindex }} -Confirm:$false -ErrorAction SilentlyContinue
      when: rivermax | default(false)
      changed_when: false

    - name: Assign media network IP
      ansible.windows.win_shell: |
        New-NetIPAddress -InterfaceIndex {{ cx6_ifindex }} -IPAddress {{ media_ip }} -PrefixLength 24
      when: rivermax | default(false)

    - name: Disable DHCP on CX6
      ansible.windows.win_shell: |
        Set-NetIPInterface -InterfaceIndex {{ cx6_ifindex }} -Dhcp Disabled
      when: rivermax | default(false)

    - name: Display configured IPs
      ansible.windows.win_shell: |
        Get-NetIPAddress -AddressFamily IPv4 |
          Where-Object { $_.IPAddress -notlike "169.*" -and $_.IPAddress -ne "127.0.0.1" } |
          Select-Object InterfaceAlias, IPAddress |
          Format-Table -AutoSize
      register: ip_output
      changed_when: false

    - name: Show IP configuration
      ansible.builtin.debug:
        msg: "{{ ip_output.stdout_lines }}"
