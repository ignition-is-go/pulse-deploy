---
# Stop UE editor on the editing node
#
# Usage:
#   ansible-playbook playbooks/ue-concert-editor-stop.yml

- name: Stop Concert editor
  hosts: ue_editing
  gather_facts: false

  tasks:
    - name: Check if UnrealEditor is running
      ansible.windows.win_shell: |
        $procs = Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue
        if ($procs) { Write-Host "RUNNING (PID: $($procs.Id))" } else { Write-Host "NONE" }
      register: editor_check
      changed_when: false

    - name: Stop UnrealEditor
      ansible.windows.win_shell: |
        Stop-Process -Name UnrealEditor -Force
        Start-Sleep -Seconds 2
        $remaining = Get-Process -Name UnrealEditor -ErrorAction SilentlyContinue
        if ($remaining) { Write-Host "STILL_RUNNING" } else { Write-Host "STOPPED" }
      register: editor_stop
      when: "'RUNNING' in editor_check.stdout"

    - name: Show editor stop status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ editor_stop.stdout | trim if editor_stop is not skipped else 'was not running' }}"
