---
# Stop UE editor on the editing node
#
# Usage:
#   ansible-playbook playbooks/ue-concert-editor-stop.yml

- name: Stop Concert editor
  hosts: ue_editing
  gather_facts: false

  tasks:
    - name: Check if UnrealEditor is running
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: editor_check
      changed_when: false

    - name: Force-kill UnrealEditor
      ansible.windows.win_command: taskkill /F /IM UnrealEditor.exe
      when: "'UnrealEditor.exe' in editor_check.stdout"

    - name: Verify UnrealEditor stopped
      ansible.windows.win_command: tasklist /FI "IMAGENAME eq UnrealEditor.exe" /NH
      register: editor_verify
      until: "'UnrealEditor.exe' not in editor_verify.stdout"
      retries: 3
      delay: 2
      changed_when: false
      failed_when: false
      when: "'UnrealEditor.exe' in editor_check.stdout"

    - name: Show editor stop status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: {{ 'was not running' if 'UnrealEditor.exe' not in editor_check.stdout
          else ('STOPPED' if 'UnrealEditor.exe' not in editor_verify.stdout else 'STILL RUNNING') }}
