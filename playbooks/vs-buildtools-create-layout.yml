---
# vs-buildtools-create-layout.yml -- Create VS Build Tools offline layout on NAS
#
# Downloads VS 2022 Build Tools layout to a local directory on the target VM,
# then robocopy to the NAS. Run on any Windows VM with internet access.
#
# Components match UE 5.7 requirements per Epic docs.
#
# Usage:
#   ansible-playbook playbooks/vs-buildtools-create-layout.yml --limit ue-plugin-dev-01
#
# Sources:
#   https://dev.epicgames.com/documentation/en-us/unreal-engine/setting-up-visual-studio-development-environment-for-cplusplus-projects-in-unreal-engine
#   https://learn.microsoft.com/en-us/visualstudio/install/create-a-network-installation-of-visual-studio

- name: Create VS Build Tools offline layout
  hosts: windows
  gather_facts: false
  vars:
    layout_local: C:\vs_BuildTools_layout
    layout_nas: "{{ deploy_share }}\\installers\\vs_BuildTools"
    bootstrapper_url: "https://aka.ms/vs/17/release/vs_buildtools.exe"

  tasks:
    - name: Check if layout already exists on NAS
      ansible.windows.win_stat:
        path: "{{ layout_nas }}\\Catalog.json"
      register: nas_layout_check

    - name: Check if layout already exists locally
      ansible.windows.win_stat:
        path: "{{ layout_local }}\\Catalog.json"
      register: local_layout_check

    - name: Create local layout directory
      ansible.windows.win_file:
        path: "{{ layout_local }}"
        state: directory
      when: not local_layout_check.stat.exists

    - name: Download bootstrapper
      ansible.windows.win_get_url:
        url: "{{ bootstrapper_url }}"
        dest: "{{ layout_local }}\\vs_BuildTools.exe"
      when: not local_layout_check.stat.exists

    - name: Create offline layout
      ansible.windows.win_shell: |
        $proc = Start-Process -FilePath "{{ layout_local }}\vs_BuildTools.exe" -ArgumentList @(
          "--layout", "{{ layout_local }}",
          "--add", "Microsoft.VisualStudio.Workload.VCTools",
          "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
          "--add", "Microsoft.VisualStudio.Component.Windows11SDK.26100",
          "--add", "Microsoft.VisualStudio.Component.VC.ASAN",
          "--add", "Microsoft.VisualStudio.Component.VC.Llvm.Clang",
          "--add", "Microsoft.NetCore.Component.Runtime.8.0",
          "--includeRecommended", "--lang", "en-US", "--quiet"
        ) -PassThru
        Start-Sleep -Seconds 10
        do {
          $running = Get-Process -Name "vs_setup_bootstrapper", "vs_BuildTools", "Setup" -ErrorAction SilentlyContinue |
            Where-Object { $_.Id -ne $PID }
          if ($running) { Start-Sleep -Seconds 30 }
        } while ($running)
        if (!(Test-Path "{{ layout_local }}\Catalog.json")) {
          throw "Layout failed -- Catalog.json not found"
        }
        Write-Host "DONE"
      when: not local_layout_check.stat.exists
      async: 3600
      poll: 30

    - name: Verify layout created locally
      ansible.windows.win_stat:
        path: "{{ layout_local }}\\Catalog.json"
      register: layout_verify
      failed_when: not layout_verify.stat.exists

    - name: Start layout copy to NAS
      ansible.windows.win_command: >-
        robocopy "{{ layout_local }}" "{{ layout_nas }}" /MIR /COPY:DT /NDL /R:5 /W:10 /LOG:C:\Windows\Temp\robocopy-vs-layout-to-nas.log
      async: 1800
      poll: 0
      register: layout_copy_job
      when: not nas_layout_check.stat.exists

    - name: "Monitor layout copy progress"
      ansible.windows.win_shell: |
        $log = "C:\Windows\Temp\robocopy-vs-layout-to-nas.log"
        if (Test-Path $log) { (Get-Content $log -Tail 1).Trim() }
        $procs = Get-Process -Name Robocopy -ErrorAction SilentlyContinue |
          Where-Object { $_.StartTime -gt (Get-Date).AddMinutes(-35) }
        if ($procs) { exit 1 } else { exit 0 }
      register: layout_copy_progress
      until: layout_copy_progress.rc == 0
      retries: 120
      delay: 15
      changed_when: false
      when: layout_copy_job is not skipped

    - name: Collect layout copy result
      ansible.builtin.async_status:
        jid: "{{ layout_copy_job.ansible_job_id }}"
      register: layout_copy_result
      failed_when: layout_copy_result.rc >= 8
      changed_when: layout_copy_result.rc in [1, 3, 5, 7]
      when: layout_copy_job is not skipped

    - name: Verify layout on NAS
      ansible.windows.win_stat:
        path: "{{ layout_nas }}\\Catalog.json"
      register: nas_verify
      failed_when: not nas_verify.stat.exists
