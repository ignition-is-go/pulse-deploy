---
# vs-buildtools-create-layout.yml -- Create/update VS Build Tools offline layout on NAS
#
# Downloads VS 2022 Build Tools layout to a local directory on the target VM,
# then robocopy to the NAS. Safe to re-run — the layout command downloads only
# missing/updated packages, and robocopy /MIR syncs changes to the NAS.
#
# Components match UE 5.7 requirements per Epic docs.
#
# Usage:
#   ansible-playbook playbooks/vs-buildtools-create-layout.yml --limit ue-plugindev-01
#
# Sources:
#   https://dev.epicgames.com/documentation/en-us/unreal-engine/setting-up-visual-studio-development-environment-for-cplusplus-projects-in-unreal-engine
#   https://learn.microsoft.com/en-us/visualstudio/install/create-a-network-installation-of-visual-studio

- name: Create VS Build Tools offline layout
  hosts: windows
  gather_facts: false
  vars:
    layout_local: C:\vs_BuildTools_layout
    layout_nas: "{{ deploy_share }}\\installers\\vs-buildtools\\17.14"
    bootstrapper_url: "https://aka.ms/vs/17/release/vs_buildtools.exe"

  tasks:
    - name: Sync existing layout from NAS to local
      ansible.windows.win_command: >-
        robocopy "{{ layout_nas }}" "{{ layout_local }}" /MIR /NDL /R:5 /W:10
      register: layout_sync
      failed_when: layout_sync.rc >= 8
      changed_when: layout_sync.rc in [1, 3, 5, 7]
      async: 1800
      poll: 30

    - name: Download bootstrapper if not in layout
      ansible.windows.win_get_url:
        url: "{{ bootstrapper_url }}"
        dest: "{{ layout_local }}\\vs_BuildTools.exe"
        force: false

    - name: Update offline layout
      ansible.windows.win_shell: |
        $p = Start-Process -FilePath "{{ layout_local }}\vs_BuildTools.exe" -ArgumentList @(
          "--layout", "{{ layout_local }}",
          "--wait",
          "--add", "Microsoft.VisualStudio.Workload.VCTools",
          "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
          "--add", "Microsoft.VisualStudio.Component.Windows11SDK.26100",
          "--add", "Microsoft.VisualStudio.Component.VC.ASAN",
          "--add", "Microsoft.VisualStudio.Component.VC.Llvm.Clang",
          "--add", "Microsoft.NetCore.Component.Runtime.8.0",
          "--add", "Microsoft.Net.4.6.2.TargetingPack",
          "--lang", "en-US", "--quiet"
        ) -Wait -PassThru
        exit $p.ExitCode
      async: 3600
      poll: 30

    - name: Verify layout created locally
      ansible.windows.win_stat:
        path: "{{ layout_local }}\\Catalog.json"
      register: layout_verify
      failed_when: not layout_verify.stat.exists

    - name: Copy layout to NAS
      ansible.windows.win_command: >-
        robocopy "{{ layout_local }}" "{{ layout_nas }}" /MIR /COPY:DT /NDL /R:5 /W:10
      async: 1800
      poll: 30
      register: layout_copy_result
      failed_when: layout_copy_result.rc >= 8
      changed_when: layout_copy_result.rc in [1, 3, 5, 7]

    - name: Verify layout on NAS
      ansible.windows.win_stat:
        path: "{{ layout_nas }}\\Catalog.json"
      register: nas_verify
      failed_when: not nas_verify.stat.exists

    - name: Clean up local layout staging directory
      ansible.windows.win_file:
        path: "{{ layout_local }}"
        state: absent
