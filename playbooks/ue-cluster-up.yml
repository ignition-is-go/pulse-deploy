---
# Start UE on all cluster nodes (ue_cluster = ue_content + ue_previs)
#
# Prerequisites:
#   - Plastic SCM synced (playbooks/plastic-update-staging.yml)
#   - Content mirrored (playbooks/mirror-staging-nas-cluster.yml)
#
# Usage:
#   ansible-playbook playbooks/ue-cluster-up.yml
#   ansible-playbook playbooks/ue-cluster-up.yml -e skip_preflight=true

- name: Start previs nodes
  ansible.builtin.import_playbook: ue-previs-start.yml

- name: Start content nodes
  ansible.builtin.import_playbook: ue-content-start.yml
